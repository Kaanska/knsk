<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 90% 10%, #0d323f 0%, #081116 60%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 900px;
            z-index: 10;
            padding-top: 120px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 80px;
        }

        .app-icon {
            width: 90px;
            height: 90px;
            border-radius: 22px;
        }

        .brand-name {
            font-size: 56px;
            font-weight: 800;
            color: #3da9eb;
            letter-spacing: -1.5px;
        }

        .eyebrow {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #3da9eb;
            text-transform: uppercase;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .eyebrow::before {
            content: '';
            width: 50px;
            height: 3px;
            background: #3da9eb;
        }

        .headline {
            font-size: 115px;
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -4.5px;
            color: #fff;
            margin-bottom: 30px;
        }

        .blue-text {
            color: #3da9eb;
        }

        .description {
            font-size: 34px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.4;
            max-width: 820px;
            font-weight: 500;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .weave-box {
            width: 600px;
            height: 400px;
            position: relative;
        }

        .thread {
            position: absolute;
            height: 2px;
            background: linear-gradient(to right, transparent, #3da9eb, transparent);
            animation: weave 3s infinite linear;
        }

        .thread-1 {
            top: 20%;
            width: 100%;
            animation-delay: 0s;
        }

        .thread-2 {
            top: 50%;
            width: 90%;
            animation-delay: 0.5s;
        }

        .thread-3 {
            top: 80%;
            width: 100%;
            animation-delay: 1s;
        }

        .fabric-node {
            position: absolute;
            width: 40px;
            height: 40px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 20px #3da9eb;
            animation: flash 2s infinite;
        }

        @keyframes weave {
            0% {
                left: -100%;
            }

            100% {
                left: 100%;
            }
        }

        @keyframes flash {

            0%,
            100% {
                opacity: 0.2;
            }

            50% {
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header"><img src="images/AppIcon.png" class="app-icon"><span class="brand-name">VYNTO</span>
            </div>
            <div class="eyebrow">DİJİTAL DOKUMA</div>
            <div class="headline">Karmaşayı<br><span class="blue-text">İlmek İlmek Çöz.</span></div>
            <div class="description">Dağınık veriler, Vynto AI ile sağlam bir finansal stratejiye dönüşür. Her harcama
                noktasını anlamlı bir yapıda birleştiriyoruz.</div>
            <div class="visual-container">
                <div class="weave-box">
                    <div class="thread thread-1"></div>
                    <div class="thread thread-2"></div>
                    <div class="thread thread-3"></div>
                    <div class="fabric-node" style="top:20%; left:30%;"></div>
                    <div class="fabric-node" style="top:50%; left:60%; animation-delay: 0.5s;"></div>
                    <div class="fabric-node" style="top:80%; left:40%; animation-delay: 1s;"></div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
