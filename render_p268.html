<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 85% 15%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 60px;
        }

        .app-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 54px;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .eyebrow-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .eyebrow-line {
            width: 50px;
            height: 4px;
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            border-radius: 2px;
        }

        .eyebrow-text {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 4px;
            color: #4ee2c0;
            text-transform: uppercase;
        }

        .headline {
            font-size: 115px;
            font-weight: 800;
            line-height: 0.92;
            letter-spacing: -5px;
            color: #fff;
            margin-bottom: 30px;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            font-size: 34px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.4;
            max-width: 800px;
            font-weight: 500;
            margin-bottom: 60px;
        }

        /* VISUAL: 3D Currency Orbit */
        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .assets-orbit {
            width: 700px;
            height: 500px;
            position: relative;
            transform-style: preserve-3d;
            animation: slow-tilt 6s infinite ease-in-out;
        }

        .central-gold {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, #ffd700, #b8860b);
            border-radius: 50%;
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            color: #5a4a00;
            font-weight: 900;
            z-index: 10;
        }

        .coin-sat {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: 700;
            color: #fff;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            animation: orbit 10s infinite linear;
        }

        .c-1 {
            animation-delay: 0s;
        }

        .c-2 {
            animation-delay: -2s;
            background: #52a5ff20;
            border-color: #52a5ff;
        }

        .c-3 {
            animation-delay: -4s;
            background: #4ee2c020;
            border-color: #4ee2c0;
        }

        .c-4 {
            animation-delay: -6s;
        }

        .c-5 {
            animation-delay: -8s;
        }

        @keyframes orbit {
            0% {
                transform: rotateY(0deg) translateZ(250px);
            }

            100% {
                transform: rotateY(360deg) translateZ(250px);
            }
        }

        @keyframes slow-tilt {

            0%,
            100% {
                transform: rotateX(10deg);
            }

            50% {
                transform: rotateX(15deg);
            }
        }

        .orbit-trail {
            position: absolute;
            width: 500px;
            height: 500px;
            border: 2px dashed rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            top: 0;
            left: 100px;
            transform: rotateX(90deg);
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>

            <div class="eyebrow-container">
                <div class="eyebrow-line"></div>
                <div class="eyebrow-text">KÜRESEL VARLIKLAR</div>
            </div>

            <div class="headline">Sınır Tanımaz<br><span class="gradient-word">Cüzdan.</span></div>
            <div class="description">Dolar, Euro, Altın veya Kripto... Tüm varlıklarınızın değerini anlık kurlarla tek
                ekrandan yönetin.</div>

            <div class="visual-container">
                <div class="assets-orbit">
                    <div class="orbit-trail"></div>
                    <div class="central-gold">Au</div>

                    <div class="coin-sat c-1">$</div>
                    <div class="coin-sat c-2">€</div>
                    <div class="coin-sat c-3">₺</div>
                    <div class="coin-sat c-4">£</div>
                    <div class="coin-sat c-5">₿</div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
