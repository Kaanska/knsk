<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 85% 15%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 60px;
        }

        .app-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
        }

        .brand-name {
            font-size: 54px;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .eyebrow-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .eyebrow-line {
            width: 50px;
            height: 4px;
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            border-radius: 2px;
        }

        .eyebrow-text {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 4px;
            color: #4ee2c0;
            text-transform: uppercase;
        }

        .headline {
            font-size: 115px;
            font-weight: 800;
            line-height: 0.92;
            letter-spacing: -5px;
            color: #fff;
            margin-bottom: 30px;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            font-size: 34px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.4;
            max-width: 800px;
            font-weight: 500;
            margin-bottom: 60px;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
        }

        /* SUBSCRIPTION ORBIT VISUAL */
        .orbit-system {
            width: 600px;
            height: 600px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .center-hub {
            width: 180px;
            height: 180px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            box-shadow: 0 0 60px rgba(82, 165, 255, 0.2);
            z-index: 10;
        }

        .orbit-ring {
            position: absolute;
            border: 1px dashed rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .ring-1 {
            width: 350px;
            height: 350px;
            animation: spin-orbit 20s infinite linear;
        }

        .ring-2 {
            width: 550px;
            height: 550px;
            animation: spin-orbit 30s infinite linear reverse;
        }

        .sub-node {
            position: absolute;
            background: rgba(20, 30, 40, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px 25px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .s-icon {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            background: #fff;
            color: #000;
        }

        .s-price {
            color: #fff;
            font-weight: 700;
            font-size: 18px;
        }

        @keyframes spin-orbit {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>

            <div class="eyebrow-container">
                <div class="eyebrow-line"></div>
                <div class="eyebrow-text">ABONELİK YÖNETİMİ</div>
            </div>

            <div class="headline">Düzenli Ödemeler<br><span class="gradient-word">Tek Merkezde.</span></div>
            <div class="description">Spotify, Netflix, Youtube... Tüm aboneliklerinizi tek bir yörüngede toplayın, ne
                zaman ne ödeyeceğinizi bilin.</div>

            <div class="visual-container">
                <div class="orbit-system">
                    <div class="orbit-ring ring-1">
                        <div class="sub-node" style="top: -25px; left: 50%; transform: translateX(-50%);">
                            <div class="s-icon">N</div>
                            <div class="s-price">₺189</div>
                        </div>
                        <div class="sub-node" style="bottom: -25px; left: 50%; transform: translateX(-50%);">
                            <div class="s-icon" style="background:#1DB954;">S</div>
                            <div class="s-price">₺59</div>
                        </div>
                    </div>
                    <div class="orbit-ring ring-2">
                        <div class="sub-node" style="top: 50%; right: -60px; transform: translateY(-50%);">
                            <div class="s-icon" style="background:#FF0000; color:#fff;">Y</div>
                            <div class="s-price">₺79</div>
                        </div>
                        <div class="sub-node" style="top: 50%; left: -60px; transform: translateY(-50%);">
                            <div class="s-icon" style="background:#000; color:#fff;">A</div>
                            <div class="s-price">₺329</div>
                        </div>
                    </div>
                    <div class="center-hub">🔄</div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
