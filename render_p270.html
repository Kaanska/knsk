<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 60px;
        }

        .app-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 54px;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .eyebrow-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .eyebrow-line {
            width: 50px;
            height: 4px;
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            border-radius: 2px;
        }

        .eyebrow-text {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 4px;
            color: #4ee2c0;
            text-transform: uppercase;
        }

        .headline {
            font-size: 115px;
            font-weight: 800;
            line-height: 0.92;
            letter-spacing: -5px;
            color: #fff;
            margin-bottom: 30px;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            font-size: 34px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.4;
            max-width: 800px;
            font-weight: 500;
            margin-bottom: 60px;
        }

        /* VISUAL: Biometric ID Scan */
        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .auth-card {
            width: 500px;
            height: 600px;
            background: rgba(20, 20, 25, 0.4);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            position: relative;
            transform: rotateY(-10deg);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            overflow: hidden;
        }

        .fingerprint-anim {
            width: 300px;
            height: 300px;
            background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M50 20c-16.5 0-30 13.5-30 30s13.5 30 30 30 30-13.5 30-30-13.5-30-30-30zm0 10c11 0 20 9 20 20s-9 20-20 20-20-9-20-20 9-20 20-20z" fill="none" stroke="%234ee2c0" stroke-width="2"/></svg>');
            background-size: cover;
            position: relative;
            opacity: 0.5;
        }

        .scan-beam-h {
            position: absolute;
            width: 100%;
            height: 4px;
            background: #4ee2c0;
            box-shadow: 0 0 40px #4ee2c0;
            top: 20%;
            animation: beam-scan 2s infinite ease-in-out alternate;
        }

        .auth-status {
            margin-top: 40px;
            font-size: 20px;
            color: #4ee2c0;
            font-weight: 800;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .lock-icon {
            width: 50px;
            height: 50px;
            border: 2px solid #52a5ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #52a5ff;
            font-size: 24px;
        }

        @keyframes beam-scan {
            0% {
                top: 20%;
                opacity: 0.5;
            }

            100% {
                top: 80%;
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>

            <div class="eyebrow-container">
                <div class="eyebrow-line"></div>
                <div class="eyebrow-text">BİYOMETRİK GÜVENLİK</div>
            </div>

            <div class="headline">Sadece Senin<br><span class="gradient-word">Gözlerin İçin.</span></div>
            <div class="description">Verilerin senin en mahrem sırrın. Vynto, FaceID ve TouchID ile finansal dünyanı
                sadece sana açar.</div>

            <div class="visual-container">
                <div class="auth-card">
                    <div class="fingerprint-anim">
                        <div class="scan-beam-h"></div>
                    </div>
                    <div class="auth-status">
                        <div class="lock-icon">🔒</div>
                        KİMLİK DOĞRULANDI
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
