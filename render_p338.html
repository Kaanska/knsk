<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .crystal-ball {
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.2) 0%, rgba(78, 226, 192, 0.4) 50%, rgba(82, 165, 255, 0.2) 100%);
            box-shadow: 0 0 80px rgba(78, 226, 192, 0.3), inset 0 0 50px rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .base-stand {
            width: 250px;
            height: 60px;
            background: #333;
            border-radius: 50%;
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
        }

        .fortune-chart {
            width: 80%;
            height: 50%;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            opacity: 0.8;
            filter: drop-shadow(0 0 10px #fff);
        }

        .f-bar {
            width: 40px;
            background: #fff;
            border-radius: 5px;
            animation: rise-fortune 3s infinite alternate;
        }

        .mist {
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Smoke.png/640px-Smoke.png');
            opacity: 0.2;
            animation: swirl 10s infinite linear;
            background-size: cover;
        }

        @keyframes rise-fortune {
            0% {
                height: 20px;
            }

            100% {
                height: 150px;
            }
        }

        @keyframes swirl {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Geleceği<br><span class="gradient-word">Gör.</span></div>
            <div class="visual-container">
                <div class="base-stand"></div>
                <div class="crystal-ball">
                    <div class="mist"></div>
                    <div class="fortune-chart">
                        <div class="f-bar" style="height: 50px; animation-delay: 0s;"></div>
                        <div class="f-bar" style="height: 80px; animation-delay: 0.5s;"></div>
                        <div class="f-bar" style="height: 120px; animation-delay: 1s;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
