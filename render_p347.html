<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #111;
            background: linear-gradient(to bottom, #1a1a1a, #000);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .sub-head {
            color: #888;
            font-size: 24px;
            text-align: center;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 50px;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .chess-board {
            width: 600px;
            height: 400px;
            background: repeating-linear-gradient(45deg, #222 0, #222 50px, #333 50px, #333 100px);
            transform: rotateX(40deg);
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.8);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .king-piece {
            position: absolute;
            bottom: 50px;
            width: 100px;
            height: 200px;
            background: linear-gradient(135deg, #000, #333);
            border-radius: 20px 20px 50px 50px;
            box-shadow: 10px 10px 30px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .crown {
            width: 80px;
            height: 60px;
            background: linear-gradient(135deg, #333, #000);
            border-radius: 10px;
            margin-top: -30px;
            border-top: 5px solid #ffd700;
        }

        .cross {
            width: 20px;
            height: 40px;
            background: #ffd700;
            position: absolute;
            top: -60px;
            border-radius: 5px;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .cross-bar {
            width: 40px;
            height: 10px;
            background: #ffd700;
            position: absolute;
            top: -45px;
            border-radius: 5px;
        }

        .move-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100px;
            height: 100px;
            border: 4px solid #4ee2c0;
            border-radius: 10px;
            transform: translate(-50%, -50%) rotateX(0deg);
            opacity: 0;
            animation: move-check 2s infinite;
        }

        @keyframes move-check {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1.5);
            }

            50% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }

            100% {
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Stratejik Güç.</div>
            <div class="sub-head">Hamleni Yap</div>
            <div class="visual-container">
                <div class="chess-board">
                    <div class="move-indicator"></div>
                    <div class="king-piece">
                        <div class="cross"></div>
                        <div class="cross-bar"></div>
                        <div class="crown"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
