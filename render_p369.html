<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .puzzle-chart {
            width: 400px;
            height: 400px;
            position: relative;
        }

        .main-pie {
            width: 380px;
            height: 380px;
            border-radius: 50%;
            background: conic-gradient(#333 0deg 270deg, transparent 270deg 360deg);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            font-weight: 900;
            color: #444;
        }

        .missing-slice {
            position: absolute;
            width: 190px;
            height: 190px;
            background: conic-gradient(transparent 0deg 270deg, #4ee2c0 270deg 360deg);
            border-radius: 50%;
            top: 20px;
            right: 20px;
            clip-path: polygon(50% 50%, 100% 0, 100% 100%);
            animation: fit-in 3s infinite ease-in-out;
            box-shadow: 0 0 20px #4ee2c0;
            filter: drop-shadow(0 0 10px #4ee2c0);
            z-index: 10;
        }

        @keyframes fit-in {
            0% {
                transform: translate(50px, -50px) rotate(10deg);
                opacity: 0;
            }

            50% {
                transform: translate(0, 0) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translate(0, 0);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Büyük Resmi<br><span class="gradient-word">Tamamla.</span></div>
            <div class="visual-container">
                <div class="puzzle-chart">
                    <div class="main-pie">?</div>
                    <div class="missing-slice"></div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
