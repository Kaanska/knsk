<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 60px;
        }

        .app-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 54px;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .eyebrow-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .eyebrow-line {
            width: 50px;
            height: 4px;
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            border-radius: 2px;
        }

        .eyebrow-text {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 4px;
            color: #4ee2c0;
            text-transform: uppercase;
        }

        .headline {
            font-size: 115px;
            font-weight: 800;
            line-height: 0.92;
            letter-spacing: -5px;
            color: #fff;
            margin-bottom: 30px;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            font-size: 34px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.4;
            max-width: 800px;
            font-weight: 500;
            margin-bottom: 60px;
        }

        /* VISUAL: AI Statement Analysis */
        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .statement-paper {
            width: 500px;
            height: 650px;
            background: #fff;
            border-radius: 20px;
            position: relative;
            transform: rotateY(-10deg) rotateX(5deg);
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.5);
            padding: 40px;
            overflow: hidden;
            opacity: 0.95;
        }

        .paper-content {
            opacity: 0.3;
            filter: blur(2px);
        }

        .p-line {
            height: 15px;
            background: #ddd;
            margin-bottom: 20px;
            border-radius: 5px;
        }

        .p-short {
            width: 60%;
        }

        .p-long {
            width: 90%;
        }

        .ai-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(8, 17, 22, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .scan-node {
            position: absolute;
            width: 15px;
            height: 15px;
            background: #4ee2c0;
            border-radius: 50%;
            box-shadow: 0 0 20px #4ee2c0;
            animation: node-pulse 2s infinite;
        }

        .sn-1 {
            top: 20%;
            left: 30%;
            animation-delay: 0s;
        }

        .sn-2 {
            top: 35%;
            right: 25%;
            animation-delay: 0.5s;
            background: #52a5ff;
            box-shadow: 0 0 20px #52a5ff;
        }

        .sn-3 {
            bottom: 30%;
            left: 40%;
            animation-delay: 1s;
        }

        .connect-line {
            position: absolute;
            border: 1px dashed rgba(78, 226, 192, 0.5);
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            opacity: 0.5;
        }

        .extracted-card {
            background: rgba(20, 30, 40, 0.95);
            border: 1px solid #4ee2c0;
            padding: 20px 30px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
            transform: translateZ(50px);
            animation: pop-in 0.5s forwards;
            opacity: 0;
        }

        .ec-1 {
            animation-delay: 0.2s;
        }

        .ec-2 {
            animation-delay: 0.6s;
            border-color: #52a5ff;
        }

        .ec-icon {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .ec-text {
            color: #fff;
            font-size: 20px;
            font-weight: 700;
        }

        .ec-price {
            margin-left: auto;
            color: #4ee2c0;
            font-size: 20px;
            font-weight: 800;
        }

        @keyframes node-pulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.5;
            }

            50% {
                transform: scale(1.5);
                opacity: 1;
            }
        }

        @keyframes pop-in {
            from {
                transform: translateZ(50px) scale(0.8);
                opacity: 0;
            }

            to {
                transform: translateZ(50px) scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>

            <div class="eyebrow-container">
                <div class="eyebrow-line"></div>
                <div class="eyebrow-text">AI EKSTRE ANALİZİ</div>
            </div>

            <div class="headline">Fişlerini<br><span class="gradient-word">Vynto Okusun.</span></div>
            <div class="description">Uzun banka ekstrelerini veya market fişlerini Vynto'ya yükle. Yapay zeka senin için
                harcamaları ayıklasın ve kaydetsin.</div>

            <div class="visual-container">
                <div class="statement-paper">
                    <div class="paper-content">
                        <div class="p-line p-long"></div>
                        <div class="p-line p-short"></div>
                        <div class="p-line p-long"></div>
                        <div class="p-line p-long"></div>
                        <div class="p-line p-short"></div>
                        <div class="p-line p-long"></div>
                    </div>
                    <div class="ai-overlay">
                        <div class="scan-node sn-1"></div>
                        <div class="scan-node sn-2"></div>
                        <div class="scan-node sn-3"></div>

                        <div class="extracted-card ec-1">
                            <div class="ec-icon">🛒</div>
                            <div class="ec-text">Migros</div>
                            <div class="ec-price">₺450</div>
                        </div>
                        <div class="extracted-card ec-2">
                            <div class="ec-icon">⛽</div>
                            <div class="ec-text">Shell</div>
                            <div class="ec-price" style="color:#52a5ff;">₺1.200</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
