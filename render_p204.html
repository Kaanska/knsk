<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #050505;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.6;
            z-index: 0;
        }

        .blob-1 {
            width: 900px;
            height: 900px;
            top: -200px;
            right: -200px;
            background: linear-gradient(135deg, #00f2fe, #4facfe);
        }

        .blob-2 {
            width: 800px;
            height: 800px;
            bottom: -200px;
            left: -200px;
            background: linear-gradient(135deg, #7117ea, #ea6060);
        }

        .content-container {
            width: 900px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            height: 100%;
            padding-top: 100px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 80px;
        }

        .app-icon {
            width: 90px;
            height: 90px;
            border-radius: 22px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .brand-name {
            font-size: 56px;
            font-weight: 800;
            letter-spacing: -1px;
            color: white;
            background: linear-gradient(90deg, #00f2fe 0%, #4facfe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .text-section {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin-bottom: 60px;
        }

        .eyebrow {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #00f2fe;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .eyebrow::before {
            content: '';
            width: 40px;
            height: 3px;
            background: #00f2fe;
            display: block;
        }

        .main-headline {
            font-size: 100px;
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -3px;
            color: white;
        }

        .gradient-word {
            background: linear-gradient(to right, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-text {
            margin-top: 30px;
            font-size: 32px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.4;
            max-width: 800px;
        }

        .ai-chip-card {
            width: 100%;
            padding: 60px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(60px);
            border: 2px solid rgba(0, 242, 254, 0.3);
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: auto;
            margin-bottom: 120px;
            position: relative;
        }

        .chip-visual {
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.05);
            border: 4px solid #00f2fe;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
            box-shadow: 0 0 50px rgba(0, 242, 254, 0.4);
        }

        .ai-text {
            position: absolute;
            bottom: -20px;
            background: #00f2fe;
            color: black;
            font-weight: 900;
            font-size: 24px;
            padding: 10px 30px;
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="content-container">
            <div class="header"><img src="images/AppIcon.png" class="app-icon"><span class="brand-name">VYNTO</span>
            </div>
            <div class="text-section">
                <div class="eyebrow">SAF ZEKA</div>
                <div class="main-headline">Finansal Zekanın<br><span class="gradient-word">En Saf Hali.</span></div>
                <p class="sub-text">Vynto’nun tam kalbinde çalışan GPT-4o-mini altyapısı, harcamalarınızı insan üstü bir
                    hızla analiz eder ve kategorize eder.</p>
            </div>
            <div class="ai-chip-card">
                <div class="chip-visual">🧠</div>
                <div class="ai-text">POWERED BY AI</div>
            </div>
        </div>
    </div>
</body>

</html>
