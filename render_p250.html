<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 85% 15%, #0d323f 0%, #081116 65%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 900px;
            z-index: 10;
            padding-top: 120px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 80px;
        }

        .app-icon {
            width: 95px;
            height: 95px;
            border-radius: 24px;
        }

        .brand-name {
            font-size: 58px;
            font-weight: 800;
            color: #3da9eb;
            letter-spacing: -2px;
        }

        .eyebrow {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 3px;
            color: #3da9eb;
            text-transform: uppercase;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .eyebrow::before {
            content: '';
            width: 60px;
            height: 3px;
            background: #3da9eb;
        }

        .headline {
            font-size: 110px;
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -5px;
            color: #fff;
            margin-bottom: 35px;
        }

        .blue-text {
            color: #3da9eb;
        }

        .description {
            font-size: 36px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.45;
            max-width: 820px;
            font-weight: 500;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .core-visual {
            width: 500px;
            height: 400px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 50px;
            display: flex;
            flex-direction: column;
            padding: 60px;
            position: relative;
        }

        .core-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .core-title {
            font-size: 30px;
            font-weight: 800;
            color: #fff;
        }

        .core-badge {
            background: #3da9eb;
            color: #081116;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 20px;
        }

        .core-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .core-stat {
            font-size: 100px;
            font-weight: 900;
            color: #fff;
            line-height: 1;
            margin-bottom: 10px;
        }

        .core-trend {
            font-size: 24px;
            color: #4ee2c0;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .core-trend::before {
            content: '▲';
            font-size: 18px;
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header"><img src="images/AppIcon.png" class="app-icon"><span class="brand-name">VYNTO</span>
            </div>
            <div class="eyebrow">AKILLI ENDEKS</div>
            <div class="headline">Kararlarını<br><span class="blue-text">Veriye Dayandır.</span></div>
            <div class="description">Tahminlerle değil, verilerle ilerleyin. Vynto AI'nın bütçe takip endeksi ile
                finansal performansınızı her an ölçün ve geliştirin.</div>
            <div class="visual-container">
                <div class="core-visual">
                    <div class="core-header">
                        <div class="core-title">GENEL ENDEKS</div>
                        <div class="core-badge">AKTİF</div>
                    </div>
                    <div class="core-body">
                        <div class="core-stat">92.4</div>
                        <div class="core-trend">%12.5 İYİLEŞME</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
