<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #000;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff 0%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .sub-head {
            color: #888;
            font-size: 24px;
            text-align: center;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 50px;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .fiber-network {
            width: 600px;
            height: 600px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .strand {
            position: absolute;
            width: 2px;
            height: 300px;
            background: rgba(82, 165, 255, 0.2);
            transform-origin: bottom center;
            animation: pulse-light 1s infinite alternate;
        }

        .s1 {
            transform: rotate(0deg) translateY(-150px);
        }

        .s2 {
            transform: rotate(15deg) translateY(-150px);
        }

        .s3 {
            transform: rotate(30deg) translateY(-150px);
        }

        .s4 {
            transform: rotate(45deg) translateY(-150px);
        }

        .s5 {
            transform: rotate(60deg) translateY(-150px);
        }

        .s6 {
            transform: rotate(75deg) translateY(-150px);
        }

        .s7 {
            transform: rotate(90deg) translateY(-150px);
        }

        .s8 {
            transform: rotate(105deg) translateY(-150px);
        }

        .core-light {
            width: 50px;
            height: 50px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 50px #fff, 0 0 100px #52a5ff;
            position: absolute;
            z-index: 10;
        }

        @keyframes pulse-light {
            0% {
                opacity: 0.2;
                height: 280px;
                background: rgba(82, 165, 255, 0.2);
            }

            100% {
                opacity: 1;
                height: 320px;
                background: #fff;
                box-shadow: 0 0 10px #52a5ff;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Hızın Tanımı.</div>
            <div class="sub-head">Anında Transfer</div>
            <div class="visual-container">
                <div class="fiber-network">
                    <div class="strand s1"></div>
                    <div class="strand s2"></div>
                    <div class="strand s3"></div>
                    <div class="strand s4"></div>
                    <div class="strand s5"></div>
                    <div class="strand s6"></div>
                    <div class="strand s7"></div>
                    <div class="strand s8"></div>
                    <div class="core-light"></div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
