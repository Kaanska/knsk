<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 85% 15%, #0d323f 0%, #081116 65%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 900px;
            z-index: 10;
            padding-top: 120px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 80px;
        }

        .app-icon {
            width: 95px;
            height: 95px;
            border-radius: 24px;
        }

        .brand-name {
            font-size: 58px;
            font-weight: 800;
            color: #3da9eb;
            letter-spacing: -2px;
        }

        .eyebrow {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 3px;
            color: #3da9eb;
            text-transform: uppercase;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .eyebrow::before {
            content: '';
            width: 60px;
            height: 3px;
            background: #3da9eb;
        }

        .headline {
            font-size: 110px;
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -5px;
            color: #fff;
            margin-bottom: 35px;
        }

        .blue-text {
            color: #3da9eb;
        }

        .description {
            font-size: 36px;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.45;
            max-width: 820px;
            font-weight: 500;
        }

        /* Visual: Budget Health Gauge */
        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .gauge-outer {
            width: 500px;
            height: 500px;
            border: 15px solid rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .gauge-inner {
            width: 440px;
            height: 440px;
            border: 15px solid transparent;
            border-top: 15px solid #3da9eb;
            border-right: 15px solid #3da9eb;
            border-radius: 50%;
            transform: rotate(-45deg);
            box-shadow: 0 0 40px rgba(61, 169, 235, 0.4);
            animation: gauge-reveal 2s ease-out;
        }

        .score-box {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .score-val {
            font-size: 140px;
            font-weight: 900;
            color: #fff;
            line-height: 1;
        }

        .score-label {
            font-size: 24px;
            font-weight: 700;
            color: #3da9eb;
            letter-spacing: 2px;
            margin-top: 10px;
        }

        @keyframes gauge-reveal {
            from {
                transform: rotate(-180deg);
                opacity: 0;
            }

            to {
                transform: rotate(-45deg);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header"><img src="images/AppIcon.png" class="app-icon"><span class="brand-name">VYNTO</span>
            </div>
            <div class="eyebrow">BÜTÇE TAKİP ENDEKSİ</div>
            <div class="headline">Finansal Sağlık<br><span class="blue-text">Tek Bir Skorda.</span></div>
            <div class="description">Vynto AI bütçenizi analiz eder ve size 100 üzerinden bir sağlık skoru sunar. Hedef:
                Her zaman %100'e yakın kalmak.</div>
            <div class="visual-container">
                <div class="gauge-outer">
                    <div class="gauge-inner"></div>
                    <div class="score-box">
                        <div class="score-val">84</div>
                        <div class="score-label">MÜKEMMEL</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
