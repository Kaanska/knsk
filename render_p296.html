<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 60px;
        }

        .app-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 54px;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .eyebrow-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .eyebrow-line {
            width: 50px;
            height: 4px;
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            border-radius: 2px;
        }

        .eyebrow-text {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 4px;
            color: #4ee2c0;
            text-transform: uppercase;
        }

        .headline {
            font-size: 115px;
            font-weight: 800;
            line-height: 0.92;
            letter-spacing: -5px;
            color: #fff;
            margin-bottom: 30px;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            font-size: 34px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.4;
            max-width: 800px;
            font-weight: 500;
            margin-bottom: 60px;
        }

        /* VISUAL: Offline Mode */
        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .offline-scene {
            width: 500px;
            height: 600px;
            position: relative;
            transform: rotateY(-5deg);
        }

        .phone-off {
            width: 380px;
            height: 650px;
            background: #000;
            border: 4px solid #333;
            border-radius: 50px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            background-image: linear-gradient(135deg, #1a2025, #0d1216);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .no-wifi-icon {
            position: absolute;
            top: 100px;
            right: -50px;
            width: 120px;
            height: 120px;
            background: rgba(255, 107, 107, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            border: 2px solid #ff6b6b;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            color: #ff6b6b;
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.4);
            transform: translateZ(50px) rotate(15deg);
            z-index: 10;
        }

        .circle-cross {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 4px solid #ff6b6b;
            border-radius: 50%;
        }

        .slash {
            position: absolute;
            width: 80%;
            height: 4px;
            background: #ff6b6b;
            transform: rotate(-45deg);
        }

        .app-active {
            width: 85%;
            height: 80%;
            background: rgba(78, 226, 192, 0.05);
            /* Very faint green tint */
            border: 1px solid #4ee2c0;
            border-radius: 30px;
            box-shadow: 0 0 40px rgba(78, 226, 192, 0.2);
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 15px;
            opacity: 0.9;
        }

        .a-row {
            width: 100%;
            height: 50px;
            background: rgba(78, 226, 192, 0.1);
            border-radius: 10px;
        }

        .a-btn {
            width: 100%;
            height: 60px;
            background: #4ee2c0;
            border-radius: 15px;
            margin-top: auto;
            color: #000;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .status-txt {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: #4ee2c0;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: rgba(0, 0, 0, 0.8);
            padding: 5px 15px;
            border-radius: 20px;
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>

            <div class="eyebrow-container">
                <div class="eyebrow-line"></div>
                <div class="eyebrow-text">ÇEVRİMDIŞI MOD</div>
            </div>

            <div class="headline">İnternet Yok,<br><span class="gradient-word">Sorun Yok.</span></div>
            <div class="description">İnternet bağlantın kesilse bile harcamalarını girmeye ve bütçeni kontrol etmeye
                devam et. Bağlandığında her şey senkronize olur.</div>

            <div class="visual-container">
                <div class="offline-scene">
                    <div class="phone-off">
                        <div class="app-active">
                            <div class="a-row"></div>
                            <div class="a-row"></div>
                            <div class="a-row"></div>
                            <div class="a-btn">+ HARCAMA EKLE</div>
                        </div>
                        <div class="status-txt">ÇEVRİMDIŞI ÇALIŞIYOR</div>
                    </div>
                    <div class="no-wifi-icon">
                        📶<div class="slash"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
