<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #050505;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.5;
            z-index: 0;
        }

        .blob-1 {
            width: 1000px;
            height: 1000px;
            top: -300px;
            right: -300px;
            background: radial-gradient(circle, #ebbba7 0%, #cfc7f8 100%);
        }

        .blob-2 {
            width: 800px;
            height: 800px;
            bottom: -200px;
            left: -200px;
            background: radial-gradient(circle, #fbc2eb 0%, #a6c1ee 100%);
        }

        .content-container {
            width: 900px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            height: 100%;
            padding-top: 100px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 80px;
        }

        .app-icon {
            width: 90px;
            height: 90px;
            border-radius: 22px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .brand-name {
            font-size: 56px;
            font-weight: 800;
            letter-spacing: -1px;
            color: white;
            background: linear-gradient(90deg, #ebbba7 0%, #cfc7f8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .text-section {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin-bottom: 60px;
        }

        .eyebrow {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #ebbba7;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .eyebrow::before {
            content: '';
            width: 40px;
            height: 3px;
            background: #ebbba7;
            display: block;
        }

        .main-headline {
            font-size: 100px;
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -3px;
            color: white;
        }

        .gradient-word {
            background: linear-gradient(to right, #ebbba7, #cfc7f8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-text {
            margin-top: 30px;
            font-size: 32px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.4;
            max-width: 800px;
        }

        .ai-status-card {
            width: 100%;
            padding: 60px;
            background: rgba(25, 25, 25, 0.4);
            backdrop-filter: blur(60px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 60px;
            margin-top: auto;
            margin-bottom: 120px;
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .status-pulse {
            width: 30px;
            height: 30px;
            background: #ebbba7;
            border-radius: 50%;
            box-shadow: 0 0 20px #ebbba7;
            animation: pulse-status 1s infinite;
        }

        @keyframes pulse-status {

            0%,
            100% {
                opacity: 0.5;
            }

            50% {
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="content-container">
            <div class="header"><img src="images/AppIcon.png" class="app-icon"><span class="brand-name">VYNTO</span>
            </div>
            <div class="text-section">
                <div class="eyebrow">KESİNTİSİZ DESTEK</div>
                <div class="main-headline">7/24 Yanınızda:<br><span class="gradient-word">AI Finans Koçu.</span></div>
                <p class="sub-text">O hiç uyumaz, hiç hata yapmaz. Vynto AI, finansal dünyanızı geliştirmek için
                    saniyeler içinde çalışır.</p>
            </div>
            <div class="ai-status-card">
                <div class="status-pulse"></div>
                <div style="flex:1;">
                    <div style="font-size:36px; font-weight:800; color:white;">AI: ÇEVRİMİÇİ</div>
                    <div style="color:#ebbba7; font-size:24px; font-weight:600;">Piyasalar ve verileriniz anlık
                        analizde.</div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
