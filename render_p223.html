<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 90% 10%, #0d323f 0%, #081116 60%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 900px;
            z-index: 10;
            padding-top: 120px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 80px;
        }

        .app-icon {
            width: 90px;
            height: 90px;
            border-radius: 22px;
        }

        .brand-name {
            font-size: 56px;
            font-weight: 800;
            color: #3da9eb;
            letter-spacing: -1px;
        }

        .eyebrow {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #3da9eb;
            text-transform: uppercase;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .eyebrow::before {
            content: '';
            width: 50px;
            height: 3px;
            background: #3da9eb;
        }

        .headline {
            font-size: 115px;
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -4.5px;
            color: #fff;
            margin-bottom: 30px;
        }

        .blue-text {
            color: #3da9eb;
        }

        .description {
            font-size: 34px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.4;
            max-width: 820px;
            font-weight: 500;
        }

        /* Central Piece: Financial Orbit */
        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .orbit-system {
            width: 500px;
            height: 500px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .center-node {
            width: 150px;
            height: 150px;
            background: #3da9eb;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            box-shadow: 0 0 50px rgba(61, 169, 235, 0.6);
            z-index: 5;
        }

        .orbit {
            position: absolute;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .orbit-1 {
            width: 350px;
            height: 350px;
            animation: rotate 10s infinite linear;
        }

        .orbit-2 {
            width: 500px;
            height: 500px;
            animation: rotate 15s infinite linear reverse;
        }

        .node {
            position: absolute;
            width: 60px;
            height: 60px;
            background: rgba(13, 20, 24, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
        }

        .node-1 {
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
        }

        .node-2 {
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header"><img src="images/AppIcon.png" class="app-icon"><span class="brand-name">VYNTO</span>
            </div>
            <div class="eyebrow">HEPSİ BİR ARADA</div>
            <div class="headline">Tüm Bankalar<br><span class="blue-text">Tek Bir Odakta.</span></div>
            <div class="description">Düzinelerce uygulama arasında kaybolmayın. Vynto AI tüm hesaplarınızı tek bir
                merkezde toplar ve akıllıca yönetir.</div>
            <div class="visual-container">
                <div class="orbit-system">
                    <div class="center-node">🧠</div>
                    <div class="orbit orbit-1">
                        <div class="node node-1">🏦</div>
                        <div class="node node-2">₿</div>
                    </div>
                    <div class="orbit orbit-2">
                        <div class="node node-1" style="left:10%; top:20%;">💳</div>
                        <div class="node node-2" style="right:10%; bottom:20%;">💵</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
