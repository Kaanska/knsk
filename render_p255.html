<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 85% 15%, #0d323f 0%, #081116 65%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 900px;
            z-index: 10;
            padding-top: 120px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 80px;
        }

        .app-icon {
            width: 95px;
            height: 95px;
            border-radius: 24px;
        }

        .brand-name {
            font-size: 58px;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .eyebrow {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 3px;
            color: #4ee2c0;
            text-transform: uppercase;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .eyebrow::before {
            content: '';
            width: 60px;
            height: 3px;
            background: #4ee2c0;
        }

        .headline {
            font-size: 110px;
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -5px;
            color: #fff;
            margin-bottom: 35px;
        }

        .gradient-text {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            font-size: 36px;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.45;
            max-width: 820px;
            font-weight: 500;
        }

        /* Feature Visual: Notifications / Alerts */
        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .phone-frame {
            width: 350px;
            height: 600px;
            background: rgba(255, 255, 255, 0.03);
            border: 8px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            position: relative;
            padding: 40px 20px;
        }

        .notif {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 20px;
            position: relative;
            transform: scale(0.9);
            animation: bounce-notif 3s infinite ease-in-out;
        }

        .notif-title {
            font-size: 22px;
            font-weight: 800;
            color: #4ee2c0;
            margin-bottom: 5px;
        }

        .notif-text {
            font-size: 18px;
            color: #fff;
            opacity: 0.8;
        }

        @keyframes bounce-notif {

            0%,
            100% {
                transform: scale(0.9);
            }

            50% {
                transform: scale(1);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="eyebrow">AKILLI BİLDİRİMLER</div>
            <div class="headline">Siz Unutun,<br><span class="gradient-text">Vynto Hatırlatır.</span></div>
            <div class="description">Ödeme günleri, bütçe aşımları veya hedef takibi... Vynto her zaman tetikte kalır ve
                sizi en kritik anlarda uyarır.</div>
            <div class="visual-container">
                <div class="phone-frame">
                    <div class="notif">
                        <div class="notif-title">Ödeme Hatırlatıcı</div>
                        <div class="notif-text">Ev Kirası ödemesi için son 1 gün.</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
