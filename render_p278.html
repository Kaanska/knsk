<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 85% 15%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 60px;
        }

        .app-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 54px;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .eyebrow-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .eyebrow-line {
            width: 50px;
            height: 4px;
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            border-radius: 2px;
        }

        .eyebrow-text {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 4px;
            color: #4ee2c0;
            text-transform: uppercase;
        }

        .headline {
            font-size: 115px;
            font-weight: 800;
            line-height: 0.92;
            letter-spacing: -5px;
            color: #fff;
            margin-bottom: 30px;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            font-size: 34px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.4;
            max-width: 800px;
            font-weight: 500;
            margin-bottom: 60px;
        }

        /* VISUAL: Push Notification Debt */
        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .phone-mock {
            width: 380px;
            height: 700px;
            background: #000;
            border: 4px solid #333;
            border-radius: 50px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            position: relative;
            transform: rotateY(-10deg) rotateX(5deg);
            overflow: hidden;
            background-image: linear-gradient(135deg, #1a2025 0%, #0d1216 100%);
        }

        /* Notch */
        .phone-mock::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 30px;
            background: #000;
            border-radius: 0 0 20px 20px;
            z-index: 5;
        }

        /* Screen Glow */
        .screen-glow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 30%, rgba(82, 165, 255, 0.2), transparent 70%);
        }

        .push-alert {
            position: absolute;
            top: 180px;
            left: 50%;
            transform: translateX(-50%) translateZ(40px);
            width: 340px;
            background: rgba(40, 45, 55, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 22px;
            padding: 20px;
            display: flex;
            align-items: flex-start;
            gap: 15px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            z-index: 10;
        }

        .app-tiny {
            width: 45px;
            height: 45px;
            border-radius: 10px;
        }

        .push-content {
            flex: 1;
        }

        .push-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 600;
        }

        .push-title {
            color: #fff;
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .push-body {
            color: rgba(255, 255, 255, 0.9);
            font-size: 16px;
            line-height: 1.35;
        }

        .bell-icon {
            position: absolute;
            top: -50px;
            right: -30px;
            font-size: 100px;
            filter: drop-shadow(0 0 20px #ff6b6b);
            animation: ring-bell 3s infinite ease-in-out;
            transform-origin: top center;
            z-index: 20;
        }

        @keyframes ring-bell {

            0%,
            90%,
            100% {
                transform: rotate(0deg);
            }

            92% {
                transform: rotate(15deg);
            }

            94% {
                transform: rotate(-15deg);
            }

            96% {
                transform: rotate(10deg);
            }

            98% {
                transform: rotate(-10deg);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>

            <div class="eyebrow-container">
                <div class="eyebrow-line"></div>
                <div class="eyebrow-text">BORÇ TAKİBİ</div>
            </div>

            <div class="headline">Zamanında<br><span class="gradient-word">Haberdar Ol.</span></div>
            <div class="description">Ödemelerini unutma stresine son. Vynto, borç tarihin yaklaştığında sana akıllı
                bildirimler gönderir.</div>

            <div class="visual-container">
                <div class="phone-mock">
                    <div class="screen-glow"></div>
                    <div class="push-alert">
                        <img src="images/AppIcon.png" class="app-tiny">
                        <div class="push-content">
                            <div class="push-header"><span>VYNTO</span><span>ŞİMDİ</span></div>
                            <div class="push-title">Ödeme Hatırlatması 🚨</div>
                            <div class="push-body">Kredi Kartı ödemen için son 2 gün.<br><span
                                    style="color:#ff6b6b; font-weight:600;">Tutar: ₺12.450</span></div>
                        </div>
                    </div>
                </div>
                <!-- Bell is outside the phone but visually connected -->
                <div class="bell-icon" style="top: 100px; right: 100px;">🔔</div>
            </div>
        </div>
    </div>
</body>

</html>
