<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .shop-bags {
            position: relative;
            width: 400px;
            height: 400px;
        }

        .bag {
            width: 200px;
            height: 250px;
            background: #fff;
            position: absolute;
            bottom: 0;
            border-radius: 5px 5px 20px 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .b1 {
            left: 0;
            background: #4ee2c0;
            transform: rotate(-5deg);
            z-index: 1;
        }

        .b2 {
            right: 0;
            background: #52a5ff;
            transform: rotate(5deg);
            z-index: 2;
        }

        .handle {
            width: 80px;
            height: 80px;
            border: 5px solid rgba(0, 0, 0, 0.2);
            border-bottom: none;
            border-radius: 40px 40px 0 0;
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
        }

        .limit-alert {
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff6b6b;
            color: #fff;
            padding: 15px 30px;
            border-radius: 20px;
            font-weight: 800;
            animation: shake 0.5s infinite;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(-50%);
            }

            25% {
                transform: translateX(-55%);
            }

            75% {
                transform: translateX(-45%);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Kontrollü<br><span class="gradient-word">Özgürlük.</span></div>
            <div class="visual-container">
                <div class="shop-bags">
                    <div class="bag b1">
                        <div class="handle"></div>
                    </div>
                    <div class="bag b2">
                        <div class="handle"></div>
                    </div>
                    <div class="limit-alert">⚠️ LİMİT %85</div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
