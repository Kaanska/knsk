<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .hourglass {
            position: relative;
            width: 300px;
            height: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .glass-bulb {
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
            z-index: 2;
        }

        .gb-top {
            border-radius: 20px 20px 100px 100px;
            border-bottom: none;
        }

        .gb-bottom {
            border-radius: 100px 100px 20px 20px;
            border-top: none;
            top: -2px;
        }

        .sand-top {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 80%;
            background: #fff;
            opacity: 0.5;
            animation: drain-sand 5s infinite linear;
        }

        .sand-stream {
            width: 4px;
            height: 200px;
            background: #ffd700;
            position: absolute;
            top: 180px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1;
            box-shadow: 0 0 10px #ffd700;
        }

        .gold-pile {
            position: absolute;
            bottom: 0;
            left: 20%;
            width: 60%;
            height: 0;
            background: #ffd700;
            border-radius: 50% 50% 0 0;
            animation: fill-gold 5s infinite linear;
        }

        @keyframes drain-sand {
            0% {
                height: 80%;
            }

            100% {
                height: 0%;
            }
        }

        @keyframes fill-gold {
            0% {
                height: 0;
            }

            100% {
                height: 60px;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Nakit =<br><span class="gradient-word">Vakit.</span></div>
            <div class="visual-container">
                <div class="hourglass">
                    <div class="glass-bulb gb-top">
                        <div class="sand-top"></div>
                    </div>
                    <div class="sand-stream"></div>
                    <div class="glass-bulb gb-bottom">
                        <div class="gold-pile"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
