<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: linear-gradient(180deg, #0a3d4a 0%, #051923 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        .particle-field {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #5EE7DF;
            border-radius: 50%;
            box-shadow: 0 0 10px #5EE7DF;
            animation: particleFloat 6s ease-in-out infinite;
        }

        @keyframes particleFloat {

            0%,
            100% {
                transform: translateY(0px);
                opacity: 0.3;
            }

            50% {
                transform: translateY(-50px);
                opacity: 1;
            }
        }

        .content-container {
            width: 900px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            height: 100%;
            padding-top: 100px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 80px;
        }

        .logo-icon {
            width: 56px;
            height: 56px;
            background: rgba(10, 20, 30, 0.6);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .check-mark {
            font-size: 32px;
            color: #5EE7DF;
            font-weight: 800;
        }

        .brand-text {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: 1px;
            color: #5EE7DF;
        }

        .text-section {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin-bottom: 60px;
        }

        .eyebrow {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 3px;
            color: #5EE7DF;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .eyebrow::before {
            content: '';
            width: 30px;
            height: 2px;
            background: #5EE7DF;
            display: block;
        }

        .main-headline {
            font-size: 100px;
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -3px;
            color: white;
        }

        .gradient-word {
            color: #5EE7DF;
        }

        .sub-text {
            margin-top: 30px;
            font-size: 28px;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.4;
            max-width: 800px;
        }

        .stats-container {
            display: flex;
            gap: 30px;
            margin-top: auto;
            margin-bottom: 100px;
        }

        .stat-card {
            flex: 1;
            padding: 50px 40px;
            background: rgba(10, 37, 64, 0.4);
            backdrop-filter: blur(40px);
            border: 2px solid rgba(94, 231, 223, 0.3);
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            box-shadow: 0 0 60px rgba(94, 231, 223, 0.15);
        }

        .stat-number {
            font-size: 72px;
            font-weight: 800;
            color: #5EE7DF;
        }

        .stat-label {
            font-size: 24px;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 600;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="particle-field">
            <div class="particle" style="top: 20%; left: 10%; animation-delay: 0s;"></div>
            <div class="particle" style="top: 40%; left: 80%; animation-delay: 1s;"></div>
            <div class="particle" style="top: 60%; left: 20%; animation-delay: 2s;"></div>
            <div class="particle" style="top: 80%; left: 70%; animation-delay: 3s;"></div>
            <div class="particle" style="top: 30%; left: 50%; animation-delay: 4s;"></div>
        </div>
        <div class="content-container">
            <div class="header">
                <div class="logo-icon">
                    <div class="check-mark">✓</div>
                </div>
                <div class="brand-text">VYNTO</div>
            </div>
            <div class="text-section">
                <div class="eyebrow">GÜÇLÜ İSTATİSTİKLER</div>
                <div class="main-headline">Rakamlar<br><span class="gradient-word">Konuşuyor.</span></div>
                <p class="sub-text">Finansal sağlığını sayılarla gör. Her detay önemli.</p>
            </div>
            <div class="stats-container">
                <div class="stat-card">
                    <div class="stat-number">247</div>
                    <div class="stat-label">Toplam İşlem</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">₺85K</div>
                    <div class="stat-label">Aylık Gelir</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">%34</div>
                    <div class="stat-label">Tasarruf Oranı</div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
