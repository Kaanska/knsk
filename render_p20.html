<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #050505;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.45;
            z-index: 0;
        }

        .blob-1 {
            width: 900px;
            height: 900px;
            top: -200px;
            right: -200px;
            background: linear-gradient(135deg, #fce38a, #f38181);
        }

        .blob-2 {
            width: 800px;
            height: 800px;
            bottom: -200px;
            left: -200px;
            background: linear-gradient(135deg, #663399, #f38181);
        }

        .content-container {
            width: 900px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            height: 100%;
            padding-top: 100px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 80px;
        }

        .app-icon {
            width: 90px;
            height: 90px;
            border-radius: 22px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .brand-name {
            font-size: 56px;
            font-weight: 800;
            letter-spacing: -1px;
            color: white;
            background: linear-gradient(90deg, #5EE7DF 0%, #4facfe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .text-section {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin-bottom: 80px;
        }

        .eyebrow {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #fce38a;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .eyebrow::before {
            content: '';
            width: 40px;
            height: 3px;
            background: #fce38a;
            display: block;
        }

        .main-headline {
            font-size: 100px;
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -3px;
            color: white;
        }

        .gradient-word {
            background: linear-gradient(to right, #fce38a, #f38181);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-text {
            margin-top: 30px;
            font-size: 32px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.4;
            max-width: 800px;
        }

        .card {
            width: 100%;
            padding: 60px;
            background: rgba(25, 25, 25, 0.6);
            backdrop-filter: blur(60px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 60px;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
            max-height: 400px;
            margin-top: auto;
            margin-bottom: 100px;
        }

        .chart-visual {
            width: 100%;
            height: 150px;
            margin-top: 20px;
            position: relative;
            background: linear-gradient(180deg, rgba(243, 129, 129, 0.2) 0%, rgba(0, 0, 0, 0) 100%);
            border-radius: 20px;
            display: flex;
            align-items: flex-end;
            padding: 20px;
        }

        .chart-line {
            width: 100%;
            height: 100%;
            position: absolute;
            bottom: 0;
            left: 0;
            z-index: 2;
        }

        .net-worth-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .nw-label {
            font-size: 24px;
            color: #aaa;
            font-weight: 600;
        }

        .nw-val {
            font-size: 56px;
            font-weight: 800;
            color: white;
        }

        .growth-badge {
            background: rgba(252, 227, 138, 0.2);
            padding: 10px 20px;
            border-radius: 12px;
            color: #fce38a;
            font-weight: 700;
            font-size: 24px;
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="content-container">
            <div class="header"><img src="images/AppIcon.png" class="app-icon"><span class="brand-name">VYNTO</span>
            </div>
            <div class="text-section">
                <div class="eyebrow">VARLIK YÖNETİMİ</div>
                <div class="main-headline">Varlığını<br><span class="gradient-word">Büyüt.</span></div>
                <p class="sub-text">Bütün yatırımların tek ekranda. Varlıklarının değerini anlık izle, geleceğini
                    planla.</p>
            </div>
            <div class="card">
                <div class="net-worth-row">
                    <div>
                        <div class="nw-label">Net Varlık</div>
                        <div class="nw-val">₺485.000</div>
                    </div>
                    <div class="growth-badge">▲ %18</div>
                </div>
                <div class="chart-visual"><svg width="100%" height="100%" viewBox="0 0 800 150" fill="none"
                        class="chart-line">
                        <defs>
                            <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" style="stop-color:#fce38a;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#f38181;stop-opacity:1" />
                            </linearGradient>
                        </defs>
                        <path d="M0 140 C100 130 150 100 250 80 C350 60 450 90 550 40 C650 -10 750 20 800 10"
                            stroke="url(#grad1)" stroke-width="8" fill="none" stroke-linecap="round" />
                    </svg></div>
            </div>
        </div>
    </div>
</body>

</html>
