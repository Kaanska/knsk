<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .tag-cloud {
            width: 500px;
            height: 500px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            align-content: center;
            transform: rotateX(20deg) rotateZ(-10deg);
        }

        .tag {
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 24px;
            font-weight: 700;
            color: #000;
            background: #fff;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.3s;
            animation: tag-float 4s infinite ease-in-out;
            cursor: default;
        }

        .t-active {
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            color: #fff;
            transform: scale(1.1);
            box-shadow: 0 0 40px rgba(82, 165, 255, 0.4);
            z-index: 10;
        }

        .t1 {
            animation-delay: 0s;
            transform: rotate(-5deg);
        }

        .t2 {
            animation-delay: 1s;
            transform: rotate(5deg);
        }

        .t3 {
            animation-delay: 2s;
            transform: rotate(-3deg);
        }

        .t4 {
            animation-delay: 0.5s;
            transform: rotate(2deg);
        }

        .t5 {
            animation-delay: 1.5s;
            transform: rotate(-4deg);
        }

        @keyframes tag-float {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }

            50% {
                transform: translateY(-20px) rotate(5deg);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>

            <div class="headline">Tarzını<br><span class="gradient-word">Yansıt.</span></div>

            <div class="visual-container">
                <div class="tag-cloud">
                    <div class="tag t1">#KahveKeyfi</div>
                    <div class="tag t2">#Tech</div>
                    <div class="tag t-active">#HaftasonuKaçamağı</div>
                    <div class="tag t3">#GymLife</div>
                    <div class="tag t4">#NetflixAndChill</div>
                    <div class="tag t5">#Yatırım</div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
