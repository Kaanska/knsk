<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: radial-gradient(ellipse at center, #0f1419 0%, #000000 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        .crystal-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .crystal-shard {
            position: absolute;
            background: linear-gradient(135deg, rgba(94, 231, 223, 0.1), rgba(6, 182, 212, 0.05));
            border: 1px solid rgba(94, 231, 223, 0.2);
            backdrop-filter: blur(10px);
            animation: shardFloat 6s ease-in-out infinite;
        }

        .shard-1 {
            width: 200px;
            height: 300px;
            top: 10%;
            left: 5%;
            transform: rotate(15deg);
            clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
            animation-delay: 0s;
        }

        .shard-2 {
            width: 150px;
            height: 250px;
            top: 20%;
            right: 10%;
            transform: rotate(-20deg);
            clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
            animation-delay: 1s;
        }

        .shard-3 {
            width: 180px;
            height: 280px;
            bottom: 15%;
            left: 8%;
            transform: rotate(25deg);
            clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
            animation-delay: 2s;
        }

        @keyframes shardFloat {

            0%,
            100% {
                transform: translateY(0px) rotate(15deg);
            }

            50% {
                transform: translateY(-30px) rotate(20deg);
            }
        }

        .mystical-glow {
            position: absolute;
            width: 700px;
            height: 700px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(94, 231, 223, 0.3) 0%, transparent 70%);
            filter: blur(100px);
            animation: mysticalPulse 5s ease-in-out infinite;
            z-index: 1;
        }

        @keyframes mysticalPulse {

            0%,
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.3;
            }

            50% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 0.6;
            }
        }

        .content-container {
            width: 900px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            height: 100%;
            padding-top: 100px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 80px;
        }

        .app-icon {
            width: 90px;
            height: 90px;
            border-radius: 22px;
            box-shadow: 0 20px 60px rgba(94, 231, 223, 0.6);
        }

        .brand-name {
            font-size: 56px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(90deg, #5EE7DF 0%, #06b6d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .text-section {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin-bottom: 60px;
        }

        .eyebrow {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #5EE7DF;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .eyebrow::before {
            content: '';
            width: 40px;
            height: 3px;
            background: linear-gradient(90deg, #5EE7DF, #06b6d4);
            display: block;
        }

        .main-headline {
            font-size: 100px;
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -3px;
            color: white;
        }

        .gradient-word {
            background: linear-gradient(135deg, #5EE7DF, #06b6d4, #14b8a6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 40px rgba(94, 231, 223, 0.6));
        }

        .sub-text {
            margin-top: 30px;
            font-size: 32px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.4;
            max-width: 800px;
        }

        .crystal-ball-container {
            width: 100%;
            height: 500px;
            margin-top: auto;
            margin-bottom: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .crystal-ball {
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%,
                    rgba(94, 231, 223, 0.4) 0%,
                    rgba(6, 182, 212, 0.3) 40%,
                    rgba(20, 184, 166, 0.2) 100%);
            border: 3px solid rgba(94, 231, 223, 0.5);
            box-shadow:
                0 0 100px rgba(94, 231, 223, 0.6),
                inset 0 0 80px rgba(94, 231, 223, 0.3),
                inset -20px -20px 60px rgba(6, 182, 212, 0.4);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: ballFloat 6s ease-in-out infinite;
        }

        @keyframes ballFloat {

            0%,
            100% {
                transform: translateY(0px) scale(1);
                box-shadow:
                    0 0 100px rgba(94, 231, 223, 0.6),
                    inset 0 0 80px rgba(94, 231, 223, 0.3),
                    inset -20px -20px 60px rgba(6, 182, 212, 0.4);
            }

            50% {
                transform: translateY(-25px) scale(1.05);
                box-shadow:
                    0 0 150px rgba(94, 231, 223, 0.9),
                    inset 0 0 100px rgba(94, 231, 223, 0.5),
                    inset -20px -20px 80px rgba(6, 182, 212, 0.6);
            }
        }

        .ball-shine {
            position: absolute;
            width: 120px;
            height: 120px;
            top: 60px;
            left: 80px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.6) 0%, transparent 70%);
            filter: blur(20px);
            animation: shineMove 4s ease-in-out infinite;
        }

        @keyframes shineMove {

            0%,
            100% {
                transform: translate(0, 0);
                opacity: 0.6;
            }

            50% {
                transform: translate(10px, 10px);
                opacity: 0.9;
            }
        }

        .prediction-content {
            position: relative;
            z-index: 5;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .prediction-icon {
            font-size: 72px;
            filter: drop-shadow(0 0 20px rgba(94, 231, 223, 0.8));
            animation: iconRotate 10s linear infinite;
        }

        @keyframes iconRotate {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .prediction-label {
            font-size: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .prediction-value {
            font-size: 56px;
            font-weight: 800;
            background: linear-gradient(135deg, #5EE7DF, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(94, 231, 223, 0.6));
        }

        .prediction-subtitle {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 600;
        }

        .magic-particles {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #5EE7DF;
            border-radius: 50%;
            box-shadow: 0 0 10px #5EE7DF;
            animation: particleFloat 4s ease-in-out infinite;
        }

        .particle:nth-child(1) {
            top: 20%;
            left: 10%;
            animation-delay: 0s;
        }

        .particle:nth-child(2) {
            top: 30%;
            right: 15%;
            animation-delay: 1s;
        }

        .particle:nth-child(3) {
            bottom: 25%;
            left: 20%;
            animation-delay: 2s;
        }

        .particle:nth-child(4) {
            bottom: 35%;
            right: 10%;
            animation-delay: 3s;
        }

        @keyframes particleFloat {

            0%,
            100% {
                transform: translateY(0px);
                opacity: 0.3;
            }

            50% {
                transform: translateY(-40px);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="crystal-bg">
            <div class="crystal-shard shard-1"></div>
            <div class="crystal-shard shard-2"></div>
            <div class="crystal-shard shard-3"></div>
        </div>
        <div class="mystical-glow"></div>
        <div class="content-container">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="text-section">
                <div class="eyebrow">AKILLI TAHMİN</div>
                <div class="main-headline">Geleceği<br><span class="gradient-word">Öngör.</span></div>
                <p class="sub-text">AI destekli tahminlerle gelecek ay ne kadar tasarruf edebileceğini gör.</p>
            </div>
            <div class="crystal-ball-container">
                <div class="magic-particles">
                    <div class="particle"></div>
                    <div class="particle"></div>
                    <div class="particle"></div>
                    <div class="particle"></div>
                </div>
                <div class="crystal-ball">
                    <div class="ball-shine"></div>
                    <div class="prediction-content">
                        <div class="prediction-icon">🔮</div>
                        <div class="prediction-label">Gelecek Ay Tahmini</div>
                        <div class="prediction-value">₺22.5K</div>
                        <div class="prediction-subtitle">Tasarruf Potansiyeli</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
