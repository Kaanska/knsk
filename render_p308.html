<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .ghost-screen {
            width: 450px;
            height: 600px;
            background: linear-gradient(135deg, #eee, #f2f2f2);
            border-radius: 40px;
            border: 4px solid #fff;
            position: relative;
            transform: rotateY(-10deg);
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.8);
            filter: blur(8px);
            transition: all 0.3s;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 30px;
        }

        .ghost-row {
            width: 100%;
            height: 60px;
            background: #ddd;
            margin-bottom: 20px;
            border-radius: 15px;
        }

        .ghost-header {
            width: 100%;
            height: 150px;
            background: #ccc;
            margin-bottom: 40px;
            border-radius: 20px;
        }

        .focus-spot {
            position: absolute;
            width: 250px;
            height: 250px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(0px);
            /* Clear spot */
            border-radius: 50%;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid #52a5ff;
            box-shadow: 0 0 50px rgba(82, 165, 255, 0.4);
            animation: move-focus 4s infinite ease-in-out;
            z-index: 10;
            /* Invert blur logic: Make everything blurry except this spot is tricky in CSS alone, 
               so we use the blur on parent and clear overlay or simulate with sharp elements on top */
        }

        /* Simulation: Sharp elements only inside the focus area */
        .sharp-content {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            pointer-events: none;
        }

        .sharp-card {
            background: #fff;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: move-sharp 4s infinite ease-in-out;
        }

        .sc-val {
            font-size: 36px;
            font-weight: 800;
            color: #000;
        }

        .sc-label {
            font-size: 14px;
            color: #666;
            text-transform: uppercase;
        }

        @keyframes move-sharp {

            0%,
            100% {
                transform: translateY(0) scale(1);
            }

            50% {
                transform: translateY(-20px) scale(1.05);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>

            <div class="headline">Gölge<br><span class="gradient-word">Gibi.</span></div>

            <div class="visual-container">
                <div class="ghost-screen">
                    <div class="ghost-header"></div>
                    <div class="ghost-row"></div>
                    <div class="ghost-row"></div>
                    <div class="ghost-row"></div>
                </div>

                <div class="sharp-content">
                    <div class="sharp-card">
                        <div class="sc-val">₺145.20</div>
                        <div class="sc-label">ANLIK BAKİYE</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
