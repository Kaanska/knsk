<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 85% 15%, #0d323f 0%, #081116 65%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 900px;
            z-index: 10;
            padding-top: 120px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 80px;
        }

        .app-icon {
            width: 95px;
            height: 95px;
            border-radius: 24px;
        }

        .brand-name {
            font-size: 58px;
            font-weight: 800;
            color: #3da9eb;
            letter-spacing: -2px;
        }

        .eyebrow {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 3px;
            color: #3da9eb;
            text-transform: uppercase;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .eyebrow::before {
            content: '';
            width: 60px;
            height: 3px;
            background: #3da9eb;
        }

        .headline {
            font-size: 110px;
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -5px;
            color: #fff;
            margin-bottom: 35px;
        }

        .blue-text {
            color: #3da9eb;
        }

        .description {
            font-size: 36px;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.45;
            max-width: 820px;
            font-weight: 500;
        }

        /* High-End Visual: Security Shield */
        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .shield-3d {
            width: 450px;
            height: 550px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(40px);
            border: 2px solid rgba(61, 169, 235, 0.4);
            border-radius: 50px 50px 225px 225px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5), inset 0 0 50px rgba(61, 169, 235, 0.1);
            animation: float-shield 4s infinite ease-in-out;
        }

        .shield-inner {
            width: 150px;
            height: 150px;
            background: #3da9eb;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            box-shadow: 0 0 50px #3da9eb;
            animation: pulse-shield 2s infinite ease-in-out;
        }

        .scanning-line {
            position: absolute;
            width: 100%;
            height: 4px;
            background: #3da9eb;
            box-shadow: 0 0 30px #3da9eb;
            top: 20%;
            animation: scan-shield 4s infinite linear;
        }

        @keyframes float-shield {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-30px);
            }
        }

        @keyframes pulse-shield {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.8;
            }

            50% {
                transform: scale(1.1);
                opacity: 1;
            }
        }

        @keyframes scan-shield {
            0% {
                top: 10%;
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                top: 90%;
                opacity: 0;
            }
        }

        .protection-status {
            position: absolute;
            bottom: -60px;
            font-size: 22px;
            font-weight: 800;
            color: #4ee2c0;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .dot {
            width: 12px;
            height: 12px;
            background: #4ee2c0;
            border-radius: 50%;
            box-shadow: 0 0 15px #4ee2c0;
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="eyebrow">DİJİTAL GÜVENLİK</div>
            <div class="headline">En Üst Düzey<br><span class="blue-text">Koruma Altında.</span></div>
            <div class="description">Verileriniz paha biçilemez. Vynto AI, finansal dünyanızı aşılmaz bir kale gibi
                korur ve her adımda güvenliğinizi sağlar.</div>
            <div class="visual-container">
                <div class="shield-3d">
                    <div class="scanning-line"></div>
                    <div class="shield-inner"></div>
                    <div class="protection-status">
                        <div class="dot"></div>
                        AI DEFENSE ACTIVE
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
