<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #111;
            background: radial-gradient(circle at 50% 10%, #1a1a1a 0%, #000 80%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .sky-map {
            width: 600px;
            height: 600px;
            position: relative;
            background: radial-gradient(circle, #1a1a1a 0%, #000 70%);
            border-radius: 50%;
        }

        .star {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px #fff;
            animation: twinkle 3s infinite alternate;
        }

        .constellation-lines {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .line {
            position: absolute;
            background: rgba(82, 165, 255, 0.5);
            height: 1px;
            transform-origin: left center;
        }

        /* VYNTO V Shape */
        .s1 {
            top: 200px;
            left: 150px;
        }

        .s2 {
            top: 400px;
            left: 300px;
        }

        .s3 {
            top: 200px;
            right: 150px;
        }

        .l1 {
            top: 202px;
            left: 152px;
            width: 170px;
            transform: rotate(50deg);
        }

        .l2 {
            top: 400px;
            left: 300px;
            width: 170px;
            transform: rotate(-50deg);
        }

        .nebula {
            position: absolute;
            top: 100px;
            left: 100px;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(78, 226, 192, 0.1), transparent 70%);
            filter: blur(20px);
            animation: nebula-breath 5s infinite alternate;
        }

        @keyframes twinkle {
            0% {
                opacity: 0.5;
                transform: scale(1);
            }

            100% {
                opacity: 1;
                transform: scale(1.5);
            }
        }

        @keyframes nebula-breath {
            0% {
                opacity: 0.5;
                transform: scale(0.9);
            }

            100% {
                opacity: 0.8;
                transform: scale(1.1);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Yol<br><span class="gradient-word">Gösterici.</span></div>
            <div class="visual-container">
                <div class="sky-map">
                    <div class="nebula"></div>
                    <div class="star s1"></div>
                    <div class="star s2"></div>
                    <div class="star s3"></div>

                    <div class="constellation-lines">
                        <div class="line l1"></div>
                        <div class="line l2"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
