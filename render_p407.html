<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #000;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .meteor {
            position: absolute;
            width: 2px;
            height: 100px;
            background: linear-gradient(180deg, transparent, #5EE7DF);
            animation: meteorFall 3s linear infinite;
        }

        .meteor-1 {
            top: -100px;
            left: 20%;
            animation-delay: 0s;
        }

        .meteor-2 {
            top: -100px;
            left: 50%;
            animation-delay: 1s;
        }

        .meteor-3 {
            top: -100px;
            left: 80%;
            animation-delay: 2s;
        }

        @keyframes meteorFall {
            0% {
                transform: translateY(0) rotate(45deg);
                opacity: 0;
            }

            50% {
                opacity: 1;
            }

            100% {
                transform: translateY(1500px) rotate(45deg);
                opacity: 0;
            }
        }

        .content-container {
            width: 900px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            height: 100%;
            padding-top: 100px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 80px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #0a2540, #1a3a52);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 40px rgba(94, 231, 223, 0.3);
        }

        .check-mark {
            font-size: 48px;
            background: linear-gradient(135deg, #5EE7DF, #06b6d4);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .brand-text {
            font-size: 64px;
            font-weight: 800;
            letter-spacing: 2px;
            color: #5EE7DF;
            text-shadow: 0 0 30px rgba(94, 231, 223, 0.5);
        }

        .text-section {
            margin-bottom: 60px;
        }

        .eyebrow {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #5EE7DF;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .eyebrow::before {
            content: '';
            width: 40px;
            height: 3px;
            background: linear-gradient(90deg, #5EE7DF, #06b6d4);
            display: block;
        }

        .main-headline {
            font-size: 100px;
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -3px;
            color: white;
        }

        .gradient-word {
            background: linear-gradient(135deg, #5EE7DF, #06b6d4);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-text {
            margin-top: 30px;
            font-size: 32px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.4;
        }

        .goal-showcase {
            margin-top: auto;
            margin-bottom: 100px;
            padding: 60px;
            background: rgba(10, 37, 64, 0.3);
            backdrop-filter: blur(40px);
            border: 2px solid rgba(94, 231, 223, 0.2);
            border-radius: 50px;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .goal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .goal-title {
            font-size: 32px;
            color: white;
            font-weight: 700;
        }

        .goal-target {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #5EE7DF, #06b6d4);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .progress-bar-container {
            width: 100%;
            height: 60px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #5EE7DF, #06b6d4);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 30px;
            color: white;
            font-weight: 800;
            font-size: 24px;
            box-shadow: 0 0 40px rgba(94, 231, 223, 0.6);
            width: 73%;
        }

        .goal-stats {
            display: flex;
            justify-content: space-between;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .stat-label {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.6);
        }

        .stat-value {
            font-size: 28px;
            color: white;
            font-weight: 700;
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="meteor meteor-1"></div>
        <div class="meteor meteor-2"></div>
        <div class="meteor meteor-3"></div>
        <div class="content-container">
            <div class="header">
                <div class="logo-icon">
                    <div class="check-mark">✓</div>
                </div>
                <div class="brand-text">VYNTO</div>
            </div>
            <div class="text-section">
                <div class="eyebrow">HEDEF ODAKLI</div>
                <div class="main-headline">Hayallerini<br><span class="gradient-word">Gerçekleştir.</span></div>
                <p class="sub-text">Ev, araba, tatil - her hedefin için ayrı tasarruf planı oluştur.</p>
            </div>
            <div class="goal-showcase">
                <div class="goal-header">
                    <div class="goal-title">🏠 Ev Alımı</div>
                    <div class="goal-target">₺450.000</div>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar">₺328.500</div>
                </div>
                <div class="goal-stats">
                    <div class="stat-item">
                        <div class="stat-label">Biriken</div>
                        <div class="stat-value">₺328.5K</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Kalan</div>
                        <div class="stat-value">₺121.5K</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Tamamlanma</div>
                        <div class="stat-value">%73</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
