<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .summary-card {
            width: 500px;
            height: 650px;
            background: linear-gradient(145deg, #1a1a1a, #000);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            transform: rotateY(-10deg) rotateX(5deg);
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            overflow: hidden;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #ffd700;
            animation: fall 3s infinite linear;
        }

        .c1 {
            left: 10%;
            animation-delay: 0s;
            background: #4ee2c0;
        }

        .c2 {
            left: 30%;
            animation-delay: 1.5s;
            background: #52a5ff;
        }

        .c3 {
            left: 70%;
            animation-delay: 0.5s;
            background: #ff6b6b;
        }

        .c4 {
            left: 90%;
            animation-delay: 2s;
            background: #ffd700;
        }

        .s-title {
            color: #888;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .s-month {
            color: #fff;
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 40px;
        }

        .progress-ring {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            border: 20px solid rgba(255, 255, 255, 0.05);
            border-top-color: #4ee2c0;
            border-right-color: #4ee2c0;
            transform: rotate(-45deg);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 40px rgba(78, 226, 192, 0.2);
            margin-bottom: 40px;
        }

        .ring-inner {
            transform: rotate(45deg);
            text-align: center;
        }

        .p-val {
            font-size: 50px;
            font-weight: 800;
            color: #fff;
        }

        .p-label {
            font-size: 16px;
            color: #4ee2c0;
            font-weight: 600;
        }

        .stat-row {
            width: 100%;
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 15px;
        }

        .st-label {
            color: #aaa;
            font-size: 16px;
        }

        .st-val {
            color: #fff;
            font-size: 20px;
            font-weight: 700;
        }

        @keyframes fall {
            0% {
                top: -10px;
                opacity: 1;
                transform: rotate(0deg);
            }

            100% {
                top: 100%;
                opacity: 0;
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>

            <div class="headline">Büyük<br><span class="gradient-word">Başarı.</span></div>

            <div class="visual-container">
                <div class="summary-card">
                    <div class="confetti c1"></div>
                    <div class="confetti c2"></div>
                    <div class="confetti c3"></div>
                    <div class="confetti c4"></div>

                    <div class="s-title">AYLIK RAPOR</div>
                    <div class="s-month">Şubat 2026</div>

                    <div class="progress-ring">
                        <div class="ring-inner">
                            <div class="p-val">%15</div>
                            <div class="p-label">TASARRUF</div>
                        </div>
                    </div>

                    <div class="stat-row">
                        <div class="st-label">Toplam Gelir</div>
                        <div class="st-val">₺45.000</div>
                    </div>
                    <div class="stat-row" style="border:none;">
                        <div class="st-label">Toplam Harcama</div>
                        <div class="st-val">₺38.250</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
