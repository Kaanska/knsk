<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 90% 10%, #0d323f 0%, #081116 60%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 900px;
            z-index: 10;
            padding-top: 120px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 80px;
        }

        .app-icon {
            width: 90px;
            height: 90px;
            border-radius: 22px;
        }

        .brand-name {
            font-size: 56px;
            font-weight: 800;
            color: #3da9eb;
            letter-spacing: -1.5px;
        }

        .eyebrow {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #3da9eb;
            text-transform: uppercase;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .eyebrow::before {
            content: '';
            width: 50px;
            height: 3px;
            background: #3da9eb;
        }

        .headline {
            font-size: 115px;
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -4.5px;
            color: #fff;
            margin-bottom: 30px;
        }

        .blue-text {
            color: #3da9eb;
        }

        .description {
            font-size: 34px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.4;
            max-width: 820px;
            font-weight: 500;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .sculpture-block {
            width: 400px;
            height: 400px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            position: relative;
            overflow: hidden;
        }

        .chisel-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #3da9eb 0%, transparent 70%);
            opacity: 0;
            animation: strike 2s infinite;
        }

        .statue-bits {
            position: absolute;
            font-size: 40px;
        }

        @keyframes strike {
            0% {
                opacity: 0;
                transform: scale(0.5);
            }

            20% {
                opacity: 1;
                transform: scale(1.2);
            }

            100% {
                opacity: 0;
                transform: scale(1.5);
            }
        }

        .chisel-icon {
            font-size: 150px;
            filter: drop-shadow(0 0 30px #3da9eb);
            animation: hammer 2s infinite;
        }

        @keyframes hammer {

            0%,
            100% {
                transform: rotate(0deg);
            }

            20% {
                transform: rotate(-30deg);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header"><img src="images/AppIcon.png" class="app-icon"><span class="brand-name">VYNTO</span>
            </div>
            <div class="eyebrow">USTA İŞİ ANALİZ</div>
            <div class="headline">Geleceğini<br><span class="blue-text">Kendin Şekillendir.</span></div>
            <div class="description">Gereksiz giderleri tıraşlayın, finansal özgürlüğün heykelini dikin. Vynto AI, usta
                bir heykeltıraş gibi bütçenizi kusursuzlaştırır.</div>
            <div class="visual-container">
                <div class="sculpture-block">
                    <div class="chisel-glow"></div>
                    <div
                        style="display:flex; align-items:center; justify-content:center; height:100%; font-size:120px;">
                        🗿</div>
                </div>
                <div class="chisel-icon" style="position:absolute; right:150px; top:150px;">🔨</div>
            </div>
        </div>
    </div>
</body>

</html>
