<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .pet-stage {
            width: 500px;
            height: 500px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .paw-print {
            width: 200px;
            height: 200px;
            background: #fff;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            display: flex;
            justify-content: center;
            position: relative;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.3);
            animation: bounce-paw 2s infinite ease-out;
        }

        .toe {
            width: 60px;
            height: 60px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            top: -60px;
        }

        .t1 {
            left: -50px;
            transform: rotate(-20deg);
        }

        .t2 {
            left: 70px;
            transform: rotate(20deg);
        }

        .t3 {
            width: 50px;
            height: 50px;
            top: -20px;
            left: -90px;
            transform: rotate(-40deg);
        }

        .t4 {
            width: 50px;
            height: 50px;
            top: -20px;
            right: -90px;
            transform: rotate(40deg);
        }

        .exp-tag {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            color: #000;
            padding: 10px 30px;
            border-radius: 30px;
            font-weight: 800;
            font-size: 20px;
            margin-top: 50px;
            box-shadow: 0 10px 40px rgba(255, 107, 107, 0.4);
        }

        @keyframes bounce-paw {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Can<br><span class="gradient-word">Dostum.</span></div>
            <div class="visual-container">
                <div class="pet-stage">
                    <div class="paw-print">
                        <div class="toe t1"></div>
                        <div class="toe t2"></div>
                        <div class="toe t3"></div>
                        <div class="toe t4"></div>
                    </div>
                    <div class="exp-tag">🐾 Veteriner: -850₺</div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
