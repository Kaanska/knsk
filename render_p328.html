<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .desk-setup {
            position: relative;
            width: 500px;
            height: 400px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            transform: rotateX(10deg);
        }

        .laptop {
            width: 300px;
            height: 200px;
            background: #333;
            border-radius: 10px 10px 0 0;
            box-shadow: 0 50px 80px rgba(0, 0, 0, 0.8);
            position: relative;
            z-index: 2;
        }

        .screen {
            width: 280px;
            height: 180px;
            background: #000;
            margin: 10px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .screen-code {
            color: #4ee2c0;
            font-family: monospace;
            font-size: 10px;
            width: 80%;
            text-align: left;
        }

        .coffee-mug {
            width: 50px;
            height: 60px;
            background: #fff;
            border-radius: 0 0 10px 10px;
            position: absolute;
            right: 50px;
            bottom: 0;
            z-index: 3;
        }

        .passport {
            width: 50px;
            height: 70px;
            background: #8B0000;
            position: absolute;
            left: 60px;
            bottom: 0;
            transform: rotate(-10deg);
            z-index: 1;
        }

        .check-mark {
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 80px;
            background: #4ee2c0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: #000;
            box-shadow: 0 0 40px rgba(78, 226, 192, 0.4);
            animation: pop-check 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop-check {
            0% {
                transform: translateX(-50%) scale(0);
            }

            100% {
                transform: translateX(-50%) scale(1);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Ofis<br><span class="gradient-word">Her Yerde.</span></div>
            <div class="visual-container">
                <div class="desk-setup">
                    <div class="check-mark">✓</div>
                    <div class="laptop">
                        <div class="screen">
                            <div class="screen-code">
                                > Invoice Sent<br><br>
                                > Payment: Confirmed<br><br>
                                > Balance: +$1,200
                            </div>
                        </div>
                    </div>
                    <div class="passport"></div>
                    <div class="coffee-mug"></div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
