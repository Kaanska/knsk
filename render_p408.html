<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: radial-gradient(ellipse at center, #0d1b2a 0%, #000 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .glow-line {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, transparent, #5EE7DF, transparent);
            animation: lineSlide 4s linear infinite;
        }

        .line-1 {
            width: 100%;
            top: 25%;
            animation-delay: 0s;
        }

        .line-2 {
            width: 100%;
            top: 50%;
            animation-delay: 1s;
        }

        .line-3 {
            width: 100%;
            top: 75%;
            animation-delay: 2s;
        }

        @keyframes lineSlide {
            0% {
                transform: translateX(-100%);
                opacity: 0;
            }

            50% {
                opacity: 1;
            }

            100% {
                transform: translateX(100%);
                opacity: 0;
            }
        }

        .content-container {
            width: 900px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            height: 100%;
            padding-top: 100px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 80px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #0a2540, #1a3a52);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 40px rgba(94, 231, 223, 0.3);
        }

        .check-mark {
            font-size: 48px;
            background: linear-gradient(135deg, #5EE7DF, #06b6d4);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .brand-text {
            font-size: 64px;
            font-weight: 800;
            letter-spacing: 2px;
            color: #5EE7DF;
            text-shadow: 0 0 30px rgba(94, 231, 223, 0.5);
        }

        .text-section {
            margin-bottom: 60px;
        }

        .eyebrow {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #5EE7DF;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .eyebrow::before {
            content: '';
            width: 40px;
            height: 3px;
            background: linear-gradient(90deg, #5EE7DF, #06b6d4);
            display: block;
        }

        .main-headline {
            font-size: 100px;
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -3px;
            color: white;
        }

        .gradient-word {
            background: linear-gradient(135deg, #5EE7DF, #06b6d4);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-text {
            margin-top: 30px;
            font-size: 32px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.4;
        }

        .testimonial-card {
            margin-top: auto;
            margin-bottom: 100px;
            padding: 60px;
            background: rgba(10, 37, 64, 0.4);
            backdrop-filter: blur(40px);
            border: 2px solid rgba(94, 231, 223, 0.2);
            border-radius: 50px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .quote-icon {
            font-size: 80px;
            color: #5EE7DF;
            opacity: 0.3;
        }

        .testimonial-text {
            font-size: 32px;
            color: white;
            line-height: 1.6;
            font-weight: 500;
            font-style: italic;
        }

        .testimonial-author {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
        }

        .author-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, #5EE7DF, #06b6d4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }

        .author-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .author-name {
            font-size: 24px;
            color: white;
            font-weight: 700;
        }

        .author-title {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.6);
        }

        .stars {
            font-size: 28px;
            color: #5EE7DF;
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="glow-line line-1"></div>
        <div class="glow-line line-2"></div>
        <div class="glow-line line-3"></div>
        <div class="content-container">
            <div class="header">
                <div class="logo-icon">
                    <div class="check-mark">✓</div>
                </div>
                <div class="brand-text">VYNTO</div>
            </div>
            <div class="text-section">
                <div class="eyebrow">KULLANICI DENEYİMLERİ</div>
                <div class="main-headline">Kullanıcılar<br><span class="gradient-word">Ne Diyor?</span></div>
                <p class="sub-text">Binlerce kullanıcı Vynto ile finansal hedeflerine ulaştı.</p>
            </div>
            <div class="testimonial-card">
                <div class="quote-icon">"</div>
                <div class="testimonial-text">
                    Vynto sayesinde 6 ayda ₺45.000 tasarruf ettim. Harcamalarımı görselleştirmek gerçekten işe yarıyor!
                </div>
                <div class="stars">⭐⭐⭐⭐⭐</div>
                <div class="testimonial-author">
                    <div class="author-avatar">👤</div>
                    <div class="author-info">
                        <div class="author-name">Ahmet Y.</div>
                        <div class="author-title">Vynto Kullanıcısı</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
