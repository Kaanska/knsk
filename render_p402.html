<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: linear-gradient(180deg, #0f0f1e 0%, #1a1a2e 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .circuit-line {
            position: absolute;
            background: rgba(94, 231, 223, 0.2);
        }

        .line-h1 {
            width: 100%;
            height: 2px;
            top: 20%;
            animation: lineGlow 3s ease-in-out infinite;
        }

        .line-h2 {
            width: 100%;
            height: 2px;
            top: 50%;
            animation: lineGlow 3s ease-in-out infinite;
            animation-delay: 1s;
        }

        .line-v1 {
            width: 2px;
            height: 100%;
            left: 30%;
            animation: lineGlow 3s ease-in-out infinite;
            animation-delay: 0.5s;
        }

        .line-v2 {
            width: 2px;
            height: 100%;
            right: 30%;
            animation: lineGlow 3s ease-in-out infinite;
            animation-delay: 1.5s;
        }

        @keyframes lineGlow {

            0%,
            100% {
                opacity: 0.2;
            }

            50% {
                opacity: 0.6;
                box-shadow: 0 0 10px #5EE7DF;
            }
        }

        .content-container {
            width: 900px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            height: 100%;
            padding-top: 100px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 80px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #0a2540, #1a3a52);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 40px rgba(94, 231, 223, 0.3);
        }

        .check-mark {
            font-size: 48px;
            background: linear-gradient(135deg, #5EE7DF, #06b6d4);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .brand-text {
            font-size: 64px;
            font-weight: 800;
            letter-spacing: 2px;
            color: #5EE7DF;
            text-shadow: 0 0 30px rgba(94, 231, 223, 0.5);
        }

        .text-section {
            margin-bottom: 60px;
        }

        .eyebrow {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #5EE7DF;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .eyebrow::before {
            content: '';
            width: 40px;
            height: 3px;
            background: linear-gradient(90deg, #5EE7DF, #06b6d4);
            display: block;
        }

        .main-headline {
            font-size: 100px;
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -3px;
            color: white;
        }

        .gradient-word {
            background: linear-gradient(135deg, #5EE7DF, #06b6d4);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-text {
            margin-top: 30px;
            font-size: 32px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.4;
        }

        .security-badge {
            margin-top: auto;
            margin-bottom: 100px;
            align-self: center;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(94, 231, 223, 0.2), transparent 70%);
            border: 4px solid #5EE7DF;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 25px;
            box-shadow: 0 0 100px rgba(94, 231, 223, 0.6);
            position: relative;
        }

        .badge-icon {
            font-size: 100px;
        }

        .badge-title {
            font-size: 36px;
            color: white;
            font-weight: 800;
        }

        .badge-subtitle {
            font-size: 22px;
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
        }

        .shield-ring {
            position: absolute;
            width: 520px;
            height: 520px;
            border: 2px dashed rgba(94, 231, 223, 0.3);
            border-radius: 50%;
            animation: shieldRotate 20s linear infinite;
        }

        @keyframes shieldRotate {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="circuit-line line-h1"></div>
        <div class="circuit-line line-h2"></div>
        <div class="circuit-line line-v1"></div>
        <div class="circuit-line line-v2"></div>
        <div class="content-container">
            <div class="header">
                <div class="logo-icon">
                    <div class="check-mark">✓</div>
                </div>
                <div class="brand-text">VYNTO</div>
            </div>
            <div class="text-section">
                <div class="eyebrow">GÜVENLİK</div>
                <div class="main-headline">Verilerin<br><span class="gradient-word">Güvende.</span></div>
                <p class="sub-text">Banka düzeyinde şifreleme. Finansal bilgilerin tamamen korumalı.</p>
            </div>
            <div class="security-badge">
                <div class="shield-ring"></div>
                <div class="badge-icon">🔒</div>
                <div class="badge-title">256-Bit Şifreleme</div>
                <div class="badge-subtitle">Askeri seviye güvenlik</div>
            </div>
        </div>
    </div>
</body>

</html>
