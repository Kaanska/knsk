<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: linear-gradient(180deg, #0a3d4a 0%, #051923 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .gradient-mesh {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
            background:
                radial-gradient(at 20% 30%, rgba(94, 231, 223, 0.1) 0px, transparent 50%),
                radial-gradient(at 80% 70%, rgba(6, 182, 212, 0.1) 0px, transparent 50%),
                radial-gradient(at 50% 50%, rgba(20, 184, 166, 0.08) 0px, transparent 50%);
        }

        .content-container {
            width: 900px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            height: 100%;
            padding-top: 100px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 80px;
        }

        .logo-icon {
            width: 56px;
            height: 56px;
            background: rgba(10, 20, 30, 0.6);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .check-mark {
            font-size: 32px;
            color: #5EE7DF;
            font-weight: 800;
        }

        .brand-text {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: 1px;
            color: #5EE7DF;
        }

        .text-section {
            margin-bottom: 60px;
        }

        .eyebrow {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 3px;
            color: #5EE7DF;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .eyebrow::before {
            content: '';
            width: 30px;
            height: 2px;
            background: #5EE7DF;
            display: block;
        }

        .main-headline {
            font-size: 100px;
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -3px;
            color: white;
        }

        .gradient-word {
            color: #5EE7DF;
        }

        .sub-text {
            margin-top: 30px;
            font-size: 28px;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.4;
        }

        .comparison-card {
            margin-top: auto;
            margin-bottom: 100px;
            padding: 50px;
            background: rgba(10, 37, 64, 0.3);
            backdrop-filter: blur(40px);
            border: 2px solid rgba(94, 231, 223, 0.2);
            border-radius: 50px;
            display: flex;
            gap: 40px;
            align-items: center;
        }

        .comparison-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .comparison-label {
            font-size: 24px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .comparison-value {
            font-size: 64px;
            font-weight: 800;
        }

        .value-before {
            color: #f43f5e;
        }

        .value-after {
            color: #5EE7DF;
        }

        .divider {
            width: 3px;
            height: 200px;
            background: linear-gradient(180deg, transparent, #5EE7DF, transparent);
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="gradient-mesh"></div>
        <div class="content-container">
            <div class="header">
                <div class="logo-icon">
                    <div class="check-mark">✓</div>
                </div>
                <div class="brand-text">VYNTO</div>
            </div>
            <div class="text-section">
                <div class="eyebrow">FARK YARATAN</div>
                <div class="main-headline">Tasarruf<br><span class="gradient-word">Gücü.</span></div>
                <p class="sub-text">Vynto ile aylık tasarrufun nasıl arttı? Rakamlar ortada.</p>
            </div>
            <div class="comparison-card">
                <div class="comparison-side">
                    <div class="comparison-label">Vynto Öncesi</div>
                    <div class="comparison-value value-before">₺3.2K</div>
                </div>
                <div class="divider"></div>
                <div class="comparison-side">
                    <div class="comparison-label">Vynto Sonrası</div>
                    <div class="comparison-value value-after">₺18.5K</div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
