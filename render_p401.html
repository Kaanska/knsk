<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #000;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #5EE7DF;
            border-radius: 50%;
            box-shadow: 0 0 15px #5EE7DF;
            animation: sparkle 2s ease-in-out infinite;
        }

        @keyframes sparkle {

            0%,
            100% {
                opacity: 0;
                transform: scale(0);
            }

            50% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .content-container {
            width: 900px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            height: 100%;
            padding-top: 100px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 80px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #0a2540, #1a3a52);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 40px rgba(94, 231, 223, 0.3);
        }

        .check-mark {
            font-size: 48px;
            background: linear-gradient(135deg, #5EE7DF, #06b6d4);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .brand-text {
            font-size: 64px;
            font-weight: 800;
            letter-spacing: 2px;
            color: #5EE7DF;
            text-shadow: 0 0 30px rgba(94, 231, 223, 0.5);
        }

        .text-section {
            margin-bottom: 60px;
        }

        .eyebrow {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #5EE7DF;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .eyebrow::before {
            content: '';
            width: 40px;
            height: 3px;
            background: linear-gradient(90deg, #5EE7DF, #06b6d4);
            display: block;
        }

        .main-headline {
            font-size: 100px;
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -3px;
            color: white;
        }

        .gradient-word {
            background: linear-gradient(135deg, #5EE7DF, #06b6d4);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-text {
            margin-top: 30px;
            font-size: 32px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.4;
        }

        .achievement-grid {
            margin-top: auto;
            margin-bottom: 100px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
        }

        .achievement-card {
            padding: 40px;
            background: rgba(10, 37, 64, 0.4);
            backdrop-filter: blur(30px);
            border: 2px solid rgba(94, 231, 223, 0.3);
            border-radius: 35px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .achievement-icon {
            font-size: 72px;
        }

        .achievement-title {
            font-size: 26px;
            color: white;
            font-weight: 700;
            text-align: center;
        }

        .achievement-desc {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="sparkle" style="top: 15%; left: 20%; animation-delay: 0s;"></div>
        <div class="sparkle" style="top: 25%; left: 75%; animation-delay: 0.5s;"></div>
        <div class="sparkle" style="top: 45%; left: 10%; animation-delay: 1s;"></div>
        <div class="sparkle" style="top: 65%; left: 85%; animation-delay: 1.5s;"></div>
        <div class="sparkle" style="top: 80%; left: 30%; animation-delay: 2s;"></div>
        <div class="content-container">
            <div class="header">
                <div class="logo-icon">
                    <div class="check-mark">✓</div>
                </div>
                <div class="brand-text">VYNTO</div>
            </div>
            <div class="text-section">
                <div class="eyebrow">BAŞARILAR</div>
                <div class="main-headline">Kazanımlar<br><span class="gradient-word">Ödüllendir.</span></div>
                <p class="sub-text">Her hedef bir başarı. Motivasyonunu yüksek tut.</p>
            </div>
            <div class="achievement-grid">
                <div class="achievement-card">
                    <div class="achievement-icon">🏆</div>
                    <div class="achievement-title">İlk Hedef</div>
                    <div class="achievement-desc">İlk tasarruf hedefini tamamladın</div>
                </div>
                <div class="achievement-card">
                    <div class="achievement-icon">🔥</div>
                    <div class="achievement-title">30 Gün Streak</div>
                    <div class="achievement-desc">30 gün üst üste kayıt yaptın</div>
                </div>
                <div class="achievement-card">
                    <div class="achievement-icon">💎</div>
                    <div class="achievement-title">Bütçe Ustası</div>
                    <div class="achievement-desc">3 ay üst üste bütçede kaldın</div>
                </div>
                <div class="achievement-card">
                    <div class="achievement-icon">⭐</div>
                    <div class="achievement-title">Tasarruf Şampiyonu</div>
                    <div class="achievement-desc">₺50K tasarruf biriktirdin</div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
