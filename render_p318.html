<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .key-house {
            position: relative;
            width: 500px;
            height: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .key {
            width: 300px;
            height: 100px;
            background: #ffd700;
            border-radius: 50px;
            position: relative;
            box-shadow: 0 10px 40px rgba(255, 215, 0, 0.4);
        }

        .key-head {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #ffd700;
            position: absolute;
            left: -50px;
            top: -10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            color: #b8860b;
        }

        .key-teeth {
            width: 40px;
            height: 50px;
            background: #ffd700;
            position: absolute;
            bottom: -40px;
            right: 50px;
        }

        .progress-bar-h {
            width: 400px;
            height: 20px;
            background: #333;
            border-radius: 10px;
            margin-top: 50px;
            overflow: hidden;
        }

        .p-fill {
            width: 65%;
            height: 100%;
            background: linear-gradient(90deg, #4ee2c0, #52a5ff);
            border-radius: 10px;
            animation: load 3s ease-out;
        }

        .p-txt {
            color: #fff;
            margin-top: 15px;
            font-weight: 700;
            font-size: 18px;
        }

        @keyframes load {
            0% {
                width: 0;
            }

            100% {
                width: 65%;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Hayallerine<br><span class="gradient-word">Adım Adım.</span></div>
            <div class="visual-container">
                <div class="key-house">
                    <div class="key">
                        <div class="key-head">🏠</div>
                        <div class="key-teeth"></div>
                        <div class="key-teeth" style="right: 100px;"></div>
                    </div>

                    <div class="progress-bar-h">
                        <div class="p-fill"></div>
                    </div>
                    <div class="p-txt">Ev Fonu: %65</div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
