<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 85% 15%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 60px;
        }

        .app-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 54px;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .eyebrow-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .eyebrow-line {
            width: 50px;
            height: 4px;
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            border-radius: 2px;
        }

        .eyebrow-text {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 4px;
            color: #4ee2c0;
            text-transform: uppercase;
        }

        .headline {
            font-size: 115px;
            font-weight: 800;
            line-height: 0.92;
            letter-spacing: -5px;
            color: #fff;
            margin-bottom: 30px;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            font-size: 34px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.4;
            max-width: 800px;
            font-weight: 500;
            margin-bottom: 60px;
        }

        /* VISUAL: Holographic Report */
        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .report-holo {
            width: 400px;
            height: 550px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            transform: rotateX(20deg) scale(0.9);
            position: relative;
            display: flex;
            flex-direction: column;
            padding: 30px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
            animation: sheet-float 6s infinite ease-in-out;
        }

        .holo-beam {
            position: absolute;
            bottom: -150px;
            width: 100%;
            height: 200px;
            background: linear-gradient(to top, rgba(78, 226, 192, 0.2), transparent);
            clip-path: polygon(20% 100%, 80% 100%, 100% 0, 0 0);
            pointer-events: none;
        }

        .r-header {
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 20px;
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: 800;
            color: #fff;
            display: flex;
            justify-content: space-between;
        }

        .r-month {
            font-size: 16px;
            color: #4ee2c0;
            font-weight: 600;
            padding: 5px 10px;
            background: rgba(78, 226, 192, 0.1);
            border-radius: 10px;
        }

        .r-row {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 15px;
        }

        .r-pos {
            color: #4ee2c0;
            font-weight: 700;
        }

        .r-neg {
            color: #ff6b6b;
            font-weight: 700;
        }

        .r-chart-area {
            margin-top: auto;
            height: 150px;
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            gap: 10px;
        }

        .r-col {
            width: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            position: relative;
        }

        .r-col-fill {
            position: absolute;
            bottom: 0;
            width: 100%;
            border-radius: 5px;
            opacity: 0.8;
        }

        @keyframes sheet-float {

            0%,
            100% {
                transform: rotateX(20deg) rotateY(0deg) translateY(0);
            }

            50% {
                transform: rotateX(25deg) rotateY(5deg) translateY(-20px);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>

            <div class="eyebrow-container">
                <div class="eyebrow-line"></div>
                <div class="eyebrow-text">AYLIK RAPORLAR</div>
            </div>

            <div class="headline">Tüm Ayın<br><span class="gradient-word">Karnesi.</span></div>
            <div class="description">Ay sonunda sürpriz yok. Vynto, gelir, gider ve tasarruf performansını analiz eder
                ve sana detaylı bir PDF karnesi sunar.</div>

            <div class="visual-container">
                <div class="report-holo">
                    <div class="holo-beam"></div>
                    <div class="r-header">
                        ŞUBAT RAPORU
                        <span class="r-month">2026</span>
                    </div>
                    <div class="r-row"><span>Toplam Gelir</span><span class="r-pos">₺54,200</span></div>
                    <div class="r-row"><span>Toplam Gider</span><span class="r-neg">₺32,450</span></div>
                    <div class="r-row"><span>Net Tasarruf</span><span class="r-pos">₺21,750</span></div>

                    <div class="r-chart-area">
                        <div class="r-col" style="height: 60%;">
                            <div class="r-col-fill" style="height: 100%; background: #4ee2c0;"></div>
                        </div>
                        <div class="r-col" style="height: 80%;">
                            <div class="r-col-fill" style="height: 100%; background: #52a5ff;"></div>
                        </div>
                        <div class="r-col" style="height: 40%;">
                            <div class="r-col-fill" style="height: 100%; background: #4ee2c0;"></div>
                        </div>
                        <div class="r-col" style="height: 90%;">
                            <div class="r-col-fill" style="height: 100%; background: #52a5ff;"></div>
                        </div>
                        <div class="r-col" style="height: 50%;">
                            <div class="r-col-fill" style="height: 100%; background: #4ee2c0;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
