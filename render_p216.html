<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #050505;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .bg-gradient {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 120%, rgba(78, 226, 192, 0.2) 0%, transparent 60%);
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 70px;
        }

        .app-icon {
            width: 90px;
            height: 90px;
            border-radius: 22px;
        }

        .brand-name {
            font-size: 50px;
            font-weight: 900;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .eyebrow {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 6px;
            color: #4ee2c0;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .headline {
            font-size: 110px;
            font-weight: 800;
            line-height: 0.92;
            letter-spacing: -4px;
            color: #fff;
            margin-bottom: 30px;
        }

        .grad-text {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            font-size: 34px;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.4;
            max-width: 800px;
            font-weight: 500;
        }

        /* Central Piece: Glowing Web */
        .nexus-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-top: 50px;
        }

        .nexus-core {
            width: 450px;
            height: 450px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .grid-line {
            position: absolute;
            background: linear-gradient(to right, transparent, #4ee2c0, transparent);
            height: 1px;
            width: 200%;
            opacity: 0.3;
        }

        .grid-h {
            animation: slideH 5s infinite linear;
        }

        .grid-v {
            transform: rotate(90deg);
            animation: slideV 5s infinite linear;
        }

        @keyframes slideH {
            0% {
                top: -100%;
            }

            100% {
                top: 200%;
            }
        }

        @keyframes slideV {
            0% {
                left: -100%;
            }

            100% {
                left: 200%;
            }
        }

        .nexus-icon {
            font-size: 120px;
            filter: drop-shadow(0 0 40px #4ee2c0);
            z-index: 5;
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="bg-gradient"></div>
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="eyebrow">FİNANSAL NEKSUS</div>
            <div class="headline">Tüm Dünyan<br><span class="grad-text">Tek Bir Odakta.</span></div>
            <div class="description">Bankalar, kripto, nakit; her şey tek bir akıllı merkezde birleşiyor. Karar vermek
                hiç bu kadar hızlı ve net olmamıştı.</div>
            <div class="nexus-container">
                <div class="nexus-core">
                    <div class="grid-line grid-h" style="top: 10%;"></div>
                    <div class="grid-line grid-h" style="top: 30%; animation-delay: 1s;"></div>
                    <div class="grid-line grid-h" style="top: 50%; animation-delay: 2s;"></div>
                    <div class="grid-line grid-v" style="left: 10%;"></div>
                    <div class="grid-line grid-v" style="left: 40%; animation-delay: 1.5s;"></div>
                    <div class="nexus-icon">🛰️</div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
