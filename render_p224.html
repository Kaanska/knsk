<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 90% 10%, #0d323f 0%, #081116 60%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 900px;
            z-index: 10;
            padding-top: 120px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 80px;
        }

        .app-icon {
            width: 90px;
            height: 90px;
            border-radius: 22px;
        }

        .brand-name {
            font-size: 56px;
            font-weight: 800;
            color: #3da9eb;
            letter-spacing: -1px;
        }

        .eyebrow {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #3da9eb;
            text-transform: uppercase;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .eyebrow::before {
            content: '';
            width: 50px;
            height: 3px;
            background: #3da9eb;
        }

        .headline {
            font-size: 115px;
            font-weight: 800;
            line-height: 0.92;
            letter-spacing: -4.5px;
            color: #fff;
            margin-bottom: 30px;
        }

        .blue-text {
            color: #3da9eb;
        }

        .description {
            font-size: 34px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.4;
            max-width: 820px;
            font-weight: 500;
        }

        /* Central Piece: Speed Flash */
        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .speed-bolt {
            font-size: 200px;
            filter: drop-shadow(0 0 40px #3da9eb);
            animation: bolt-dash 1.5s infinite ease-in-out;
        }

        .speed-line {
            position: absolute;
            height: 4px;
            background: linear-gradient(to right, transparent, #3da9eb, transparent);
            border-radius: 2px;
        }

        @keyframes bolt-dash {
            0% {
                transform: scale(1) skewX(0);
                opacity: 0.8;
            }

            50% {
                transform: scale(1.1) skewX(-10deg);
                opacity: 1;
            }

            100% {
                transform: scale(1) skewX(0);
                opacity: 0.8;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header"><img src="images/AppIcon.png" class="app-icon"><span class="brand-name">VYNTO</span>
            </div>
            <div class="eyebrow">YILDIRIM HIZI</div>
            <div class="headline">Karar Vermek<br><span class="blue-text">Artık Çok Hızlı.</span></div>
            <div class="description">Vynto AI milisaniyeler içinde tüm bütçenizi analiz eder ve size anlık raporlar
                sunar. Hız, yeni standartımız.</div>
            <div class="visual-container">
                <div class="speed-line" style="width: 100%; top: 45%; opacity: 0.2;"></div>
                <div class="speed-line" style="width: 80%; top: 55%; opacity: 0.1;"></div>
                <div class="speed-bolt">⚡</div>
            </div>
        </div>
    </div>
</body>

</html>
