<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .screen-mock {
            width: 500px;
            height: 600px;
            background: #000;
            border: 4px solid #333;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .dirty-bills {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: center;
            gap: 20px;
            opacity: 0.5;
            filter: blur(2px);
        }

        .bill-icon {
            font-size: 40px;
            color: #ff6b6b;
            transform: rotate(10deg);
        }

        .clean-zone {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(8, 17, 22, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            clip-path: polygon(0 0, 100% 0, 100% 0, 0 100%);
            animation: wipe-screen 3s infinite ease-in-out;
        }

        .wiper-bar {
            position: absolute;
            width: 100%;
            height: 5px;
            background: #4ee2c0;
            top: 50%;
            left: 0;
            box-shadow: 0 0 20px #4ee2c0;
            transform-origin: left center;
            animation: wipe-move 3s infinite ease-in-out;
        }

        .success-check {
            font-size: 150px;
            color: #4ee2c0;
            opacity: 1;
            filter: drop-shadow(0 0 20px #4ee2c0);
        }

        @keyframes wipe-screen {
            0% {
                clip-path: polygon(0 100%, 0 0, 0 0, 0 100%);
            }

            50% {
                clip-path: polygon(0 100%, 0 0, 100% 0, 100% 100%);
            }

            100% {
                clip-path: polygon(0 100%, 0 0, 100% 0, 100% 100%);
            }
        }

        /* Simplified animation for concept */
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Tertemiz<br><span class="gradient-word">Bir Sayfa.</span></div>
            <div class="visual-container">
                <div class="screen-mock">
                    <div class="dirty-bills">
                        <div class="bill-icon">📄</div>
                        <div class="bill-icon">🧾</div>
                        <div class="bill-icon">📑</div>
                        <div class="bill-icon">📉</div>
                        <div class="bill-icon">📜</div>
                        <div class="bill-icon">📃</div>
                    </div>
                    <div class="clean-zone">
                        <div class="success-check">✓</div>
                    </div>
                    <div class="wiper-bar"></div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
