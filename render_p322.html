<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .light-speed {
            width: 100%;
            height: 500px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .speed-line {
            position: absolute;
            width: 300px;
            height: 4px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 2px;
            animation: warp 0.5s infinite linear;
            box-shadow: 0 0 10px #fff;
        }

        .center-obj {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, #4ee2c0, transparent);
            border-radius: 50%;
            z-index: 10;
            position: relative;
            filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 20px #fff;
        }

        @keyframes warp {
            0% {
                opacity: 0;
                transform: translateX(-500px) scaleX(0.1);
            }

            50% {
                opacity: 1;
                transform: translateX(0) scaleX(1);
            }

            100% {
                opacity: 0;
                transform: translateX(500px) scaleX(0.1);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Işık Hızında<br><span class="gradient-word">İşlem.</span></div>
            <div class="visual-container">
                <div class="light-speed">
                    <div class="speed-line" style="top:20%; left:10%;"></div>
                    <div class="speed-line" style="top:80%; right:20%; animation-delay:0.2s;"></div>
                    <div class="center-obj">⚡</div>
                    <div class="speed-line" style="top:40%; left:50%; width:500px; animation-delay:0.1s;"></div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
