<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 60px;
        }

        .app-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 54px;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .eyebrow-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .eyebrow-line {
            width: 50px;
            height: 4px;
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            border-radius: 2px;
        }

        .eyebrow-text {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 4px;
            color: #4ee2c0;
            text-transform: uppercase;
        }

        .headline {
            font-size: 115px;
            font-weight: 800;
            line-height: 0.92;
            letter-spacing: -5px;
            color: #fff;
            margin-bottom: 30px;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            font-size: 34px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.4;
            max-width: 800px;
            font-weight: 500;
            margin-bottom: 60px;
        }

        /* VISUAL: Minimal Mode */
        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .dark-ui-mock {
            width: 320px;
            height: 600px;
            background: #111;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            position: relative;
            transform: rotateY(-20deg);
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .d-header {
            width: 100%;
            height: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .d-title {
            width: 100px;
            height: 15px;
            background: #333;
            border-radius: 10px;
        }

        .d-avatar {
            width: 40px;
            height: 40px;
            background: #333;
            border-radius: 50%;
        }

        .d-card {
            width: 100%;
            height: 150px;
            background: linear-gradient(135deg, #1a1a1a, #000);
            border-radius: 20px;
            border: 1px solid #333;
        }

        .d-list {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .d-item {
            width: 100%;
            height: 60px;
            background: #1a1a1a;
            border-radius: 15px;
        }

        .light-beam {
            position: absolute;
            width: 400px;
            height: 600px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            top: 0;
            left: -50px;
            transform: skewX(-20deg);
            pointer-events: none;
        }

        .switch-toggle {
            position: absolute;
            right: -80px;
            top: 100px;
            width: 100px;
            height: 50px;
            background: #4ee2c0;
            border-radius: 25px;
            display: flex;
            align-items: center;
            padding: 5px;
            box-shadow: 0 0 30px rgba(78, 226, 192, 0.4);
            transform: translateZ(50px);
            animation: toggle-float 3s infinite ease-in-out;
        }

        .toggle-knob {
            width: 40px;
            height: 40px;
            background: #fff;
            border-radius: 50%;
            transform: translateX(50px);
        }

        @keyframes toggle-float {

            0%,
            100% {
                transform: translateZ(50px) translateY(0);
            }

            50% {
                transform: translateZ(50px) translateY(-10px);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>

            <div class="eyebrow-container">
                <div class="eyebrow-line"></div>
                <div class="eyebrow-text">GÖZ DOSTU ARAYÜZ</div>
            </div>

            <div class="headline">Karanlığın<br><span class="gradient-word">Zarafeti.</span></div>
            <div class="description">Gece kuşu musun? Vynto'nun kusursuz Karanlık Modu ile gözlerini yormadan finansını
                yönet.</div>

            <div class="visual-container">
                <div class="dark-ui-mock">
                    <div class="d-header">
                        <div class="d-title"></div>
                        <div class="d-avatar"></div>
                    </div>
                    <div class="d-card"></div>
                    <div class="d-list">
                        <div class="d-item"></div>
                        <div class="d-item"></div>
                        <div class="d-item"></div>
                    </div>
                </div>
                <div class="light-beam"></div>
                <div class="switch-toggle">
                    <div class="toggle-knob"></div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
