<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #050505;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .core-reactor {
            width: 400px;
            height: 400px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .core-ring {
            position: absolute;
            border-radius: 50%;
            border: 2px solid rgba(82, 165, 255, 0.3);
            box-shadow: 0 0 20px rgba(82, 165, 255, 0.2);
        }

        .r1 {
            width: 100%;
            height: 100%;
            animation: spin-slow 10s infinite linear;
            border-top: 4px solid #52a5ff;
        }

        .r2 {
            width: 80%;
            height: 80%;
            animation: spin-fast 5s infinite linear reverse;
            border-left: 4px solid #4ee2c0;
        }

        .r3 {
            width: 60%;
            height: 60%;
            animation: spin-slow 8s infinite linear;
            border-bottom: 4px solid #fff;
        }

        .energy-ball {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: radial-gradient(circle, #fff, #52a5ff, #000);
            box-shadow: 0 0 100px #52a5ff;
            animation: pulse-core 2s infinite ease-in-out;
            z-index: 10;
        }

        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .p {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            animation: fly-out 2s infinite ease-out;
        }

        @keyframes spin-slow {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes spin-fast {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes pulse-core {
            0% {
                transform: scale(1);
                opacity: 0.8;
                box-shadow: 0 0 80px #52a5ff;
            }

            50% {
                transform: scale(1.1);
                opacity: 1;
                box-shadow: 0 0 120px #4ee2c0;
            }

            100% {
                transform: scale(1);
                opacity: 0.8;
                box-shadow: 0 0 80px #52a5ff;
            }
        }

        @keyframes fly-out {
            0% {
                transform: translate(-50%, -50%) rotate(var(--r)) translate(0px);
                opacity: 1;
            }

            100% {
                transform: translate(-50%, -50%) rotate(var(--r)) translate(200px);
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Güç<br><span class="gradient-word">Kaynağın.</span></div>
            <div class="visual-container">
                <div class="core-reactor">
                    <div class="core-ring r1"></div>
                    <div class="core-ring r2"></div>
                    <div class="core-ring r3"></div>
                    <div class="energy-ball"></div>
                    <div class="particles">
                        <div class="p" style="--r: 0deg; animation-delay: 0s;"></div>
                        <div class="p" style="--r: 45deg; animation-delay: 0.2s;"></div>
                        <div class="p" style="--r: 90deg; animation-delay: 0.4s;"></div>
                        <div class="p" style="--r: 135deg; animation-delay: 0.6s;"></div>
                        <div class="p" style="--r: 180deg; animation-delay: 0.8s;"></div>
                        <div class="p" style="--r: 225deg; animation-delay: 1s;"></div>
                        <div class="p" style="--r: 270deg; animation-delay: 1.2s;"></div>
                        <div class="p" style="--r: 315deg; animation-delay: 1.4s;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
