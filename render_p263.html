<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 60px;
        }

        .app-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 54px;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .eyebrow-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .eyebrow-line {
            width: 50px;
            height: 4px;
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            border-radius: 2px;
        }

        .eyebrow-text {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 4px;
            color: #4ee2c0;
            text-transform: uppercase;
        }

        .headline {
            font-size: 115px;
            font-weight: 800;
            line-height: 0.92;
            letter-spacing: -5px;
            color: #fff;
            margin-bottom: 30px;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            font-size: 34px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.4;
            max-width: 800px;
            font-weight: 500;
            margin-bottom: 60px;
        }

        /* THE "INSTANT SCAN" VISUAL */
        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 1500px;
        }

        .receipt-card {
            width: 500px;
            height: 600px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            position: relative;
            transform: rotateY(15deg);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            padding: 40px;
            overflow: hidden;
        }

        .receipt-top {
            border-bottom: 2px dashed #ddd;
            padding-bottom: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .r-title {
            font-size: 24px;
            font-weight: 800;
            color: #333;
            text-transform: uppercase;
        }

        .r-date {
            font-size: 18px;
            color: #999;
        }

        .r-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 20px;
            color: #555;
        }

        .r-total-line {
            margin-top: auto;
            border-top: 2px solid #ddd;
            padding-top: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 32px;
            font-weight: 800;
            color: #000;
        }

        .scan-layer {
            position: absolute;
            width: 150%;
            height: 80px;
            background: linear-gradient(to bottom, transparent, rgba(82, 165, 255, 0.6), rgba(82, 165, 255, 0.9));
            box-shadow: 0 0 50px rgba(82, 165, 255, 0.5);
            top: 20%;
            left: -25%;
            transform: rotate(-15deg);
            animation: scan-move 3s infinite linear;
            z-index: 20;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .scan-text {
            color: #fff;
            font-size: 36px;
            font-weight: 900;
            letter-spacing: 6px;
            text-transform: uppercase;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.5);
            opacity: 1;
        }

        @keyframes scan-move {
            0% {
                top: -20%;
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                top: 110%;
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>

            <div class="eyebrow-container">
                <div class="eyebrow-line"></div>
                <div class="eyebrow-text">ANLIK DİJİTALLEŞME</div>
            </div>

            <div class="headline">Harcamalar<br><span class="gradient-word">Dijital Hızda.</span></div>
            <div class="description">Fişleri biriktirmeyi unutun. Vynto'nun akıllı tarama özelliğiyle tüm fiziksel
                harcamalar anında dijitalleşir ve arşivlenir.</div>

            <div class="visual-container">
                <div class="receipt-card">
                    <div class="scan-layer">
                        <div class="scan-text">KAYITLI ✓</div>
                    </div>
                    <div class="receipt-top">
                        <div class="r-title">Migros Market</div>
                        <div class="r-date">10.02.2026</div>
                    </div>
                    <div class="r-item"><span>Süt 1L</span><span>₺34.50</span></div>
                    <div class="r-item"><span>Ekmek x2</span><span>₺20.00</span></div>
                    <div class="r-item"><span>Çikolata</span><span>₺45.90</span></div>
                    <div class="r-item"><span>Meyve Suyu</span><span>₺28.50</span></div>
                    <div class="r-total-line">
                        <span>TOPLAM</span>
                        <span>₺128.90</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
