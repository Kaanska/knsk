<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .rocket-launch {
            position: relative;
            width: 300px;
            height: 600px;
        }

        .rocket {
            width: 100px;
            height: 150px;
            background: #fff;
            border-radius: 50% 50% 10px 10px;
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.5);
            animation: launch 2s infinite ease-in;
            z-index: 10;
        }

        .fin {
            width: 30px;
            height: 50px;
            background: #ff6b6b;
            position: absolute;
            bottom: 0;
        }

        .f-l {
            left: -20px;
            border-radius: 10px 0 0 0;
        }

        .f-r {
            right: -20px;
            border-radius: 0 10px 0 0;
        }

        .window {
            width: 30px;
            height: 30px;
            background: #4ee2c0;
            border-radius: 50%;
            border: 4px solid #ddd;
            margin: 30px auto;
        }

        .trail {
            position: absolute;
            width: 60px;
            height: 300px;
            background: linear-gradient(to top, transparent, #ff9900, #ff6b6b);
            bottom: -200px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0.8;
            border-radius: 0 0 50px 50px;
            filter: blur(5px);
            animation: thrust 0.2s infinite;
        }

        .growth-curve {
            position: absolute;
            bottom: 50px;
            left: -100px;
            width: 500px;
            height: 400px;
            border-bottom: 4px solid rgba(255, 255, 255, 0.2);
            border-left: 4px solid rgba(255, 255, 255, 0.2);
        }

        .graph-line {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top right, transparent 50%, #4ee2c0 50%, #4ee2c0 52%, transparent 52%);
            opacity: 0.3;
        }

        @keyframes launch {
            0% {
                transform: translate(-50%, 0);
            }

            50% {
                transform: translate(-50%, -10px);
            }

            100% {
                transform: translate(-50%, 0);
            }
        }

        @keyframes thrust {
            0% {
                height: 300px;
                opacity: 0.8;
            }

            50% {
                height: 320px;
                opacity: 1;
            }

            100% {
                height: 300px;
                opacity: 0.8;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Yükselişe<br><span class="gradient-word">Geç.</span></div>
            <div class="visual-container">
                <div class="rocket-launch">
                    <div class="growth-curve">
                        <div class="graph-line"></div>
                    </div>
                    <div class="rocket">
                        <div class="window"></div>
                        <div class="fin f-l"></div>
                        <div class="fin f-r"></div>
                    </div>
                    <div class="trail"></div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
