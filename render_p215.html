<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        /* Reference Image Inspired Theme */
        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 90% 10%, #0d323f 0%, #081116 60%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* App Dashboard Glows */
        /* .ui-glow {
            position: absolute;
            width: 1000px;
            height: 1000px;
            background: radial-gradient(circle, rgba(78, 226, 192, 0.08) 0%, transparent 70%);
            filter: blur(120px);
            top: -200px;
            right: -200px;
        }

        .ui-glow-alt {
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(82, 165, 255, 0.05) 0%, transparent 70%);
            filter: blur(100px);
            bottom: -100px;
            left: -100px;
        } */

        .content {
            width: 900px;
            z-index: 10;
            padding-top: 120px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 80px;
        }

        .app-icon {
            width: 90px;
            height: 90px;
            border-radius: 22px;
        }

        .brand-name {
            font-size: 56px;
            font-weight: 800;
            color: #3da9eb;
            letter-spacing: -1.5px;
        }

        /* Updated Eyebrow from Reference */
        .eyebrow {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #3da9eb;
            text-transform: uppercase;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .eyebrow::before {
            content: '';
            width: 50px;
            height: 3px;
            background: #3da9eb;
        }

        .headline {
            font-size: 115px;
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -4.5px;
            color: #fff;
            margin-bottom: 30px;
        }

        .blue-text {
            color: #3da9eb;
        }

        /* .grad-text {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        } */

        .description {
            font-size: 34px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.4;
            max-width: 820px;
            font-weight: 500;
        }

        /* Tiger Claw Section */
        .prism-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            margin-top: 20px;
        }

        /* Glass UI Container like the app */
        .ui-card {
            width: 100%;
            height: 520px;
            background: rgba(13, 20, 24, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .claw-group {
            transform: rotate(-35deg);
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .data-line {
            width: 600px;
            height: 12px;
            background: linear-gradient(to right, transparent, #4ee2c0, #3da9eb, transparent);
            box-shadow: 0 0 35px rgba(78, 226, 192, 0.3);
            border-radius: 20px;
            animation: claw-slash 3s infinite ease-in-out;
            opacity: 0;
            position: relative;
        }

        .data-line:nth-child(2) {
            margin-left: 60px;
            width: 650px;
            animation-delay: 0.2s;
        }

        .data-line:nth-child(3) {
            margin-left: 30px;
            width: 580px;
            animation-delay: 0.4s;
        }

        @keyframes claw-slash {
            0% {
                transform: translateX(-100%) scaleX(0.5);
                opacity: 0;
            }

            30% {
                transform: translateX(0) scaleX(1.1);
                opacity: 1;
            }

            70% {
                transform: translateX(0) scaleX(1);
                opacity: 1;
            }

            100% {
                transform: translateX(100%) scaleX(0.5);
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">

        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="eyebrow">DİJİTAL PRİZMA</div>
            <div class="headline">Karmaşayı<br><span class="blue-text">Netliğe Dönüştür.</span></div>
            <div class="description">Binlerce harcama kalemi, tek bir prizmadan geçip anlamlı içgörülere dönüşüyor.
                Vynto AI ile finansal kaos, sanata dönüşür.</div>
            <div class="prism-container">
                <div class="ui-card">
                    <div class="claw-group">
                        <div class="data-line"></div>
                        <div class="data-line"></div>
                        <div class="data-line"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
