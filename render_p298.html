<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .phone-mockup {
            width: 450px;
            height: 850px;
            background: #000;
            border-radius: 55px;
            border: 6px solid #222;
            box-shadow: 0 50px 120px rgba(0, 0, 0, 0.8);
            position: relative;
            overflow: hidden;
            margin: 0 auto;
            transform: rotate(5deg);
        }

        /* Wealth List UI */
        .wealth-screen {
            width: 100%;
            height: 100%;
            background: #111;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
        }

        .total-balance-card {
            width: 100%;
            background: linear-gradient(135deg, #1fa2ff 0%, #12d8fa 100%);
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 30px;
            color: #fff;
            box-shadow: 0 20px 40px rgba(18, 216, 250, 0.3);
        }

        .tb-label {
            font-size: 14px;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tb-val {
            font-size: 42px;
            font-weight: 800;
            margin-top: 5px;
        }

        .tb-sub {
            font-size: 14px;
            margin-top: 10px;
            opacity: 0.9;
        }

        .assets-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .asset-row {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .icon-box {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-right: 15px;
        }

        .row-info {
            flex: 1;
        }

        .row-title {
            color: #fff;
            font-weight: 700;
            font-size: 18px;
        }

        .row-sub {
            color: #888;
            font-size: 14px;
            margin-top: 3px;
        }

        .row-val {
            text-align: right;
        }

        .rv-main {
            color: #fff;
            font-weight: 700;
            font-size: 18px;
        }

        .rv-sub {
            color: #4ee2c0;
            font-size: 13px;
            font-weight: 600;
            margin-top: 3px;
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>

            <div class="headline">Tüm Varlıklar<br><span class="gradient-word">Tek Ekranda.</span></div>

            <div class="visual-container">
                <div class="phone-mockup">
                    <div class="wealth-screen">
                        <!-- Top Bar -->
                        <div
                            style="display:flex; justify-content:space-between; margin-bottom:20px; color:#fff; font-weight:800; font-size:18px;">
                            <span>Cüzdanım</span>
                            <span>⚙️</span>
                        </div>

                        <div class="total-balance-card">
                            <div class="tb-label">TOPLAM VARLIK</div>
                            <div class="tb-val">₺145.250,00</div>
                            <div class="tb-sub">Anlık Piyasa Değeri</div>
                        </div>

                        <div style="color:#fff; font-weight:700; margin-bottom:15px; font-size:18px;">Varlıklarım</div>

                        <div class="assets-list">
                            <div class="asset-row">
                                <div class="icon-box">🥇</div>
                                <div class="row-info">
                                    <div class="row-title">Gram Altın</div>
                                    <div class="row-sub">20.00 Gram</div>
                                </div>
                                <div class="row-val">
                                    <div class="rv-main">49.000,00 ₺</div>
                                    <div class="rv-sub">2.450 ₺/gr</div>
                                </div>
                            </div>

                            <div class="asset-row">
                                <div class="icon-box">💵</div>
                                <div class="row-info">
                                    <div class="row-title">Amerikan Doları</div>
                                    <div class="row-sub">1.500,00 USD</div>
                                </div>
                                <div class="row-val">
                                    <div class="rv-main">53.130,00 ₺</div>
                                    <div class="rv-sub">35.42 ₺/$</div>
                                </div>
                            </div>

                            <div class="asset-row">
                                <div class="icon-box">💶</div>
                                <div class="row-info">
                                    <div class="row-title">Euro</div>
                                    <div class="row-sub">850,00 EUR</div>
                                </div>
                                <div class="row-val">
                                    <div class="rv-main">32.427,50 ₺</div>
                                    <div class="rv-sub">38.15 ₺/€</div>
                                </div>
                            </div>

                            <div class="asset-row">
                                <div class="icon-box">💸</div>
                                <div class="row-info">
                                    <div class="row-title">Nakit TL</div>
                                    <div class="row-sub">Kasa</div>
                                </div>
                                <div class="row-val">
                                    <div class="rv-main">10.692,50 ₺</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
