<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #111;
            background: linear-gradient(135deg, #1f1f1f 0%, #000 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .sub-head {
            color: #888;
            font-size: 24px;
            text-align: center;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 50px;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .watch-mechanism {
            width: 400px;
            height: 400px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gear {
            position: absolute;
            border-radius: 50%;
            border: 10px dashed #b8860b;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .g1 {
            width: 200px;
            height: 200px;
            border-color: #ffd700;
            top: 50px;
            left: 50px;
            animation: spin-cw 10s infinite linear;
        }

        .g2 {
            width: 150px;
            height: 150px;
            border-color: #c0c0c0;
            bottom: 50px;
            right: 50px;
            animation: spin-ccw 8s infinite linear;
        }

        .g3 {
            width: 100px;
            height: 100px;
            border-color: #cd7f32;
            top: 180px;
            left: 180px;
            animation: spin-cw 6s infinite linear;
        }

        .balance-wheel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, #ff0000, #500);
            border-radius: 50%;
            border: 2px solid #fff;
            box-shadow: 0 0 20px #ff0000;
            animation: pulse-ruby 1s infinite alternate;
        }

        @keyframes spin-cw {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes spin-ccw {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(-360deg);
            }
        }

        @keyframes pulse-ruby {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.8;
            }

            100% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Zamanın Değeri.</div>
            <div class="sub-head">Hassas Yönetim</div>
            <div class="visual-container">
                <div class="watch-mechanism">
                    <div class="gear g1"></div>
                    <div class="gear g2"></div>
                    <div class="gear g3"></div>
                    <div class="balance-wheel"></div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
