<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: linear-gradient(135deg, #0d1216 0%, #000 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .matrix-rain {
            width: 700px;
            height: 600px;
            position: relative;
            transform: rotateX(20deg);
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .m-col {
            display: flex;
            flex-direction: column;
            gap: 10px;
            animation: fall-rain 5s infinite linear;
        }

        .m-char {
            font-size: 24px;
            color: #4ee2c0;
            font-family: monospace;
            font-weight: 700;
            opacity: 0.5;
            text-shadow: 0 0 10px rgba(78, 226, 192, 0.5);
        }

        .m-main {
            color: #fff;
            transform: scale(1.5);
            font-weight: 900;
            opacity: 1;
            text-shadow: 0 0 20px #fff;
        }

        @keyframes fall-rain {
            0% {
                transform: translateY(-200px);
            }

            100% {
                transform: translateY(200px);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Finansın<br><span class="gradient-word">DNA'sı.</span></div>
            <div class="visual-container">
                <div class="matrix-rain">
                    <div class="m-col">
                        <div class="m-char">₺</div>
                        <div class="m-char">1</div>
                        <div class="m-char">0</div>
                        <div class="m-main">₺</div>
                        <div class="m-char">1</div>
                    </div>
                    <div class="m-col">
                        <div class="m-char">$</div>
                        <div class="m-char">0</div>
                        <div class="m-char">1</div>
                        <div class="m-char">$</div>
                        <div class="m-main">$</div>
                    </div>
                    <div class="m-col">
                        <div class="m-char">€</div>
                        <div class="m-char">1</div>
                        <div class="m-main">€</div>
                        <div class="m-char">0</div>
                        <div class="m-char">1</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
