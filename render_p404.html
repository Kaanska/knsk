<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: radial-gradient(ellipse at bottom, #0a2540 0%, #000 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .dot-grid {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle, rgba(94, 231, 223, 0.15) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
        }

        .content-container {
            width: 900px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            height: 100%;
            padding-top: 100px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 80px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #0a2540, #1a3a52);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 40px rgba(94, 231, 223, 0.3);
        }

        .check-mark {
            font-size: 48px;
            background: linear-gradient(135deg, #5EE7DF, #06b6d4);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .brand-text {
            font-size: 64px;
            font-weight: 800;
            letter-spacing: 2px;
            color: #5EE7DF;
            text-shadow: 0 0 30px rgba(94, 231, 223, 0.5);
        }

        .text-section {
            margin-bottom: 60px;
        }

        .eyebrow {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #5EE7DF;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .eyebrow::before {
            content: '';
            width: 40px;
            height: 3px;
            background: linear-gradient(90deg, #5EE7DF, #06b6d4);
            display: block;
        }

        .main-headline {
            font-size: 100px;
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -3px;
            color: white;
        }

        .gradient-word {
            background: linear-gradient(135deg, #5EE7DF, #06b6d4);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-text {
            margin-top: 30px;
            font-size: 32px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.4;
        }

        .device-mockup {
            margin-top: auto;
            margin-bottom: 100px;
            align-self: center;
            width: 350px;
            height: 700px;
            background: linear-gradient(135deg, #1a1a2e, #0f0f1e);
            border-radius: 50px;
            border: 8px solid #2a2a3e;
            padding: 20px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8), 0 0 60px rgba(94, 231, 223, 0.3);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .mockup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
        }

        .mockup-time {
            color: white;
            font-size: 18px;
            font-weight: 600;
        }

        .mockup-icons {
            display: flex;
            gap: 8px;
        }

        .icon-dot {
            width: 8px;
            height: 8px;
            background: #5EE7DF;
            border-radius: 50%;
        }

        .mockup-content {
            flex: 1;
            background: rgba(94, 231, 223, 0.1);
            border-radius: 30px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .mockup-icon {
            font-size: 80px;
        }

        .mockup-title {
            font-size: 28px;
            color: white;
            font-weight: 700;
            text-align: center;
        }

        .mockup-value {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #5EE7DF, #06b6d4);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="dot-grid"></div>
        <div class="content-container">
            <div class="header">
                <div class="logo-icon">
                    <div class="check-mark">✓</div>
                </div>
                <div class="brand-text">VYNTO</div>
            </div>
            <div class="text-section">
                <div class="eyebrow">MOBİL DENEYIM</div>
                <div class="main-headline">Her Yerde<br><span class="gradient-word">Yanında.</span></div>
                <p class="sub-text">iOS için optimize edilmiş. Finansını cebinde taşı.</p>
            </div>
            <div class="device-mockup">
                <div class="mockup-header">
                    <div class="mockup-time">14:25</div>
                    <div class="mockup-icons">
                        <div class="icon-dot"></div>
                        <div class="icon-dot"></div>
                        <div class="icon-dot"></div>
                    </div>
                </div>
                <div class="mockup-content">
                    <div class="mockup-icon">📱</div>
                    <div class="mockup-title">Bugünkü Bakiye</div>
                    <div class="mockup-value">₺42.5K</div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
