<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #000;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .gradient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            top: -100px;
            right: -100px;
            background: radial-gradient(circle, rgba(94, 231, 223, 0.3), transparent);
            animation: orbFloat 8s ease-in-out infinite;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            bottom: -100px;
            left: -100px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.3), transparent);
            animation: orbFloat 8s ease-in-out infinite;
            animation-delay: 2s;
        }

        @keyframes orbFloat {

            0%,
            100% {
                transform: translate(0, 0);
            }

            50% {
                transform: translate(30px, -30px);
            }
        }

        .content-container {
            width: 900px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            height: 100%;
            padding-top: 100px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 80px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #0a2540, #1a3a52);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 40px rgba(94, 231, 223, 0.3);
        }

        .check-mark {
            font-size: 48px;
            background: linear-gradient(135deg, #5EE7DF, #06b6d4);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .brand-text {
            font-size: 64px;
            font-weight: 800;
            letter-spacing: 2px;
            color: #5EE7DF;
            text-shadow: 0 0 30px rgba(94, 231, 223, 0.5);
        }

        .text-section {
            margin-bottom: 60px;
        }

        .eyebrow {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #5EE7DF;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .eyebrow::before {
            content: '';
            width: 40px;
            height: 3px;
            background: linear-gradient(90deg, #5EE7DF, #06b6d4);
            display: block;
        }

        .main-headline {
            font-size: 100px;
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -3px;
            color: white;
        }

        .gradient-word {
            background: linear-gradient(135deg, #5EE7DF, #06b6d4);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-text {
            margin-top: 30px;
            font-size: 32px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.4;
        }

        .chart-container {
            margin-top: auto;
            margin-bottom: 100px;
            padding: 50px;
            background: rgba(10, 37, 64, 0.3);
            backdrop-filter: blur(40px);
            border: 2px solid rgba(94, 231, 223, 0.2);
            border-radius: 50px;
        }

        .chart-bars {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            height: 350px;
            gap: 20px;
        }

        .chart-bar {
            flex: 1;
            background: linear-gradient(180deg, #5EE7DF, #06b6d4);
            border-radius: 15px 15px 0 0;
            position: relative;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 15px;
            color: white;
            font-weight: 700;
            font-size: 20px;
            box-shadow: 0 0 30px rgba(94, 231, 223, 0.4);
        }

        .bar-label {
            position: absolute;
            bottom: -35px;
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="content-container">
            <div class="header">
                <div class="logo-icon">
                    <div class="check-mark">✓</div>
                </div>
                <div class="brand-text">VYNTO</div>
            </div>
            <div class="text-section">
                <div class="eyebrow">AYLIK RAPOR</div>
                <div class="main-headline">İlerleme<br><span class="gradient-word">Grafiği.</span></div>
                <p class="sub-text">Son 6 ayda tasarrufun nasıl arttı? Görsel raporlarla takip et.</p>
            </div>
            <div class="chart-container">
                <div class="chart-bars">
                    <div class="chart-bar" style="height: 40%;">
                        ₺8K
                        <div class="bar-label">Ağu</div>
                    </div>
                    <div class="chart-bar" style="height: 55%;">
                        ₺11K
                        <div class="bar-label">Eyl</div>
                    </div>
                    <div class="chart-bar" style="height: 50%;">
                        ₺10K
                        <div class="bar-label">Eki</div>
                    </div>
                    <div class="chart-bar" style="height: 70%;">
                        ₺14K
                        <div class="bar-label">Kas</div>
                    </div>
                    <div class="chart-bar" style="height: 85%;">
                        ₺17K
                        <div class="bar-label">Ara</div>
                    </div>
                    <div class="chart-bar" style="height: 95%;">
                        ₺19K
                        <div class="bar-label">Oca</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
