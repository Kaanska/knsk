<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #111;
            background: linear-gradient(135deg, #000 0%, #1a1a1a 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .sub-head {
            color: #888;
            font-size: 24px;
            text-align: center;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 50px;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .wave-form {
            width: 800px;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .bar {
            width: 10px;
            background: linear-gradient(to top, #b8860b, #ffd700);
            border-radius: 5px;
            box-shadow: 0 0 20px #ffd700;
            animation: sound 1s infinite ease-in-out;
        }

        .gold-dust {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.2), transparent);
            mix-blend-mode: screen;
            animation: pulse-dust 2s infinite;
        }

        @keyframes sound {

            0%,
            100% {
                height: 20px;
                opacity: 0.5;
            }

            50% {
                height: 150px;
                opacity: 1;
            }
        }

        .b1 {
            animation-delay: 0s;
        }

        .b2 {
            animation-delay: 0.1s;
        }

        .b3 {
            animation-delay: 0.2s;
        }

        .b4 {
            animation-delay: 0.3s;
        }

        .b5 {
            animation-delay: 0.4s;
        }

        .b6 {
            animation-delay: 0.5s;
        }

        .b7 {
            animation-delay: 0.6s;
        }

        .b8 {
            animation-delay: 0.7s;
        }

        .b9 {
            animation-delay: 0.8s;
        }

        .b10 {
            animation-delay: 0.9s;
        }

        @keyframes pulse-dust {
            0% {
                opacity: 0.5;
                transform: scale(0.8);
            }

            100% {
                opacity: 1;
                transform: scale(1.2);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Söz = Senet.</div>
            <div class="sub-head">Altın Değerinde</div>
            <div class="visual-container">
                <div class="wave-form">
                    <div class="gold-dust"></div>
                    <div class="bar b1"></div>
                    <div class="bar b2"></div>
                    <div class="bar b3"></div>
                    <div class="bar b4"></div>
                    <div class="bar b5"></div>
                    <div class="bar b6"></div>
                    <div class="bar b7"></div>
                    <div class="bar b8"></div>
                    <div class="bar b9"></div>
                    <div class="bar b10"></div>
                    <div class="bar b1"></div>
                    <div class="bar b2"></div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
