<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .load-container {
            width: 700px;
            height: 200px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .bar-bg {
            width: 100%;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .bar-fill {
            width: 98%;
            height: 100%;
            background: linear-gradient(90deg, #4ee2c0, #52a5ff);
            border-radius: 20px;
            position: relative;
            animation: pulse-bar 2s infinite alternate;
            box-shadow: 0 0 30px rgba(78, 226, 192, 0.4);
        }

        .text-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .l-text {
            font-size: 32px;
            color: #fff;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .p-text {
            font-size: 80px;
            font-weight: 900;
            color: #4ee2c0;
            line-height: 0.8;
        }

        @keyframes pulse-bar {
            0% {
                opacity: 0.8;
                box-shadow: 0 0 10px rgba(78, 226, 192, 0.2);
            }

            100% {
                opacity: 1;
                box-shadow: 0 0 40px rgba(78, 226, 192, 0.6);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Finansal Özgürlük<br><span class="gradient-word">Yükleniyor...</span></div>
            <div class="visual-container">
                <div class="load-container">
                    <div class="text-row">
                        <div class="l-text">STATUS: ALMOST THERE</div>
                        <div class="p-text">%98</div>
                    </div>
                    <div class="bar-bg">
                        <div class="bar-fill"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
