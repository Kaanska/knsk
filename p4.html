<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 540px;
            height: 675px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #000;
            position: relative;
            overflow: hidden;
            transform: scale(0.5);
            transform-origin: top left;
        }

        .header {
            position: absolute;
            top: 80px;
            left: 80px;
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .header img {
            width: 70px;
            height: 70px;
            filter: grayscale(1) brightness(1.5);
        }

        .header span {
            font-size: 36px;
            font-weight: 800;
            color: white;
            letter-spacing: 4px;
        }

        .content {
            margin-top: 280px;
            text-align: center;
        }

        .title {
            font-size: 160px;
            font-weight: 800;
            color: #2ecc71;
            line-height: 0.8;
            letter-spacing: -8px;
        }

        .phone {
            width: 750px;
            margin-top: 50px;
            filter: drop-shadow(0 0 50px rgba(46, 204, 113, 0.1));
        }

        .badge {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #2ecc71;
            color: black;
            padding: 20px 40px;
            border-radius: 100px;
            font-weight: 800;
            font-size: 24px;
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="header">
            <img src="images/AppIcon.png">
            <span>VYNTO</span>
        </div>
        <div class="content">
            <h1 class="title">HEDEFLE.<br>KAZAN.</h1>
            <img src="images/Simulator Screenshot - iPhone 16 Pro Max - 2026-02-04 at 02.31.54.png" class="phone">
        </div>
        <div class="badge">VYNTO SAVINGS</div>
    </div>
</body>

</html>
