<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #000;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .sub-head {
            color: #888;
            font-size: 24px;
            text-align: center;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 50px;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .helix-container {
            width: 400px;
            height: 600px;
            position: relative;
            transform-style: preserve-3d;
            animation: spin-dna 10s infinite linear;
        }

        .base-pair {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
        }

        .nucleotide {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            position: absolute;
            top: -8px;
            box-shadow: 0 0 10px rgba(78, 226, 192, 0.5);
        }

        .n-l {
            left: 0;
            background: #4ee2c0;
        }

        .n-r {
            right: 0;
            background: #52a5ff;
        }

        .bp1 {
            top: 50px;
            transform: rotateY(0deg) translateZ(0);
        }

        .bp2 {
            top: 100px;
            transform: rotateY(36deg) translateZ(0);
        }

        .bp3 {
            top: 150px;
            transform: rotateY(72deg) translateZ(0);
        }

        .bp4 {
            top: 200px;
            transform: rotateY(108deg) translateZ(0);
        }

        .bp5 {
            top: 250px;
            transform: rotateY(144deg) translateZ(0);
        }

        .bp6 {
            top: 300px;
            transform: rotateY(180deg) translateZ(0);
        }

        .bp7 {
            top: 350px;
            transform: rotateY(216deg) translateZ(0);
        }

        .bp8 {
            top: 400px;
            transform: rotateY(252deg) translateZ(0);
        }

        .bp9 {
            top: 450px;
            transform: rotateY(288deg) translateZ(0);
        }

        .bp10 {
            top: 500px;
            transform: rotateY(324deg) translateZ(0);
        }

        @keyframes spin-dna {
            0% {
                transform: rotateY(0deg);
            }

            100% {
                transform: rotateY(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Başarının Genetiği.</div>
            <div class="sub-head">Varlık Kodun</div>
            <div class="visual-container">
                <div class="helix-container">
                    <div class="base-pair bp1">
                        <div class="nucleotide n-l"></div>
                        <div class="nucleotide n-r"></div>
                    </div>
                    <div class="base-pair bp2">
                        <div class="nucleotide n-l"></div>
                        <div class="nucleotide n-r"></div>
                    </div>
                    <div class="base-pair bp3">
                        <div class="nucleotide n-l"></div>
                        <div class="nucleotide n-r"></div>
                    </div>
                    <div class="base-pair bp4">
                        <div class="nucleotide n-l"></div>
                        <div class="nucleotide n-r"></div>
                    </div>
                    <div class="base-pair bp5">
                        <div class="nucleotide n-l"></div>
                        <div class="nucleotide n-r"></div>
                    </div>
                    <div class="base-pair bp6">
                        <div class="nucleotide n-l"></div>
                        <div class="nucleotide n-r"></div>
                    </div>
                    <div class="base-pair bp7">
                        <div class="nucleotide n-l"></div>
                        <div class="nucleotide n-r"></div>
                    </div>
                    <div class="base-pair bp8">
                        <div class="nucleotide n-l"></div>
                        <div class="nucleotide n-r"></div>
                    </div>
                    <div class="base-pair bp9">
                        <div class="nucleotide n-l"></div>
                        <div class="nucleotide n-r"></div>
                    </div>
                    <div class="base-pair bp10">
                        <div class="nucleotide n-l"></div>
                        <div class="nucleotide n-r"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
