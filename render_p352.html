<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #000;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .sub-head {
            color: #888;
            font-size: 24px;
            text-align: center;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 50px;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .blurred-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Bokeh_diodes_50mm_f1.8.jpg/1024px-Bokeh_diodes_50mm_f1.8.jpg');
            background-size: cover;
            filter: blur(20px);
            opacity: 0.5;
        }

        .camera-lens {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1), #111, #000);
            border: 2px solid #555;
            border-radius: 50%;
            position: relative;
            box-shadow: 0 0 100px rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .aperture {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sharp-target {
            font-size: 40px;
            font-weight: 900;
            color: #4ee2c0;
            font-family: monospace;
            text-shadow: 0 0 20px rgba(78, 226, 192, 0.8);
            animation: focus-in 3s infinite alternate;
        }

        .lens-flare {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: linear-gradient(45deg, rgba(255, 255, 255, 0.1), transparent);
            top: -50px;
            left: -50px;
            transform: rotate(45deg);
        }

        @keyframes focus-in {
            0% {
                filter: blur(10px);
                opacity: 0.5;
            }

            100% {
                filter: blur(0px);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Odağını Kaybetme.</div>
            <div class="sub-head">Hedef Odaklı</div>
            <div class="visual-container">
                <div class="blurred-bg"></div>
                <div class="camera-lens">
                    <div class="lens-flare"></div>
                    <div class="aperture">
                        <div class="sharp-target">TARGET</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
