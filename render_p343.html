<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #000;
            background: radial-gradient(circle at 10% 20%, #111 10%, #000 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff 0%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .sub-head {
            color: #888;
            font-size: 24px;
            text-align: center;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 50px;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .prism {
            width: 0;
            height: 0;
            border-left: 200px solid transparent;
            border-right: 200px solid transparent;
            border-bottom: 400px solid rgba(0, 0, 0, 0.5);
            position: relative;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.1);
            transform: rotateY(20deg);
        }

        .light-beam {
            position: absolute;
            top: 150px;
            left: -300px;
            width: 300px;
            height: 10px;
            background: #fff;
            transform: rotate(20deg);
            box-shadow: 0 0 20px #fff;
        }

        .spectrum {
            position: absolute;
            top: 150px;
            right: -300px;
            width: 300px;
            height: 200px;
            background: linear-gradient(to bottom, #ff0000, #ffa500, #ffff00, #008000, #0000ff, #4b0082, #ee82ee);
            opacity: 0.6;
            clip-path: polygon(0 0, 100% 20%, 100% 80%, 0 100%);
            transform: rotate(20deg);
            filter: blur(10px);
        }

        .data-point {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #fff;
            border-radius: 50%;
            animation: move-beam 2s infinite linear;
        }

        @keyframes move-beam {
            0% {
                left: -300px;
                top: 150px;
                opacity: 1;
            }

            50% {
                left: 0;
                top: 200px;
                opacity: 1;
            }

            100% {
                left: 300px;
                top: 250px;
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Kusursuz Netlik.</div>
            <div class="sub-head">Şeffaf Raporlama</div>
            <div class="visual-container">
                <div class="prism">
                    <div class="light-beam"></div>
                    <div class="spectrum"></div>
                    <div class="data-point"></div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
