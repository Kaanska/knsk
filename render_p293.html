<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 60px;
        }

        .app-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 54px;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .eyebrow-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .eyebrow-line {
            width: 50px;
            height: 4px;
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            border-radius: 2px;
        }

        .eyebrow-text {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 4px;
            color: #4ee2c0;
            text-transform: uppercase;
        }

        .headline {
            font-size: 115px;
            font-weight: 800;
            line-height: 0.92;
            letter-spacing: -5px;
            color: #fff;
            margin-bottom: 30px;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            font-size: 34px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.4;
            max-width: 800px;
            font-weight: 500;
            margin-bottom: 60px;
        }

        /* VISUAL: Smart Search */
        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .search-field {
            width: 500px;
            height: 600px;
            position: relative;
            transform: rotateY(-10deg);
        }

        .search-bar {
            width: 100%;
            height: 80px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            display: flex;
            align-items: center;
            padding: 0 30px;
            font-size: 24px;
            color: #fff;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            margin-bottom: 30px;
        }

        .search-results {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .result-item {
            width: 100%;
            height: 80px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            opacity: 0.5;
            transition: all 0.3s;
        }

        .highlighted {
            background: rgba(82, 165, 255, 0.2);
            border-color: #52a5ff;
            opacity: 1;
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(82, 165, 255, 0.3);
        }

        .magnify-glass {
            position: absolute;
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 4px solid #4ee2c0;
            border-radius: 50%;
            top: 200px;
            left: 150px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            animation: search-float 3s infinite ease-in-out;
            z-index: 10;
        }

        .magnify-glass::after {
            content: '';
            position: absolute;
            width: 40px;
            height: 100px;
            background: #4ee2c0;
            bottom: -80px;
            right: -20px;
            transform: rotate(-45deg);
            border-radius: 20px;
        }

        @keyframes search-float {

            0%,
            100% {
                transform: translate(0, 0);
            }

            50% {
                transform: translate(20px, 30px);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>

            <div class="eyebrow-container">
                <div class="eyebrow-line"></div>
                <div class="eyebrow-text">AKILLI ARAMA</div>
            </div>

            <div class="headline">Aradığını<br><span class="gradient-word">Bul.</span></div>
            <div class="description">Geçen ay Starbucks'ta ne kadar harcadın? Vynto'nun güçlü arama motoru ile saniyeler
                içinde tüm geçmişini filtrele.</div>

            <div class="visual-container">
                <div class="search-field">
                    <div class="search-bar">🔍 Starbucks...</div>
                    <div class="search-results">
                        <div class="result-item"></div>
                        <div class="result-item highlighted">
                            <span style="font-size:20px; color:#fff; font-weight:700;">Starbucks</span>
                            <span style="margin-left:auto; color:#4ee2c0; font-weight:600;">-₺145</span>
                        </div>
                        <div class="result-item"></div>
                        <div class="result-item"></div>
                    </div>
                    <div class="magnify-glass"></div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
