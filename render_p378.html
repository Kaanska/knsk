<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #111;
            background: linear-gradient(135deg, #111 0%, #000 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .hover-scene {
            position: relative;
            width: 400px;
            height: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .base-platform {
            position: absolute;
            bottom: 80px;
            width: 300px;
            height: 50px;
            background: radial-gradient(circle, rgba(78, 226, 192, 0.5), transparent 70%);
            border-radius: 50%;
            transform: rotateX(60deg);
            filter: blur(10px);
            animation: platform-glow 2s infinite alternate;
        }

        .floating-card {
            width: 320px;
            height: 200px;
            background: linear-gradient(135deg, #222, #111);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            position: relative;
            transform: rotateY(-15deg) rotateX(10deg);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            animation: float-card 3s infinite ease-in-out;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 25px;
        }

        .chip {
            width: 50px;
            height: 35px;
            background: linear-gradient(135deg, #ffd700, #b8860b);
            border-radius: 5px;
        }

        .logo-mark {
            font-size: 24px;
            color: #fff;
            font-weight: 800;
            align-self: flex-end;
        }

        .card-num {
            color: #888;
            font-family: monospace;
            letter-spacing: 2px;
            font-size: 18px;
        }

        .magnetic-waves {
            position: absolute;
            width: 300px;
            height: 300px;
            border: 2px solid rgba(78, 226, 192, 0.2);
            border-radius: 50%;
            transform: rotateX(70deg);
            bottom: 20px;
            animation: wave-expand 2s infinite linear;
        }

        @keyframes float-card {
            0% {
                transform: translateY(0) rotateY(-15deg) rotateX(10deg);
            }

            50% {
                transform: translateY(-20px) rotateY(-10deg) rotateX(15deg);
            }

            100% {
                transform: translateY(0) rotateY(-15deg) rotateX(10deg);
            }
        }

        @keyframes wave-expand {
            0% {
                width: 100px;
                height: 100px;
                opacity: 1;
                border-width: 2px;
            }

            100% {
                width: 400px;
                height: 400px;
                opacity: 0;
                border-width: 0px;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Temassız<br><span class="gradient-word">Güç.</span></div>
            <div class="visual-container">
                <div class="hover-scene">
                    <div class="base-platform"></div>
                    <div class="magnetic-waves"></div>
                    <div class="magnetic-waves" style="animation-delay: 0.5s"></div>
                    <div class="floating-card">
                        <div class="chip"></div>
                        <div class="card-num">**** **** **** 4192</div>
                        <div class="logo-mark">VYNTO</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
