<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .dashboard-screen {
            width: 500px;
            height: 400px;
            background: linear-gradient(135deg, #222, #111);
            border: 2px solid #444;
            border-radius: 30px;
            transform: rotateX(15deg);
            padding: 20px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .chart-row {
            display: flex;
            gap: 10px;
            height: 100%;
        }

        .c-block {
            flex: 1;
            background: #333;
            border-radius: 15px;
            position: relative;
            overflow: hidden;
        }

        .c-bar {
            width: 20px;
            background: #52a5ff;
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            animation: grow 2s infinite ease-in-out;
        }

        .c-pie {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: conic-gradient(#4ee2c0 30%, #52a5ff 0);
            margin: 20px auto;
        }

        .c-line {
            width: 100%;
            height: 2px;
            background: #fff;
            position: absolute;
            top: 50%;
            transform: rotate(-10deg);
        }

        @keyframes grow {

            0%,
            100% {
                height: 20%;
            }

            50% {
                height: 80%;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Büyük<br><span class="gradient-word">Resmi Gör.</span></div>
            <div class="visual-container">
                <div class="dashboard-screen">
                    <div class="chart-row">
                        <div class="c-block">
                            <div class="c-pie"></div>
                        </div>
                        <div class="c-block">
                            <div class="c-line"></div>
                        </div>
                    </div>
                    <div class="chart-row">
                        <div class="c-block">
                            <div class="c-bar" style="height: 60%;"></div>
                        </div>
                        <div class="c-block">
                            <div class="c-bar" style="height: 40%; background: #4ee2c0;"></div>
                        </div>
                        <div class="c-block">
                            <div class="c-bar" style="height: 90%; background: #ffd700;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
