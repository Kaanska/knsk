<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #000;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .sub-head {
            color: #888;
            font-size: 24px;
            text-align: center;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 50px;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .black-hole {
            width: 400px;
            height: 400px;
            background: #000;
            border-radius: 50%;
            position: relative;
            box-shadow: 0 0 50px #000, 0 0 100px rgba(78, 226, 192, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .accretion-disk {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent, rgba(78, 226, 192, 0.8), transparent 80%);
            animation: spin-disk 5s infinite linear;
            filter: blur(10px);
        }

        .event-horizon {
            width: 380px;
            height: 380px;
            background: #000;
            border-radius: 50%;
            position: absolute;
            z-index: 10;
        }

        .particle {
            position: absolute;
            width: 5px;
            height: 5px;
            background: #fff;
            border-radius: 50%;
            animation: suck-in 2s infinite ease-in;
        }

        @keyframes spin-disk {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes suck-in {
            0% {
                transform: rotate(0deg) translateX(300px);
                opacity: 1;
            }

            100% {
                transform: rotate(360deg) translateX(0);
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Maksimum Verim.</div>
            <div class="sub-head">Gereksizleri Yok Et</div>
            <div class="visual-container">
                <div class="accretion-disk"></div>
                <div class="black-hole">
                    <div class="event-horizon"></div>
                </div>
                <div class="particle" style="animation-delay: 0s;"></div>
                <div class="particle" style="animation-delay: 0.5s;"></div>
                <div class="particle" style="animation-delay: 1s;"></div>
                <div class="particle" style="animation-delay: 1.5s;"></div>
            </div>
        </div>
    </div>
</body>

</html>
