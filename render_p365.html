<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #ffd700, #ff9900);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .pie-cake {
            width: 400px;
            height: 200px;
            position: relative;
            transform-style: preserve-3d;
            transform: rotateX(60deg) rotateZ(30deg);
        }

        .slice {
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 100% 0 0 0;
            transform-origin: 100% 100%;
        }

        .s1 {
            background: #4ee2c0;
            transform: rotate(0deg);
            z-index: 1;
            box-shadow: 0 0 20px rgba(78, 226, 192, 0.4);
        }

        .s2 {
            background: #52a5ff;
            transform: rotate(90deg);
            z-index: 2;
            box-shadow: 0 0 20px rgba(82, 165, 255, 0.4);
        }

        .s3 {
            background: #ff6b6b;
            transform: rotate(180deg);
            z-index: 3;
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.4);
        }

        .s4 {
            background: #ffd700;
            transform: rotate(270deg) translate(20px, 20px);
            z-index: 4;
            animation: float-slice 2s infinite alternate;
        }

        .candle {
            position: absolute;
            width: 10px;
            height: 80px;
            background: #fff;
            top: -50px;
            right: 50px;
            z-index: 10;
            transform: rotateX(-60deg);
        }

        .flame {
            font-size: 30px;
            position: absolute;
            top: -30px;
            left: -5px;
            animation: flicker 0.2s infinite;
            color: #ff9900;
        }

        @keyframes float-slice {
            0% {
                transform: rotate(270deg) translate(20px, 20px);
            }

            100% {
                transform: rotate(270deg) translate(30px, 30px);
            }
        }

        @keyframes flicker {
            0% {
                opacity: 0.8;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.1);
            }

            100% {
                opacity: 0.9;
                transform: scale(1);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Pastadan<br><span class="gradient-word">Payını Al.</span></div>
            <div class="visual-container">
                <div class="pie-cake">
                    <div class="slice s1"></div>
                    <div class="slice s2"></div>
                    <div class="slice s3"></div>
                    <div class="slice s4">
                        <div class="candle">
                            <div class="flame">🔥</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
