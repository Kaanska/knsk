<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #050505;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.45;
            z-index: 0;
        }

        .blob-1 {
            width: 900px;
            height: 900px;
            top: -200px;
            right: -200px;
            background: linear-gradient(135deg, #1fa2ff, #12d8fa);
        }

        .blob-2 {
            width: 800px;
            height: 800px;
            bottom: -200px;
            left: -200px;
            background: linear-gradient(135deg, #43e97b, #38f9d7);
        }

        .content-container {
            width: 900px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            height: 100%;
            padding-top: 100px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 80px;
        }

        .app-icon {
            width: 90px;
            height: 90px;
            border-radius: 22px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .brand-name {
            font-size: 56px;
            font-weight: 800;
            letter-spacing: -1px;
            color: white;
            background: linear-gradient(90deg, #5EE7DF 0%, #4facfe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .text-section {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin-bottom: 60px;
        }

        .eyebrow {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #12d8fa;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .eyebrow::before {
            content: '';
            width: 40px;
            height: 3px;
            background: #12d8fa;
            display: block;
        }

        .main-headline {
            font-size: 100px;
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -3px;
            color: white;
        }

        .gradient-word {
            background: linear-gradient(to right, #1fa2ff, #43e97b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-text {
            margin-top: 30px;
            font-size: 32px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.4;
            max-width: 800px;
        }

        .iceberg-card {
            width: 100%;
            padding: 60px;
            background: rgba(25, 25, 25, 0.4);
            backdrop-filter: blur(60px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 60px;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: auto;
            margin-bottom: 120px;
            position: relative;
        }

        .water-line {
            width: 100%;
            height: 2px;
            background: rgba(18, 216, 250, 0.3);
            margin: 30px 0;
        }

        .tip {
            font-size: 24px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .tip-val {
            font-size: 48px;
            font-weight: 800;
            color: white;
        }

        .depth {
            font-size: 24px;
            color: #43e97b;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .depth-val {
            font-size: 72px;
            font-weight: 800;
            color: #43e97b;
            text-shadow: 0 0 30px rgba(67, 233, 123, 0.3);
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="content-container">
            <div class="header"><img src="images/AppIcon.png" class="app-icon"><span class="brand-name">VYNTO</span>
            </div>
            <div class="text-section">
                <div class="eyebrow">GERÇEK VARLIK</div>
                <div class="main-headline">Buzdağının<br><span class="gradient-word">Altına Bak.</span></div>
                <p class="sub-text">Banka bakiyen sadece başlangıçtır. Vynto ile yatırımlarını, varlıklarını ve net
                    değerini bir bütün olarak gör.</p>
            </div>
            <div class="iceberg-card">
                <div class="tip">BANKA BAKİYESİ</div>
                <div class="tip-val">₺140.000</div>
                <div class="water-line"></div>
                <div class="depth">TOPLAM VARLIĞIN</div>
                <div class="depth-val">₺2.850.000</div>
            </div>
        </div>
    </div>
</body>

</html>
