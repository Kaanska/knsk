<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 60px;
        }

        .app-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 54px;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .eyebrow-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .eyebrow-line {
            width: 50px;
            height: 4px;
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            border-radius: 2px;
        }

        .eyebrow-text {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 4px;
            color: #4ee2c0;
            text-transform: uppercase;
        }

        .headline {
            font-size: 115px;
            font-weight: 800;
            line-height: 0.92;
            letter-spacing: -5px;
            color: #fff;
            margin-bottom: 30px;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            font-size: 34px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.4;
            max-width: 800px;
            font-weight: 500;
            margin-bottom: 60px;
        }

        /* THE "BALANCE BARS" VISUAL */
        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .chart-stage {
            width: 500px;
            height: 600px;
            position: relative;
            transform: rotateY(15deg);
            transform-style: preserve-3d;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 60px;
        }

        .bar-3d {
            width: 140px;
            position: relative;
            transform-style: preserve-3d;
            border-radius: 20px 20px 0 0;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .bar-income {
            height: 450px;
            background: rgba(78, 226, 192, 0.2);
            border: 2px solid #4ee2c0;
            box-shadow: 0 0 50px rgba(78, 226, 192, 0.4);
        }

        .bar-expense {
            height: 320px;
            background: rgba(82, 165, 255, 0.2);
            border: 2px solid #52a5ff;
            box-shadow: 0 0 50px rgba(82, 165, 255, 0.4);
        }

        .fill-liquid {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            border-radius: 18px 18px 5px 5px;
            animation: fill-up 2s ease-out forwards;
        }

        .fill-inc {
            height: 100%;
            background: linear-gradient(to top, #4ee2c0, transparent);
            opacity: 0.8;
        }

        .fill-exp {
            height: 100%;
            background: linear-gradient(to top, #52a5ff, transparent);
            opacity: 0.8;
        }

        .bar-label {
            position: absolute;
            bottom: -60px;
            font-size: 28px;
            font-weight: 800;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
            width: 200px;
            text-align: center;
        }

        .bar-val {
            position: absolute;
            top: -60px;
            font-size: 44px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
            width: 300px;
            text-align: center;
        }

        .floating-percent {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.1);
            z-index: -1;
        }

        @keyframes fill-up {
            from {
                height: 0;
            }

            to {
                height: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>

            <div class="eyebrow-container">
                <div class="eyebrow-line"></div>
                <div class="eyebrow-text">GELİR GİDER DENGESİ</div>
            </div>

            <div class="headline">Paranın<br><span class="gradient-word">Yönünü Gör.</span></div>
            <div class="description">Nereye harcıyorum, ne kadar kazanıyorum? Vynto'nun akıllı grafikleriyle nakit
                akışınızdaki dengeyi anında kavrayın.</div>

            <div class="visual-container">
                <div class="chart-stage">
                    <div class="bar-3d bar-income">
                        <div class="fill-liquid fill-inc"></div>
                        <div class="bar-val">₺65.000</div>
                        <div class="bar-label" style="color:#4ee2c0;">GELİR</div>
                    </div>
                    <div class="bar-3d bar-expense">
                        <div class="fill-liquid fill-exp"></div>
                        <div class="bar-val">₺42.500</div>
                        <div class="bar-label" style="color:#52a5ff;">GİDER</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
