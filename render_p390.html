<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: linear-gradient(180deg, #000814 0%, #001233 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        .vortex-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .spiral {
            position: absolute;
            top: 50%;
            left: 50%;
            transform-origin: center;
            border-radius: 50%;
            border: 2px solid;
            animation: spiralRotate 15s linear infinite;
        }

        .spiral-1 {
            width: 400px;
            height: 400px;
            border-color: rgba(94, 231, 223, 0.3);
            animation-duration: 15s;
        }

        .spiral-2 {
            width: 600px;
            height: 600px;
            border-color: rgba(6, 182, 212, 0.2);
            animation-duration: 20s;
            animation-direction: reverse;
        }

        .spiral-3 {
            width: 800px;
            height: 800px;
            border-color: rgba(20, 184, 166, 0.15);
            animation-duration: 25s;
        }

        @keyframes spiralRotate {
            from {
                transform: translate(-50%, -50%) rotate(0deg) scale(1);
            }

            to {
                transform: translate(-50%, -50%) rotate(360deg) scale(1.1);
            }
        }

        .vortex-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(94, 231, 223, 0.4) 0%, transparent 70%);
            filter: blur(120px);
            animation: vortexPulse 6s ease-in-out infinite;
            z-index: 1;
        }

        @keyframes vortexPulse {

            0%,
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.4;
            }

            50% {
                transform: translate(-50%, -50%) scale(1.3);
                opacity: 0.7;
            }
        }

        .content-container {
            width: 900px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            height: 100%;
            padding-top: 100px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 80px;
        }

        .app-icon {
            width: 90px;
            height: 90px;
            border-radius: 22px;
            box-shadow: 0 20px 60px rgba(94, 231, 223, 0.6);
        }

        .brand-name {
            font-size: 56px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(90deg, #5EE7DF 0%, #06b6d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .text-section {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin-bottom: 60px;
        }

        .eyebrow {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #5EE7DF;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .eyebrow::before {
            content: '';
            width: 40px;
            height: 3px;
            background: linear-gradient(90deg, #5EE7DF, #06b6d4);
            display: block;
        }

        .main-headline {
            font-size: 100px;
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -3px;
            color: white;
        }

        .gradient-word {
            background: linear-gradient(135deg, #5EE7DF, #06b6d4, #14b8a6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 40px rgba(94, 231, 223, 0.6));
        }

        .sub-text {
            margin-top: 30px;
            font-size: 32px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.4;
            max-width: 800px;
        }

        .vortex-card {
            width: 100%;
            height: 500px;
            margin-top: auto;
            margin-bottom: 100px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .savings-vortex {
            width: 450px;
            height: 450px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .vortex-ring {
            position: absolute;
            border-radius: 50%;
            border: 3px solid;
            animation: vortexSpin 10s linear infinite;
        }

        .ring-1 {
            width: 450px;
            height: 450px;
            border-color: rgba(94, 231, 223, 0.4);
            border-style: dashed;
            animation-duration: 10s;
        }

        .ring-2 {
            width: 350px;
            height: 350px;
            border-color: rgba(6, 182, 212, 0.5);
            animation-duration: 8s;
            animation-direction: reverse;
        }

        .ring-3 {
            width: 250px;
            height: 250px;
            border-color: rgba(20, 184, 166, 0.6);
            border-style: dashed;
            animation-duration: 6s;
        }

        @keyframes vortexSpin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .savings-center {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.3), rgba(20, 184, 166, 0.3));
            backdrop-filter: blur(30px);
            border: 3px solid #5EE7DF;
            box-shadow:
                0 0 80px rgba(94, 231, 223, 0.8),
                inset 0 0 60px rgba(94, 231, 223, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 5;
            animation: centerFloat 4s ease-in-out infinite;
        }

        @keyframes centerFloat {

            0%,
            100% {
                transform: translateY(0px) scale(1);
            }

            50% {
                transform: translateY(-20px) scale(1.05);
            }
        }

        .savings-label {
            font-size: 24px;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 600;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .savings-value {
            font-size: 64px;
            font-weight: 800;
            background: linear-gradient(135deg, #5EE7DF, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .savings-period {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 600;
        }

        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #5EE7DF;
            border-radius: 50%;
            box-shadow: 0 0 20px #5EE7DF;
            animation: particleOrbit 8s linear infinite;
        }

        .particle:nth-child(1) {
            animation-delay: 0s;
            top: 0;
            left: 50%;
        }

        .particle:nth-child(2) {
            animation-delay: 2s;
            top: 50%;
            right: 0;
        }

        .particle:nth-child(3) {
            animation-delay: 4s;
            bottom: 0;
            left: 50%;
        }

        .particle:nth-child(4) {
            animation-delay: 6s;
            top: 50%;
            left: 0;
        }

        @keyframes particleOrbit {
            from {
                transform: rotate(0deg) translateX(225px) rotate(0deg);
            }

            to {
                transform: rotate(360deg) translateX(225px) rotate(-360deg);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="vortex-bg">
            <div class="spiral spiral-1"></div>
            <div class="spiral spiral-2"></div>
            <div class="spiral spiral-3"></div>
        </div>
        <div class="vortex-glow"></div>
        <div class="content-container">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="text-section">
                <div class="eyebrow">TASARRUF GÜCÜ</div>
                <div class="main-headline">Tasarruf<br><span class="gradient-word">Girdabında.</span></div>
                <p class="sub-text">Her ay biriken tasarrufların gücünü hisset. Hedeflerine doğru hızla ilerle.</p>
            </div>
            <div class="vortex-card">
                <div class="savings-vortex">
                    <div class="vortex-ring ring-1"></div>
                    <div class="vortex-ring ring-2"></div>
                    <div class="vortex-ring ring-3"></div>
                    <div class="particle"></div>
                    <div class="particle"></div>
                    <div class="particle"></div>
                    <div class="particle"></div>
                    <div class="savings-center">
                        <div class="savings-label">Tasarruf</div>
                        <div class="savings-value">₺18.5K</div>
                        <div class="savings-period">Bu Ay</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
