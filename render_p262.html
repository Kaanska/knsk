<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 85% 15%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 60px;
        }

        .app-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 54px;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .eyebrow-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .eyebrow-line {
            width: 50px;
            height: 4px;
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            border-radius: 2px;
        }

        .eyebrow-text {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 4px;
            color: #4ee2c0;
            text-transform: uppercase;
        }

        .headline {
            font-size: 115px;
            font-weight: 800;
            line-height: 0.92;
            letter-spacing: -5px;
            color: #fff;
            margin-bottom: 30px;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            font-size: 34px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.4;
            max-width: 800px;
            font-weight: 500;
            margin-bottom: 60px;
        }

        /* ULTRA-PREMIUM DASHBOARD */
        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
            /* Deep perspective */
        }

        .dashboard-card {
            width: 750px;
            height: 480px;
            background: rgba(20, 30, 40, 0.6);
            backdrop-filter: blur(60px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            position: relative;
            transform: rotateX(15deg) rotateY(-10deg) rotateZ(2deg);
            box-shadow:
                30px 40px 80px rgba(0, 0, 0, 0.6),
                inset 0 0 60px rgba(255, 255, 255, 0.02);
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            animation: float-3d 6s infinite ease-in-out;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 30px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .u-img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #333;
            border: 2px solid #4ee2c0;
        }

        .u-name {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
        }

        .menu-btn {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
        }

        .balance-section {
            margin-top: 20px;
        }

        .b-label {
            font-size: 20px;
            color: #4ee2c0;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .b-amount {
            font-size: 70px;
            color: #fff;
            font-weight: 800;
            letter-spacing: -2px;
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .graph-area {
            flex: 1;
            display: flex;
            align-items: flex-end;
            gap: 15px;
            margin-top: 30px;
            position: relative;
        }

        .bar {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            position: relative;
            overflow: hidden;
        }

        .bar-fill {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: linear-gradient(to top, #4ee2c0, #52a5ff);
            box-shadow: 0 0 20px rgba(78, 226, 192, 0.3);
        }

        .floating-badge {
            position: absolute;
            right: -40px;
            top: 40%;
            background: rgba(82, 165, 255, 0.2);
            border: 1px solid rgba(82, 165, 255, 0.4);
            backdrop-filter: blur(20px);
            padding: 20px 30px;
            border-radius: 20px;
            color: #fff;
            font-weight: 700;
            font-size: 20px;
            transform: translateZ(50px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        @keyframes float-3d {

            0%,
            100% {
                transform: rotateX(15deg) rotateY(-10deg) rotateZ(2deg) translateY(0);
            }

            50% {
                transform: rotateX(12deg) rotateY(-8deg) rotateZ(1deg) translateY(-20px);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>

            <div class="eyebrow-container">
                <div class="eyebrow-line"></div>
                <div class="eyebrow-text">TAM KONTROL</div>
            </div>

            <div class="headline">Tüm Dünya<br><span class="gradient-word">Parmak Ucunda.</span></div>
            <div class="description">Geleneksel bankacılığın sınırlarını aşın. Vynto, tüm finansal evreninizi tek bir
                fütüristik kokpitte birleştirir.</div>

            <div class="visual-container">
                <div class="dashboard-card">
                    <div class="card-header">
                        <div class="user-profile">
                            <div class="u-img"></div>
                            <div class="u-name">Hoşgeldin, Kaan</div>
                        </div>
                        <div class="menu-btn"></div>
                    </div>
                    <div class="balance-section">
                        <div class="b-label">TOPLAM VARLIK</div>
                        <div class="b-amount">₺142.850,50</div>
                    </div>
                    <div class="graph-area">
                        <div class="bar" style="height: 40%;">
                            <div class="bar-fill" style="height: 100%;"></div>
                        </div>
                        <div class="bar" style="height: 60%;">
                            <div class="bar-fill" style="height: 100%;"></div>
                        </div>
                        <div class="bar" style="height: 35%;">
                            <div class="bar-fill" style="height: 100%;"></div>
                        </div>
                        <div class="bar" style="height: 80%;">
                            <div class="bar-fill" style="height: 100%;"></div>
                        </div>
                        <div class="bar" style="height: 55%;">
                            <div class="bar-fill" style="height: 100%;"></div>
                        </div>
                        <div class="bar" style="height: 90%; box-shadow: 0 0 30px rgba(78, 226, 192, 0.4);">
                            <div class="bar-fill" style="height: 100%; background: #fff;"></div>
                        </div>
                    </div>
                    <div class="floating-badge">
                        <div
                            style="width:10px; height:10px; background:#4ee2c0; border-radius:50%; box-shadow:0 0 10px #4ee2c0;">
                        </div>
                        CANLI VERİ
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
