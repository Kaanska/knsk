<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: linear-gradient(135deg, #0d1216 0%, #000 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .shield-dome {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(78, 226, 192, 0.1), rgba(78, 226, 192, 0.4));
            border: 2px solid #4ee2c0;
            border-radius: 50%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 50px rgba(78, 226, 192, 0.3);
            animation: pulse-shield 3s infinite ease-in-out;
        }

        .card-protected {
            width: 250px;
            height: 160px;
            background: linear-gradient(135deg, #222, #444);
            border-radius: 15px;
            border: 1px solid #777;
            position: relative;
            z-index: 2;
        }

        .chip {
            width: 40px;
            height: 30px;
            background: #ffd700;
            border-radius: 5px;
            margin: 20px;
        }

        .lock {
            position: absolute;
            bottom: -30px;
            font-size: 60px;
            color: #4ee2c0;
            background: #000;
            border-radius: 50%;
            padding: 10px;
            border: 2px solid #4ee2c0;
            z-index: 3;
        }

        @keyframes pulse-shield {

            0%,
            100% {
                box-shadow: 0 0 50px rgba(78, 226, 192, 0.3);
            }

            50% {
                box-shadow: 0 0 80px rgba(78, 226, 192, 0.6);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Siber<br><span class="gradient-word">Güvenlik.</span></div>
            <div class="visual-container">
                <div class="shield-dome">
                    <div class="card-protected">
                        <div class="chip"></div>
                    </div>
                    <div class="lock">🔒</div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
