<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 85% 15%, #0d323f 0%, #081116 65%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 900px;
            z-index: 10;
            padding-top: 120px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 80px;
        }

        .app-icon {
            width: 95px;
            height: 95px;
            border-radius: 24px;
        }

        .brand-name {
            font-size: 58px;
            font-weight: 800;
            color: #3da9eb;
            letter-spacing: -2px;
        }

        .eyebrow {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 3px;
            color: #3da9eb;
            text-transform: uppercase;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .eyebrow::before {
            content: '';
            width: 60px;
            height: 3px;
            background: #3da9eb;
        }

        .headline {
            font-size: 110px;
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -5px;
            color: #fff;
            margin-bottom: 35px;
        }

        .blue-text {
            color: #3da9eb;
        }

        .description {
            font-size: 36px;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.45;
            max-width: 820px;
            font-weight: 500;
        }

        /* High-End Visual: Glass Prism */
        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .prism-visual {
            width: 600px;
            height: 600px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .prism-shape {
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transform: rotate(45deg);
            position: relative;
            box-shadow: 0 0 100px rgba(61, 169, 235, 0.2);
            animation: float-prism 4s infinite ease-in-out;
        }

        .prism-shape:after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, transparent, rgba(61, 169, 235, 0.2));
            box-shadow: inset 0 0 40px rgba(255, 255, 255, 0.1);
        }

        .light-beam {
            position: absolute;
            height: 4px;
            background: #fff;
            filter: blur(2px);
            width: 400px;
            left: -350px;
            box-shadow: 0 0 30px #fff;
            opacity: 0.6;
        }

        .split-beam {
            position: absolute;
            height: 8px;
            width: 500px;
            right: -450px;
            filter: blur(5px);
            opacity: 0.8;
            animation: flow-beam 3s infinite linear;
        }

        .split-beam:nth-child(4) {
            background: #4ee2c0;
            box-shadow: 0 0 40px #4ee2c0;
            transform: rotate(15deg) translateY(-50px);
        }

        .split-beam:nth-child(5) {
            background: #3da9eb;
            box-shadow: 0 0 40px #3da9eb;
            transform: rotate(-15deg) translateY(50px);
        }

        @keyframes float-prism {

            0%,
            100% {
                transform: rotate(45deg) translateY(0);
            }

            50% {
                transform: rotate(45deg) translateY(-20px);
            }
        }

        @keyframes flow-beam {
            0% {
                transform: rotate(15deg) scaleX(0.5);
                opacity: 0;
            }

            50% {
                opacity: 0.8;
                transform: rotate(15deg) scaleX(1);
            }

            100% {
                transform: rotate(15deg) scaleX(1.5);
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="eyebrow">DİJİTAL PRİZMA</div>
            <div class="headline">Karmaşayı<br><span class="blue-text">Netliğe Dönüştür.</span></div>
            <div class="description">Binlerce harcama kalemi, tek bir prizmadan geçip anlamlı içgörülere dönüşüyor.
                Vynto AI ile finansal kaos, birer sanata dönüşür.</div>
            <div class="visual-container">
                <div class="prism-visual">
                    <div class="light-beam"></div>
                    <div class="prism-shape"></div>
                    <div class="split-beam"></div>
                    <div class="split-beam"></div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
