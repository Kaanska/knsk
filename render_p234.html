<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 90% 10%, #0d323f 0%, #081116 60%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 900px;
            z-index: 10;
            padding-top: 120px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 80px;
        }

        .app-icon {
            width: 90px;
            height: 90px;
            border-radius: 22px;
        }

        .brand-name {
            font-size: 56px;
            font-weight: 800;
            color: #3da9eb;
            letter-spacing: -1.5px;
        }

        .eyebrow {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #3da9eb;
            text-transform: uppercase;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .eyebrow::before {
            content: '';
            width: 50px;
            height: 3px;
            background: #3da9eb;
        }

        .headline {
            font-size: 115px;
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -4.5px;
            color: #fff;
            margin-bottom: 30px;
        }

        .blue-text {
            color: #3da9eb;
        }

        .description {
            font-size: 34px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.4;
            max-width: 820px;
            font-weight: 500;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .hourglass {
            width: 300px;
            height: 500px;
            position: relative;
        }

        .hourglass-top,
        .hourglass-bottom {
            width: 100%;
            height: 50%;
            background: rgba(13, 20, 24, 0.4);
            border: 2px solid #3da9eb;
            position: relative;
            overflow: hidden;
        }

        .hourglass-top {
            border-radius: 150px 150px 20px 20px;
            margin-bottom: 10px;
        }

        .hourglass-bottom {
            border-radius: 20px 20px 150px 150px;
        }

        .sand {
            position: absolute;
            width: 100%;
            background: #3da9eb;
            box-shadow: 0 0 30px #3da9eb;
        }

        .sand-top {
            bottom: 0;
            height: 100%;
            animation: pour-top 10s infinite linear;
        }

        .sand-bottom {
            bottom: 0;
            height: 0;
            animation: pour-bottom 10s infinite linear;
        }

        .stream {
            position: absolute;
            width: 6px;
            height: 100%;
            background: #3da9eb;
            left: 50%;
            transform: translateX(-50%);
            top: 100%;
            z-index: 10;
            animation: stream-pour 10s infinite linear;
        }

        @keyframes pour-top {
            0% {
                height: 100%;
            }

            100% {
                height: 0%;
            }
        }

        @keyframes pour-bottom {
            0% {
                height: 0%;
            }

            100% {
                height: 100%;
            }
        }

        @keyframes stream-pour {

            0%,
            95% {
                opacity: 1;
            }

            100% {
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header"><img src="images/AppIcon.png" class="app-icon"><span class="brand-name">VYNTO</span>
            </div>
            <div class="eyebrow">ZAMAN & KAZANÇ</div>
            <div class="headline">Zamanı<br><span class="blue-text">Kazanca Dönüştür.</span></div>
            <div class="description">Zaman nakittir, ama doğru yönetilirse. Vynto AI, bütçenizi optimize ederek her
                saniyenin finansal değerini artırır.</div>
            <div class="visual-container">
                <div class="hourglass">
                    <div class="hourglass-top">
                        <div class="sand sand-top"></div>
                        <div class="stream"></div>
                    </div>
                    <div class="hourglass-bottom">
                        <div class="sand sand-bottom"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
