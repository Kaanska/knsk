<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .domino-line {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            transform: rotateX(20deg);
        }

        .domino {
            width: 40px;
            height: 100px;
            background: linear-gradient(135deg, #333, #000);
            border: 1px solid #555;
            border-radius: 5px;
        }

        .d-s {
            height: 60px;
        }

        .d-m {
            height: 100px;
        }

        .d-l {
            height: 150px;
        }

        .d-xl {
            height: 200px;
        }

        .d-final {
            height: 300px;
            width: 100px;
            background: #52a5ff;
            border: none;
            box-shadow: 0 0 50px #52a5ff;
        }

        .nudge {
            position: absolute;
            left: 0;
            bottom: 80px;
            width: 40px;
            height: 40px;
            background: #4ee2c0;
            border-radius: 50%;
            animation: push-domino 2s infinite ease-in;
        }

        .chest-lid {
            width: 100%;
            height: 30%;
            background: #fff;
            border-radius: 20px 20px 0 0;
            transform-origin: top;
            animation: open-lid 2s infinite ease-out 0.5s;
        }

        @keyframes push-domino {
            0% {
                left: -50px;
                opacity: 0;
            }

            50% {
                left: 0px;
                opacity: 1;
            }

            100% {
                left: 10px;
                opacity: 0;
            }
        }

        /* Conceptual animation */
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Küçük Bir Adım,<br><span class="gradient-word">Büyük Sonuç.</span></div>
            <div class="visual-container">
                <div class="domino-line">
                    <div class="nudge"></div>
                    <div class="domino d-s"></div>
                    <div class="domino d-m"></div>
                    <div class="domino d-l"></div>
                    <div class="domino d-xl"></div>
                    <div class="domino d-final">
                        <div class="chest-lid"></div>
                        <div
                            style="text-align: center; color: #fff; font-weight: 800; padding-top: 100px; font-size: 50px;">
                            $$$</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
