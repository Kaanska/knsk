<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .voice-orbit {
            width: 600px;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .sound-wave {
            position: absolute;
            width: 100%;
            height: 150px;
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
        }

        .bar {
            width: 15px;
            background: #fff;
            border-radius: 20px;
            animation: bounce-wave 1.5s infinite ease-in-out;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .b1 {
            height: 40px;
            animation-delay: 0s;
        }

        .b2 {
            height: 80px;
            animation-delay: 0.1s;
            background: #4ee2c0;
            box-shadow: 0 0 30px #4ee2c0;
        }

        .b3 {
            height: 120px;
            animation-delay: 0.2s;
            background: #52a5ff;
            box-shadow: 0 0 30px #52a5ff;
        }

        .b4 {
            height: 60px;
            animation-delay: 0.3s;
        }

        .b5 {
            height: 100px;
            animation-delay: 0.4s;
            background: #4ee2c0;
            box-shadow: 0 0 30px #4ee2c0;
        }

        .b6 {
            height: 30px;
            animation-delay: 0.5s;
        }

        .voice-bubble {
            position: absolute;
            top: -50px;
            padding: 20px 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 24px;
            font-weight: 600;
            font-style: italic;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            animation: float-bubble 3s infinite ease-in-out;
        }

        @keyframes bounce-wave {

            0%,
            100% {
                transform: scaleY(0.5);
            }

            50% {
                transform: scaleY(1.5);
            }
        }

        @keyframes float-bubble {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-15px);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>

            <div class="headline">Sadece<br><span class="gradient-word">Söyle.</span></div>

            <div class="visual-container">
                <div class="voice-orbit">
                    <div class="voice-bubble">"Hey Siri, kahve harcamamı ekle"</div>
                    <div class="sound-wave">
                        <div class="bar b1"></div>
                        <div class="bar b2"></div>
                        <div class="bar b3"></div>
                        <div class="bar b4"></div>
                        <div class="bar b5"></div>
                        <div class="bar b6"></div>
                        <div class="bar b1"></div>
                        <div class="bar b3"></div>
                        <div class="bar b2"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
