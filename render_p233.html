<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 90% 10%, #0d323f 0%, #081116 60%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 900px;
            z-index: 10;
            padding-top: 120px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 80px;
        }

        .app-icon {
            width: 90px;
            height: 90px;
            border-radius: 22px;
        }

        .brand-name {
            font-size: 56px;
            font-weight: 800;
            color: #3da9eb;
            letter-spacing: -1.5px;
        }

        .eyebrow {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #3da9eb;
            text-transform: uppercase;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .eyebrow::before {
            content: '';
            width: 50px;
            height: 3px;
            background: #3da9eb;
        }

        .headline {
            font-size: 115px;
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -4.5px;
            color: #fff;
            margin-bottom: 30px;
        }

        .blue-text {
            color: #3da9eb;
        }

        .description {
            font-size: 34px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.4;
            max-width: 820px;
            font-weight: 500;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .bridge {
            width: 700px;
            height: 200px;
            border-top: 4px solid #3da9eb;
            border-radius: 50% 50% 0 0;
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 50px;
        }

        .bridge-line {
            position: absolute;
            width: 2px;
            height: 100px;
            background: rgba(61, 169, 235, 0.2);
            bottom: 0;
        }

        .goal-post {
            width: 100px;
            height: 151px;
            background: rgba(13, 20, 24, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            position: relative;
            z-index: 2;
        }

        .runner {
            position: absolute;
            width: 60px;
            height: 60px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 30px #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            animation: cross-bridge 4s infinite linear;
        }

        @keyframes cross-bridge {
            0% {
                left: 50px;
                bottom: 0;
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            50% {
                bottom: 200px;
            }

            90% {
                opacity: 1;
            }

            100% {
                left: 590px;
                bottom: 0;
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header"><img src="images/AppIcon.png" class="app-icon"><span class="brand-name">VYNTO</span>
            </div>
            <div class="eyebrow">HEDEF KÖPRÜSÜ</div>
            <div class="headline">Hedeflerine<br><span class="blue-text">Köprü Kur.</span></div>
            <div class="description">Neredesin ve nerede olmak istiyorsun? Vynto AI, mevcut durumunla hayallerin
                arasındaki o güvenli köprüyü saniyeler içinde inşa eder.</div>
            <div class="visual-container">
                <div class="bridge">
                    <div class="goal-post">🚩</div>
                    <div class="runner">🚀</div>
                    <div class="goal-post">🏆</div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
