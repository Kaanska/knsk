<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 60px;
        }

        .app-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 54px;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .eyebrow-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .eyebrow-line {
            width: 50px;
            height: 4px;
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            border-radius: 2px;
        }

        .eyebrow-text {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 4px;
            color: #4ee2c0;
            text-transform: uppercase;
        }

        .headline {
            font-size: 115px;
            font-weight: 800;
            line-height: 0.92;
            letter-spacing: -5px;
            color: #fff;
            margin-bottom: 30px;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            font-size: 34px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.4;
            max-width: 800px;
            font-weight: 500;
            margin-bottom: 60px;
        }

        /* VISUAL: Subscription Orbit */
        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .orbit-system {
            width: 600px;
            height: 600px;
            position: relative;
            transform: rotateX(20deg);
            transform-style: preserve-3d;
        }

        .center-hub {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, #4ee2c0, #2a8f75);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 60px rgba(78, 226, 192, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            z-index: 10;
        }

        .orbit-path {
            position: absolute;
            top: 50%;
            left: 50%;
            border: 2px dashed rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        .op-1 {
            width: 350px;
            height: 350px;
            animation: spin-right 10s infinite linear;
        }

        .op-2 {
            width: 550px;
            height: 550px;
            animation: spin-left 15s infinite linear;
        }

        .sub-icon {
            position: absolute;
            width: 70px;
            height: 70px;
            background: #fff;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: 800;
            color: #000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            animation: counter-rotate 10s infinite linear;
            /* Keeps icon upright */
        }

        .s-netflix {
            top: 0;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #e50914;
        }

        .s-spotify {
            bottom: 0;
            left: 50%;
            transform: translate(-50%, 50%);
            color: #1db954;
        }

        .s-adobe {
            top: 50%;
            left: 0;
            transform: translate(-50%, -50%);
            color: #ff0000;
        }

        .s-amazon {
            top: 50%;
            right: 0;
            transform: translate(50%, -50%);
            color: #ff9900;
        }

        @keyframes spin-right {
            0% {
                transform: translate(-50%, -50%) rotate(0deg);
            }

            100% {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        @keyframes spin-left {
            0% {
                transform: translate(-50%, -50%) rotate(0deg);
            }

            100% {
                transform: translate(-50%, -50%) rotate(-360deg);
            }
        }

        @keyframes counter-rotate {
            0% {
                transform: translate(-50%, -50%) rotate(0deg);
            }

            100% {
                transform: translate(-50%, -50%) rotate(-360deg);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>

            <div class="eyebrow-container">
                <div class="eyebrow-line"></div>
                <div class="eyebrow-text">ABONELİK YÖNETİMİ</div>
            </div>

            <div class="headline">Otomatik<br><span class="gradient-word">Düzen.</span></div>
            <div class="description">Netflix, Spotify, Amazon... Tüm aylık ödemelerini tek bir yörüngede topla. Hangisi
                ne zaman ödenecek, Vynto takip etsin.</div>

            <div class="visual-container">
                <div class="orbit-system">
                    <div class="center-hub">🔄</div>

                    <div class="orbit-path op-1">
                        <div class="sub-icon s-netflix" style="top: -35px; left: 50%; margin-left:0;">N</div>
                        <div class="sub-icon s-spotify" style="bottom: -35px; left: 50%; margin-left:0;">S</div>
                    </div>

                    <div class="orbit-path op-2">
                        <div class="sub-icon s-adobe" style="top: 50%; left: -35px; margin-top:0;">A</div>
                        <div class="sub-icon s-amazon" style="top: 50%; right: -35px; margin-top:0;">a</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
