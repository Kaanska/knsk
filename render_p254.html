<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 85% 15%, #0d323f 0%, #081116 65%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 900px;
            z-index: 10;
            padding-top: 120px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 80px;
        }

        .app-icon {
            width: 95px;
            height: 95px;
            border-radius: 24px;
        }

        .brand-name {
            font-size: 58px;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .eyebrow {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 3px;
            color: #4ee2c0;
            text-transform: uppercase;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .eyebrow::before {
            content: '';
            width: 60px;
            height: 3px;
            background: #4ee2c0;
        }

        .headline {
            font-size: 110px;
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -5px;
            color: #fff;
            margin-bottom: 35px;
        }

        .gradient-text {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            font-size: 36px;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.45;
            max-width: 820px;
            font-weight: 500;
        }

        /* Feature Visual: Debt Management */
        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .debt-card {
            width: 600px;
            background: rgba(25, 35, 40, 0.6);
            backdrop-filter: blur(40px);
            border: 2px solid rgba(255, 68, 68, 0.2);
            border-radius: 40px;
            padding: 50px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.4);
        }

        .debt-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .debt-title {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
        }

        .debt-status {
            color: #ff4444;
            font-weight: 800;
            font-size: 20px;
        }

        .debt-progress {
            width: 100%;
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            position: relative;
            margin-top: 20px;
        }

        .debt-fill {
            position: absolute;
            height: 100%;
            width: 65%;
            background: #ff4444;
            border-radius: 6px;
            box-shadow: 0 0 20px rgba(255, 68, 68, 0.5);
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="eyebrow">BORÇ YÖNETİMİ</div>
            <div class="headline">Borçları<br><span class="gradient-text">Kontrol Altına Al.</span></div>
            <div class="description">Kime ne kadar borcum var, ne zaman ödenecek? Vynto ile tüm borç ve alacaklarınızı
                şeffaf bir şekilde takip edin.</div>
            <div class="visual-container">
                <div class="debt-card">
                    <div class="debt-header">
                        <div class="debt-title">Kredi Kartı Borcu</div>
                        <div class="debt-status">₺12,450 / ₺20,000</div>
                    </div>
                    <div class="debt-progress">
                        <div class="debt-fill"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
