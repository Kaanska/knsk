<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 85% 15%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 60px;
        }

        .app-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
        }

        .brand-name {
            font-size: 54px;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .eyebrow-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .eyebrow-line {
            width: 50px;
            height: 4px;
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            border-radius: 2px;
        }

        .eyebrow-text {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 4px;
            color: #4ee2c0;
            text-transform: uppercase;
        }

        .headline {
            font-size: 115px;
            font-weight: 800;
            line-height: 0.92;
            letter-spacing: -5px;
            color: #fff;
            margin-bottom: 30px;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            font-size: 34px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.4;
            max-width: 800px;
            font-weight: 500;
            margin-bottom: 60px;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
        }

        /* LIST VISUAL: DYNAMIC TRANSACTION FEED */
        .list-container {
            width: 750px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            perspective: 1000px;
        }

        .list-item {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 40px 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            animation: slide-up 1s ease-out forwards;
            opacity: 0;
            transform: translateY(40px);
        }

        .item-info {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .item-icon {
            width: 70px;
            height: 70px;
            border-radius: 20px;
            background: rgba(78, 226, 192, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            border: 1px solid rgba(78, 226, 192, 0.2);
        }

        .item-name {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .main-t {
            font-size: 30px;
            font-weight: 700;
            color: #fff;
        }

        .sub-t {
            font-size: 20px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.4);
        }

        .item-val {
            font-size: 34px;
            font-weight: 800;
            color: #4ee2c0;
        }

        @keyframes slide-up {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>

            <div class="eyebrow-container">
                <div class="eyebrow-line"></div>
                <div class="eyebrow-text">GÖRÜNÜR BÜTÇE</div>
            </div>

            <div class="headline">Tüm İşlemler<br><span class="gradient-word">Tek Bir Bakışta.</span></div>
            <div class="description">Harcamalarınız saklanmasın. Vynto ile her işlem anında kategorize edilir ve
                finansal resminiz netleşir.</div>

            <div class="visual-container">
                <div class="list-container">
                    <div class="list-item" style="animation-delay: 0.1s;">
                        <div class="item-info">
                            <div class="item-icon">🛒</div>
                            <div class="item-name"><span class="main-t">Migros</span><span class="sub-t">MARKET •
                                    BUGÜN</span></div>
                        </div>
                        <div class="item-val">₺1.420</div>
                    </div>
                    <div class="list-item" style="animation-delay: 0.3s; border-color: rgba(78, 226, 192, 0.3);">
                        <div class="item-info">
                            <div class="item-icon"
                                style="background: rgba(82, 165, 255, 0.1); border-color: rgba(82, 165, 255, 0.2);">🎬
                            </div>
                            <div class="item-name"><span class="main-t">Netflix</span><span class="sub-t">EĞLENCE •
                                    DÜN</span></div>
                        </div>
                        <div class="item-val" style="color: #52a5ff;">₺189</div>
                    </div>
                    <div class="list-item" style="animation-delay: 0.5s;">
                        <div class="item-info">
                            <div class="item-icon">☕</div>
                            <div class="item-name"><span class="main-t">Starbucks</span><span class="sub-t">GIDA • 2 GÜN
                                    ÖNCE</span></div>
                        </div>
                        <div class="item-val">₺124</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
