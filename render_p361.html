<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .magnet-ui {
            width: 300px;
            height: 300px;
            color: #52a5ff;
            font-size: 300px;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            filter: drop-shadow(0 0 50px #52a5ff);
            transform: rotate(-45deg);
        }

        .coin-orb {
            position: absolute;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #4ee2c0, #000);
            border: 2px solid #4ee2c0;
            box-shadow: 0 0 20px rgba(78, 226, 192, 0.5);
            animation: attract-orb 3s infinite ease-in;
        }

        .o1 {
            top: 100px;
            right: 100px;
            animation-delay: 0s;
        }

        .o2 {
            top: 200px;
            right: 50px;
            animation-delay: 0.5s;
        }

        .o3 {
            top: 300px;
            right: 120px;
            animation-delay: 1s;
        }

        @keyframes attract-orb {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            100% {
                transform: translate(-300px, 200px) scale(0.5);
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Tüm Hesaplar<br><span class="gradient-word">Tek Yerde.</span></div>
            <div class="visual-container">
                <div class="magnet-ui">U</div>
                <div class="coin-orb o1"></div>
                <div class="coin-orb o2"></div>
                <div class="coin-orb o3"></div>
            </div>
        </div>
    </div>
</body>

</html>
