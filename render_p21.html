<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #050505;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.45;
            z-index: 0;
        }

        .blob-1 {
            width: 900px;
            height: 900px;
            top: -200px;
            right: -200px;
            background: linear-gradient(135deg, #1fa2ff, #12d8fa);
        }

        .blob-2 {
            width: 800px;
            height: 800px;
            bottom: -200px;
            left: -200px;
            background: linear-gradient(135deg, #a6c0fe, #f68084);
        }

        .content-container {
            width: 900px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            height: 100%;
            padding-top: 100px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 80px;
        }

        .app-icon {
            width: 90px;
            height: 90px;
            border-radius: 22px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .brand-name {
            font-size: 56px;
            font-weight: 800;
            letter-spacing: -1px;
            color: white;
            background: linear-gradient(90deg, #5EE7DF 0%, #4facfe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .text-section {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin-bottom: 80px;
        }

        .eyebrow {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #1fa2ff;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .eyebrow::before {
            content: '';
            width: 40px;
            height: 3px;
            background: #1fa2ff;
            display: block;
        }

        .main-headline {
            font-size: 100px;
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -3px;
            color: white;
        }

        .gradient-word {
            background: linear-gradient(to right, #1fa2ff, #12d8fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-text {
            margin-top: 30px;
            font-size: 32px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.4;
            max-width: 800px;
        }

        .card {
            width: 100%;
            padding: 60px;
            background: rgba(25, 25, 25, 0.6);
            backdrop-filter: blur(60px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 60px;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            max-height: 400px;
            margin-top: auto;
            margin-bottom: 100px;
        }

        .chart-wrapper {
            position: relative;
            width: 250px;
            height: 250px;
        }

        .progress-ring {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(#12d8fa 0% 80%, #333 80% 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(18, 216, 250, 0.3);
        }

        .ring-center {
            width: 180px;
            height: 180px;
            background: #111;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .ring-center div {
            color: white;
            font-size: 32px;
            font-weight: 800;
        }

        .ring-center span {
            color: #aaa;
            font-size: 16px;
        }

        .card-info {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 50%;
        }

        .goal-name {
            font-size: 24px;
            color: #1fa2ff;
            font-weight: 700;
        }

        .goal-label {
            font-size: 64px;
            font-weight: 800;
            color: white;
        }

        .goal-desc {
            font-size: 24px;
            color: #888;
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="content-container">
            <div class="header"><img src="images/AppIcon.png" class="app-icon"><span class="brand-name">VYNTO</span>
            </div>
            <div class="text-section">
                <div class="eyebrow">HEDEFLER & BİRİKİM</div>
                <div class="main-headline">Hayallerine<br><span class="gradient-word">Ulaş.</span></div>
                <p class="sub-text">Tatil, Araba, Ev... Hedefini belirle, birikimlerini takip et ve hayallerini
                    gerçekleştir.</p>
            </div>
            <div class="card">
                <div class="card-info"><span class="goal-name">Hedef</span>
                    <div class="goal-label">Yeni Araba</div><span class="goal-desc">Kalan: ₺200.000</span>
                </div>
                <div class="chart-wrapper">
                    <div class="progress-ring">
                        <div class="ring-center">
                            <div>%80</div><span>Tamamlandı</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
