<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 85% 15%, #0d323f 0%, #081116 65%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 900px;
            z-index: 10;
            padding-top: 120px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 80px;
        }

        .app-icon {
            width: 95px;
            height: 95px;
            border-radius: 24px;
        }

        .brand-name {
            font-size: 58px;
            font-weight: 800;
            color: #3da9eb;
            letter-spacing: -2px;
        }

        .eyebrow {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 3px;
            color: #3da9eb;
            text-transform: uppercase;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .eyebrow::before {
            content: '';
            width: 60px;
            height: 3px;
            background: #3da9eb;
        }

        .headline {
            font-size: 110px;
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -5px;
            color: #fff;
            margin-bottom: 35px;
        }

        .blue-text {
            color: #3da9eb;
        }

        .description {
            font-size: 36px;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.45;
            max-width: 820px;
            font-weight: 500;
        }

        /* High-End Visual: Transaction Stream */
        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .bubble-stream {
            width: 100%;
            height: 600px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 20px 40px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            animation: float-bubble 6s infinite ease-in-out;
        }

        .bubble span {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
        }

        .bubble .price {
            color: #3da9eb;
            font-weight: 800;
        }

        .bubble:nth-child(1) {
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .bubble:nth-child(2) {
            top: 40%;
            right: 5%;
            animation-delay: 1s;
        }

        .bubble:nth-child(3) {
            bottom: 15%;
            left: 20%;
            animation-delay: 2s;
        }

        .bubble:nth-child(4) {
            top: 60%;
            left: 0%;
            animation-delay: 3s;
        }

        .bubble:nth-child(5) {
            top: 5%;
            right: 15%;
            animation-delay: 4.5s;
        }

        @keyframes float-bubble {

            0%,
            100% {
                transform: translateY(0) scale(1);
                opacity: 0.8;
            }

            50% {
                transform: translateY(-30px) scale(1.05);
                opacity: 1;
            }
        }

        .ai-lens {
            position: absolute;
            width: 500px;
            height: 500px;
            border: 2px solid #3da9eb;
            border-radius: 50%;
            box-shadow: inset 0 0 100px rgba(61, 169, 235, 0.2), 0 0 50px rgba(61, 169, 235, 0.1);
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: lens-move 8s infinite alternate ease-in-out;
        }

        @keyframes lens-move {
            from {
                transform: translate(-100px, -50px);
            }

            to {
                transform: translate(100px, 50px);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="eyebrow">AKILLI TAKİP</div>
            <div class="headline">Tüm Harcamalar<br><span class="blue-text">Tek Bir Akışta.</span></div>
            <div class="description">Binlerce işlem arasında kaybolmayın. Vynto AI her bir harcamayı anlık olarak
                yakalar, kategorize eder ve size en temiz tabloyu sunar.</div>
            <div class="visual-container">
                <div class="bubble-stream">
                    <div class="bubble"><span>☕ Starbucks</span> <span class="price">124₺</span></div>
                    <div class="bubble"><span>🎬 Netflix</span> <span class="price">189₺</span></div>
                    <div class="bubble"><span>🛍️ Amazon</span> <span class="price">1.240₺</span></div>
                    <div class="bubble"><span>🍎 Apple</span> <span class="price">49₺</span></div>
                    <div class="bubble"><span>🍕 Yemeksepeti</span> <span class="price">310₺</span></div>
                    <div class="ai-lens"></div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
