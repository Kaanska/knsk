<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 90% 10%, #0d323f 0%, #081116 60%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 900px;
            z-index: 10;
            padding-top: 120px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 80px;
        }

        .app-icon {
            width: 90px;
            height: 90px;
            border-radius: 22px;
        }

        .brand-name {
            font-size: 56px;
            font-weight: 800;
            color: #3da9eb;
            letter-spacing: -1.5px;
        }

        .eyebrow {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #3da9eb;
            text-transform: uppercase;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .eyebrow::before {
            content: '';
            width: 50px;
            height: 3px;
            background: #3da9eb;
        }

        .headline {
            font-size: 115px;
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -4.5px;
            color: #fff;
            margin-bottom: 30px;
        }

        .blue-text {
            color: #3da9eb;
        }

        .description {
            font-size: 34px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.4;
            max-width: 820px;
            font-weight: 500;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .alchemy-pot {
            width: 450px;
            height: 450px;
            background: rgba(13, 20, 24, 0.4);
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .lead {
            font-size: 100px;
            position: absolute;
            left: 50px;
            opacity: 0.5;
            filter: grayscale(1);
        }

        .gold {
            font-size: 180px;
            filter: drop-shadow(0 0 40px #FFD700);
            animation: gold-glow 2s infinite ease-in-out;
        }

        .transmutation {
            position: absolute;
            width: 300px;
            height: 4px;
            background: linear-gradient(to right, transparent, #3da9eb, #FFD700, transparent);
            animation: transform-line 2s infinite linear;
        }

        @keyframes gold-glow {

            0%,
            100% {
                transform: scale(1);
                filter: drop-shadow(0 0 40px #FFD700);
            }

            50% {
                transform: scale(1.1);
                filter: drop-shadow(0 0 60px #FFD700);
            }
        }

        @keyframes transform-line {
            0% {
                transform: translateX(-150%);
                opacity: 0;
            }

            50% {
                opacity: 1;
            }

            100% {
                transform: translateX(150%);
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header"><img src="images/AppIcon.png" class="app-icon"><span class="brand-name">VYNTO</span>
            </div>
            <div class="eyebrow">TASARRUF SİMYASI</div>
            <div class="headline">Harcamaları<br><span class="blue-text">Altına Dönüştür.</span></div>
            <div class="description">Gereksiz giderleri Vynto AI ile süzgeçten geçirin. Karmaşık faturaları saf
                tasarrufa çeviren modern bir simya ile tanışın.</div>
            <div class="visual-container">
                <div class="alchemy-pot">
                    <div class="lead">🌑</div>
                    <div class="transmutation"></div>
                    <div class="gold">💰</div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
