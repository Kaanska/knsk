<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 90% 10%, #0d323f 0%, #081116 60%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 900px;
            z-index: 10;
            padding-top: 120px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 80px;
        }

        .app-icon {
            width: 90px;
            height: 90px;
            border-radius: 22px;
        }

        .brand-name {
            font-size: 56px;
            font-weight: 800;
            color: #3da9eb;
            letter-spacing: -1.5px;
        }

        .eyebrow {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #3da9eb;
            text-transform: uppercase;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .eyebrow::before {
            content: '';
            width: 50px;
            height: 3px;
            background: #3da9eb;
        }

        .headline {
            font-size: 115px;
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -4.5px;
            color: #fff;
            margin-bottom: 30px;
        }

        .blue-text {
            color: #3da9eb;
        }

        .description {
            font-size: 34px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.4;
            max-width: 820px;
            font-weight: 500;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .energy-core {
            width: 400px;
            height: 400px;
            border: 4px solid #3da9eb;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 60px rgba(61, 169, 235, 0.4);
            position: relative;
        }

        .core-pulse {
            width: 150px;
            height: 150px;
            background: #3da9eb;
            border-radius: 50%;
            animation: pulse 2s infinite ease-in-out;
        }

        .energy-ring {
            position: absolute;
            width: 300px;
            height: 300px;
            border: 2px dashed rgba(61, 169, 235, 0.5);
            border-radius: 50%;
            animation: spin 8s infinite linear;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.9);
                box-shadow: 0 0 30px #3da9eb;
            }

            50% {
                transform: scale(1.1);
                box-shadow: 0 0 80px #3da9eb;
            }

            100% {
                transform: scale(0.9);
                box-shadow: 0 0 30px #3da9eb;
            }
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header"><img src="images/AppIcon.png" class="app-icon"><span class="brand-name">VYNTO</span>
            </div>
            <div class="eyebrow">SINIRSIZ ENERJİ</div>
            <div class="headline">Bütçenize<br><span class="blue-text">Güç Katın.</span></div>
            <div class="description">Pasif gelirlerinizi yakıta dönüştürün. Vynto AI, bütçenizin enerjisini optimize
                eder ve finansal motorunuzu her zaman canlı tutar.</div>
            <div class="visual-container">
                <div class="energy-core">
                    <div class="core-pulse"></div>
                    <div class="energy-ring"></div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
