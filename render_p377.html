<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #111;
            background: linear-gradient(135deg, #000 0%, #1a1a1a 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .infinity-tunnel {
            width: 400px;
            height: 400px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tnl-ring {
            position: absolute;
            border: 2px solid #52a5ff;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(82, 165, 255, 0.5);
            animation: zoom-tunnel 4s infinite linear;
        }

        .tnl-1 {
            width: 100%;
            height: 100%;
            animation-delay: 0s;
            opacity: 1;
        }

        .tnl-2 {
            width: 80%;
            height: 80%;
            animation-delay: 0.5s;
            opacity: 0.8;
        }

        .tnl-3 {
            width: 60%;
            height: 60%;
            animation-delay: 1s;
            opacity: 0.6;
        }

        .tnl-4 {
            width: 40%;
            height: 40%;
            animation-delay: 1.5s;
            opacity: 0.4;
        }

        .tnl-5 {
            width: 20%;
            height: 20%;
            animation-delay: 2s;
            opacity: 0.2;
        }

        .center-light {
            width: 10px;
            height: 10px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 50px #fff;
            z-index: 10;
        }

        .reflection-layer {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, transparent 30%, #000 90%);
        }

        @keyframes zoom-tunnel {
            0% {
                transform: scale(0.1);
                opacity: 0;
            }

            50% {
                opacity: 1;
            }

            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Sınırsız<br><span class="gradient-word">Büyüme.</span></div>
            <div class="visual-container">
                <div class="infinity-tunnel">
                    <div class="reflection-layer"></div>
                    <div class="tnl-ring tnl-1"></div>
                    <div class="tnl-ring tnl-2"></div>
                    <div class="tnl-ring tnl-3"></div>
                    <div class="tnl-ring tnl-4"></div>
                    <div class="tnl-ring tnl-5"></div>
                    <div class="center-light"></div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
