<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 90% 10%, #0d323f 0%, #081116 60%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 900px;
            z-index: 10;
            padding-top: 120px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 80px;
        }

        .app-icon {
            width: 90px;
            height: 90px;
            border-radius: 22px;
        }

        .brand-name {
            font-size: 56px;
            font-weight: 800;
            color: #3da9eb;
            letter-spacing: -1.5px;
        }

        .eyebrow {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #3da9eb;
            text-transform: uppercase;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .eyebrow::before {
            content: '';
            width: 50px;
            height: 3px;
            background: #3da9eb;
        }

        .headline {
            font-size: 115px;
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -4.5px;
            color: #fff;
            margin-bottom: 30px;
        }

        .blue-text {
            color: #3da9eb;
        }

        .description {
            font-size: 34px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.4;
            max-width: 820px;
            font-weight: 500;
        }

        /* Central Piece: Security Shield */
        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .shield-box {
            width: 500px;
            height: 400px;
            background: rgba(13, 20, 24, 0.6);
            border: 2px solid #3da9eb;
            border-radius: 40px;
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
        }

        .lock-icon {
            font-size: 150px;
            filter: drop-shadow(0 0 30px #3da9eb);
            animation: lock-glow 3s infinite ease-in-out;
        }

        @keyframes lock-glow {

            0%,
            100% {
                opacity: 0.8;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.05);
            }
        }

        .status-badge {
            position: absolute;
            bottom: -30px;
            background: #3da9eb;
            color: #081116;
            padding: 10px 30px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 24px;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header"><img src="images/AppIcon.png" class="app-icon"><span class="brand-name">VYNTO</span>
            </div>
            <div class="eyebrow">DİJİTAL GÜVENLİK</div>
            <div class="headline">Verilerinizi<br><span class="blue-text">AI ile Koruyun.</span></div>
            <div class="description">En üst düzey şifreleme ve AI destekli anomali tespitiyle, finansal dünyanız Vynto
                ile her an güvende.</div>
            <div class="visual-container">
                <div class="shield-box">
                    <div class="lock-icon">🛡️</div>
                    <div class="status-badge">AI ENCRYPTION ACTIVE</div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
