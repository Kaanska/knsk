<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 60px;
        }

        .app-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 54px;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .eyebrow-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .eyebrow-line {
            width: 50px;
            height: 4px;
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            border-radius: 2px;
        }

        .eyebrow-text {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 4px;
            color: #4ee2c0;
            text-transform: uppercase;
        }

        .headline {
            font-size: 115px;
            font-weight: 800;
            line-height: 0.92;
            letter-spacing: -5px;
            color: #fff;
            margin-bottom: 30px;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            font-size: 34px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.4;
            max-width: 800px;
            font-weight: 500;
            margin-bottom: 60px;
        }

        /* VISUAL: Ghost Virtual Card */
        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .card-ghost {
            width: 600px;
            height: 380px;
            background: linear-gradient(135deg, rgba(82, 165, 255, 0.1), rgba(78, 226, 192, 0.1));
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            position: relative;
            transform: rotateY(-15deg) rotateX(10deg);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            overflow: hidden;
            animation: card-hover 6s infinite ease-in-out;
        }

        .card-chip {
            width: 70px;
            height: 50px;
            background: linear-gradient(to bottom right, #ddd, #999);
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .card-num {
            font-size: 40px;
            font-weight: 800;
            letter-spacing: 4px;
            background: linear-gradient(to right, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            display: flex;
            gap: 20px;
        }

        .glitch-text {
            position: relative;
            animation: glitch 2s infinite linear alternate-reverse;
        }

        .expire {
            margin-top: auto;
            font-size: 20px;
            color: rgba(255, 255, 255, 0.6);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .e-label {
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .logo-v {
            font-size: 30px;
            font-weight: 900;
            color: #fff;
            font-style: italic;
        }

        .shield-glow {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(78, 226, 192, 0.2), transparent 70%);
            animation: pulse-shield 4s infinite ease-in-out;
            pointer-events: none;
        }

        @keyframes card-hover {

            0%,
            100% {
                transform: rotateY(-15deg) rotateX(10deg) translateY(0);
            }

            50% {
                transform: rotateY(-10deg) rotateX(5deg) translateY(-20px);
            }
        }

        @keyframes glitch {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.8;
                transform: skewX(10deg);
            }

            100% {
                opacity: 1;
            }
        }

        @keyframes pulse-shield {

            0%,
            100% {
                opacity: 0.5;
                transform: scale(1);
            }

            50% {
                opacity: 0.8;
                transform: scale(1.1);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>

            <div class="eyebrow-container">
                <div class="eyebrow-line"></div>
                <div class="eyebrow-text">HAYALET KARTLAR</div>
            </div>

            <div class="headline">Güvenli ve<br><span class="gradient-word">Görünmez.</span></div>
            <div class="description">Tek kullanımlık sanal kartlarla internet alışverişlerini endişesiz yap. İşlem
                biter, kart kaybolur.</div>

            <div class="visual-container">
                <div class="card-ghost">
                    <div class="shield-glow"></div>
                    <div class="card-chip"></div>
                    <div class="card-num">
                        <span>4825</span>
                        <span class="glitch-text">XXXX</span>
                        <span class="glitch-text">XXXX</span>
                        <span>9012</span>
                    </div>
                    <div class="expire">
                        <div>
                            <div class="e-label">VALID THRU</div>
                            <div>12/29</div>
                        </div>
                        <div class="logo-v">VISA</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
