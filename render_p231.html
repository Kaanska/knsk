<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 90% 10%, #0d323f 0%, #081116 60%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 900px;
            z-index: 10;
            padding-top: 120px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 80px;
        }

        .app-icon {
            width: 90px;
            height: 90px;
            border-radius: 22px;
        }

        .brand-name {
            font-size: 56px;
            font-weight: 800;
            color: #3da9eb;
            letter-spacing: -1.5px;
        }

        .eyebrow {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #3da9eb;
            text-transform: uppercase;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .eyebrow::before {
            content: '';
            width: 50px;
            height: 3px;
            background: #3da9eb;
        }

        .headline {
            font-size: 115px;
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -4.5px;
            color: #fff;
            margin-bottom: 30px;
        }

        .blue-text {
            color: #3da9eb;
        }

        .description {
            font-size: 34px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.4;
            max-width: 820px;
            font-weight: 500;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .galaxy-node {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 20px #3da9eb;
        }

        .central-sun {
            width: 120px;
            height: 120px;
            background: #3da9eb;
            border-radius: 50%;
            box-shadow: 0 0 80px #3da9eb;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            z-index: 5;
        }

        .star {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle var(--d) infinite;
        }

        @keyframes twinkle {

            0%,
            100% {
                opacity: 0.3;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.5);
            }
        }

        .constellation {
            position: absolute;
            width: 600px;
            height: 600px;
            border: 1px solid rgba(61, 169, 235, 0.1);
            border-radius: 50%;
            animation: rotate 30s infinite linear;
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header"><img src="images/AppIcon.png" class="app-icon"><span class="brand-name">VYNTO</span>
            </div>
            <div class="eyebrow">FİNANSAL GALAKSİ</div>
            <div class="headline">Düzenin<br><span class="blue-text">Büyüsüne Kapıl.</span></div>
            <div class="description">Binlerce veri noktası, Vynto AI ile mükemmel bir galaksi gibi hizalanır. Finansal
                evreniniz artık karmaşık değil, büyüleyici.</div>
            <div class="visual-container">
                <div class="central-sun">✨</div>
                <div class="constellation">
                    <div class="star" style="top:20%; left:30%; --d:2s;"></div>
                    <div class="star" style="top:40%; left:70%; --d:3s;"></div>
                    <div class="star" style="top:80%; left:20%; --d:4s;"></div>
                    <div class="star" style="top:10%; left:80%; --d:2.5s;"></div>
                    <div class="star" style="top:60%; left:40%; --d:5s;"></div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
