<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .lock-screen {
            width: 450px;
            height: 800px;
            background: #081116;
            border-radius: 50px;
            border: 4px solid #222;
            position: relative;
            transform: rotateY(-5deg);
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .face-id-icon {
            font-size: 120px;
            color: #4ee2c0;
            filter: drop-shadow(0 0 20px #4ee2c0);
            animation: pulse-icon 2s infinite ease-in-out;
            margin-bottom: 30px;
        }

        .scan-wave {
            position: absolute;
            width: 100%;
            height: 4px;
            background: #4ee2c0;
            top: 40%;
            animation: scan-face 2s infinite ease-in-out alternate;
            box-shadow: 0 0 20px #4ee2c0;
            opacity: 0.8;
        }

        .l-text {
            color: #fff;
            font-size: 24px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .l-sub {
            color: #666;
            font-size: 14px;
            margin-top: 10px;
        }

        @keyframes pulse-icon {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.8;
            }

            50% {
                transform: scale(1.1);
                opacity: 1;
            }
        }

        @keyframes scan-face {
            0% {
                top: 30%;
                transform: scaleX(0.5);
                opacity: 0;
            }

            50% {
                opacity: 1;
                transform: scaleX(1);
            }

            100% {
                top: 60%;
                transform: scaleX(0.5);
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>

            <div class="headline">Sadece<br><span class="gradient-word">Sen.</span></div>

            <div class="visual-container">
                <div class="lock-screen">
                    <div class="scan-wave"></div>
                    <div class="face-id-icon">☺</div>
                    <div class="l-text">Face ID</div>
                    <div class="l-sub">Giriş Yapılıyor...</div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
