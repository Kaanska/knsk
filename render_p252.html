<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 85% 15%, #0d323f 0%, #081116 65%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 900px;
            z-index: 10;
            padding-top: 120px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 80px;
        }

        .app-icon {
            width: 95px;
            height: 95px;
            border-radius: 24px;
        }

        .brand-name {
            font-size: 58px;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .eyebrow {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 3px;
            color: #4ee2c0;
            text-transform: uppercase;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .eyebrow::before {
            content: '';
            width: 60px;
            height: 3px;
            background: #4ee2c0;
        }

        .headline {
            font-size: 110px;
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -5px;
            color: #fff;
            margin-bottom: 35px;
        }

        .gradient-text {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            font-size: 36px;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.45;
            max-width: 820px;
            font-weight: 500;
        }

        /* Feature Visual: Subscription Tracking */
        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .sub-list {
            width: 650px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .sub-item {
            background: rgba(25, 35, 40, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            padding: 35px 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            animation: slide-in 0.8s ease-out forwards;
            opacity: 0;
        }

        .sub-info {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .sub-icon {
            width: 60px;
            height: 60px;
            border-radius: 15px;
            background: #222;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
        }

        .sub-name {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
        }

        .sub-price {
            font-size: 32px;
            font-weight: 800;
            color: #4ee2c0;
        }

        @keyframes slide-in {
            from {
                transform: translateX(50px);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="eyebrow">ABONELİK TAKİBİ</div>
            <div class="headline">Sinsi Giderlere<br><span class="gradient-text">Son Verin.</span></div>
            <div class="description">Unutulan abonelikler bütçenizi eritmesin. Vynto tüm üyeliklerinizi tek bir listede
                toplar ve ödeme günlerini hatırlatır.</div>
            <div class="visual-container">
                <div class="sub-list">
                    <div class="sub-item" style="animation-delay: 0.2s;">
                        <div class="sub-info">
                            <div class="sub-icon">🎬</div>
                            <div class="sub-name">Netflix</div>
                        </div>
                        <div class="sub-price">₺189.90</div>
                    </div>
                    <div class="sub-item" style="animation-delay: 0.4s; border-color: #4ee2c0;">
                        <div class="sub-info">
                            <div class="sub-icon">🍎</div>
                            <div class="sub-name">Apple Music</div>
                        </div>
                        <div class="sub-price">₺49.99</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
