<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .puzzle-board {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            width: 400px;
            height: 400px;
        }

        .piece {
            width: 195px;
            height: 195px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        .p1 {
            border-radius: 10px 50px 10px 10px;
        }

        .p2 {
            border-radius: 50px 10px 10px 10px;
        }

        .p3 {
            border-radius: 10px 10px 10px 50px;
        }

        .missing-slot {
            width: 195px;
            height: 195px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px dashed rgba(255, 255, 255, 0.3);
            position: relative;
        }

        .last-piece {
            position: absolute;
            width: 195px;
            height: 195px;
            background: linear-gradient(135deg, #4ee2c0, #52a5ff);
            border-radius: 10px 10px 50px 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            font-weight: 900;
            color: #fff;
            box-shadow: 0 0 50px rgba(78, 226, 192, 0.5);
            animation: slot-in 3s infinite ease-out;
            top: -100px;
            left: 100px;
            opacity: 0;
        }

        @keyframes slot-in {
            0% {
                transform: scale(1.5) rotate(10deg);
                opacity: 0;
            }

            50% {
                opacity: 1;
            }

            100% {
                top: 0;
                left: 0;
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Eksik<br><span class="gradient-word">Parça.</span></div>
            <div class="visual-container">
                <div class="puzzle-board">
                    <div class="piece p1"></div>
                    <div class="piece p2"></div>
                    <div class="piece p3"></div>
                    <div class="missing-slot">
                        <div class="last-piece">V</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
