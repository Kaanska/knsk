<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 60px;
        }

        .app-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 54px;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .eyebrow-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .eyebrow-line {
            width: 50px;
            height: 4px;
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            border-radius: 2px;
        }

        .eyebrow-text {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 4px;
            color: #4ee2c0;
            text-transform: uppercase;
        }

        .headline {
            font-size: 115px;
            font-weight: 800;
            line-height: 0.92;
            letter-spacing: -5px;
            color: #fff;
            margin-bottom: 30px;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            font-size: 34px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.4;
            max-width: 800px;
            font-weight: 500;
            margin-bottom: 60px;
        }

        /* THE "DATA SPHERE" VISUAL */
        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .sphere-container {
            width: 500px;
            height: 500px;
            position: relative;
            transform-style: preserve-3d;
            animation: rotate-data 20s infinite linear;
        }

        .data-point {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #4ee2c0;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #fff;
            box-shadow: 0 0 20px rgba(78, 226, 192, 0.4);
        }

        .dp-1 {
            transform: rotateY(0deg) translateZ(250px);
        }

        .dp-2 {
            transform: rotateY(72deg) translateZ(250px);
            border-color: #52a5ff;
            box-shadow: 0 0 20px rgba(82, 165, 255, 0.4);
        }

        .dp-3 {
            transform: rotateY(144deg) translateZ(250px);
        }

        .dp-4 {
            transform: rotateY(216deg) translateZ(250px);
            border-color: #52a5ff;
            box-shadow: 0 0 20px rgba(82, 165, 255, 0.4);
        }

        .dp-5 {
            transform: rotateY(288deg) translateZ(250px);
        }

        .dp-6 {
            transform: rotateX(90deg) translateZ(250px);
        }

        .dp-7 {
            transform: rotateX(-90deg) translateZ(250px);
        }

        .center-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.5);
            width: 200px;
            text-align: center;
        }

        .connection-line {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 1px dashed rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            transform: rotateX(60deg);
        }

        @keyframes rotate-data {
            from {
                transform: rotateY(0deg);
            }

            to {
                transform: rotateY(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>

            <div class="eyebrow-container">
                <div class="eyebrow-line"></div>
                <div class="eyebrow-text">360° GÖRÜŞ AÇISI</div>
            </div>

            <div class="headline">Verilerin<br><span class="gradient-word">Derinliği.</span></div>
            <div class="description">Harcama, birikim, yatırım... Finansal hayatınızın her bir noktası Vynto'nun akıllı
                analiz küresinde birleşir.</div>

            <div class="visual-container">
                <div class="sphere-container">
                    <div class="connection-line"></div>
                    <div class="connection-line" style="transform: rotateY(90deg) rotateX(60deg);"></div>
                    <div class="data-point dp-1">📊</div>
                    <div class="data-point dp-2">💰</div>
                    <div class="data-point dp-3">🏠</div>
                    <div class="data-point dp-4">📈</div>
                    <div class="data-point dp-5">💳</div>
                    <div class="center-text">DATA</div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
