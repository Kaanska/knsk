<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .maze-board {
            width: 500px;
            height: 500px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #333;
            transform: rotateX(20deg);
            position: relative;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 2px;
            padding: 2px;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.8);
        }

        .wall {
            background: #333;
            border-radius: 2px;
        }

        .path {
            background: rgba(78, 226, 192, 0.1);
        }

        .solution-line {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            stroke: #4ee2c0;
            stroke-width: 5;
            fill: none;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: trace-path 3s infinite linear;
            filter: drop-shadow(0 0 10px #4ee2c0);
        }

        .finish-flag {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 40px;
            color: #ffd700;
            animation: bounce-flag 1s infinite alternate;
        }

        @keyframes trace-path {
            0% {
                stroke-dashoffset: 1000;
            }

            100% {
                stroke-dashoffset: 0;
            }
        }

        @keyframes bounce-flag {
            0% {
                transform: translateY(0);
            }

            100% {
                transform: translateY(-10px);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Yolunu<br><span class="gradient-word">Bul.</span></div>
            <div class="visual-container">
                <div class="maze-board">
                    <!-- Simple Grid representation -->
                    <div class="wall"></div>
                    <div class="path"></div>
                    <div class="wall"></div>
                    <div class="wall"></div>
                    <div class="wall"></div>
                    <div class="wall"></div>
                    <div class="path"></div>
                    <div class="path"></div>
                    <div class="path"></div>
                    <div class="wall"></div>
                    <div class="wall"></div>
                    <div class="wall"></div>
                    <div class="wall"></div>
                    <div class="path"></div>
                    <div class="wall"></div>
                    <div class="wall"></div>
                    <div class="path"></div>
                    <div class="path"></div>
                    <div class="path"></div>
                    <div class="path"></div>
                    <div class="wall"></div>
                    <div class="wall"></div>
                    <div class="wall"></div>
                    <div class="wall"></div>
                    <div class="path"></div>

                    <svg class="solution-line" viewBox="0 0 500 500">
                        <path d="M150 50 L150 150 L350 150 L350 350 L450 350 L450 450" />
                    </svg>
                    <div class="finish-flag">🏁</div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
