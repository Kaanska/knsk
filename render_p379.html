<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #111;
            background: radial-gradient(circle at 50% 10%, #1a1a1a 0%, #000 80%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .sand-glass {
            width: 250px;
            height: 400px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
            clip-path: polygon(0 0, 100% 0, 80% 50%, 100% 100%, 0 100%, 20% 50%);
        }

        .pixel-stream {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 50%;
            background: #4ee2c0;
            transform: translateX(-50%);
            box-shadow: 0 0 10px #4ee2c0;
            animation: flow-stream 0.5s infinite linear;
        }

        .top-pixels {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 210px;
            height: 150px;
            background: linear-gradient(to bottom, #4ee2c0, transparent);
            animation: drain 5s infinite linear;
        }

        .bottom-pile {
            position: absolute;
            bottom: 0;
            left: 20px;
            width: 210px;
            height: 0;
            background: #4ee2c0;
            border-radius: 50% 50% 0 0;
            animation: fill-up 5s infinite linear;
            box-shadow: 0 0 30px #4ee2c0;
        }

        .digital-particles {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .dp {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #fff;
            animation: fall-pixel 2s infinite linear;
        }

        @keyframes drain {
            0% {
                height: 150px;
                clip-path: inset(0 0 0 0);
            }

            100% {
                height: 0;
                clip-path: inset(100% 0 0 0);
            }
        }

        @keyframes fill-up {
            0% {
                height: 0;
            }

            100% {
                height: 120px;
            }
        }

        @keyframes fall-pixel {
            0% {
                top: 0;
                opacity: 1;
            }

            100% {
                top: 100%;
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Dijital<br><span class="gradient-word">Zaman.</span></div>
            <div class="visual-container">
                <div class="sand-glass">
                    <div class="top-pixels"></div>
                    <div class="pixel-stream"></div>
                    <div class="bottom-pile"></div>
                    <div class="digital-particles">
                        <div class="dp" style="left: 40%; animation-delay: 0s;"></div>
                        <div class="dp" style="left: 60%; animation-delay: 0.5s;"></div>
                        <div class="dp" style="left: 30%; animation-delay: 1s;"></div>
                        <div class="dp" style="left: 70%; animation-delay: 1.5s;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
