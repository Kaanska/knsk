<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .scale {
            position: relative;
            width: 400px;
            height: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .base {
            width: 150px;
            height: 20px;
            background: #333;
            border-radius: 10px;
            margin-top: auto;
        }

        .pillar {
            width: 10px;
            height: 250px;
            background: #555;
            margin-bottom: -10px;
        }

        .balance-beam {
            width: 400px;
            height: 10px;
            background: #fff;
            border-radius: 5px;
            position: absolute;
            top: 100px;
            animation: tilt 4s infinite ease-in-out;
            transform-origin: center;
        }

        .pan {
            width: 100px;
            height: 50px;
            border-radius: 0 0 50px 50px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            position: absolute;
            top: 10px;
        }

        .cord {
            width: 2px;
            height: 100px;
            background: rgba(255, 255, 255, 0.2);
            position: absolute;
            top: -100px;
            left: 50%;
        }

        .p-left {
            left: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #4ee2c0;
            font-size: 30px;
        }

        .p-right {
            right: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ff6b6b;
            font-size: 30px;
        }

        @keyframes tilt {

            0%,
            100% {
                transform: rotate(0deg);
            }

            25% {
                transform: rotate(-5deg);
            }

            75% {
                transform: rotate(5deg);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Hassas<br><span class="gradient-word">Denge.</span></div>
            <div class="visual-container">
                <div class="scale">
                    <div class="balance-beam">
                        <div class="pan p-left">
                            <div class="cord"></div>💰
                        </div>
                        <div class="pan p-right">
                            <div class="cord"></div>💳
                        </div>
                    </div>
                    <div class="pillar"></div>
                    <div class="base"></div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
