<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 85% 15%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 60px;
        }

        .app-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 54px;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .eyebrow-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .eyebrow-line {
            width: 50px;
            height: 4px;
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            border-radius: 2px;
        }

        .eyebrow-text {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 4px;
            color: #4ee2c0;
            text-transform: uppercase;
        }

        .headline {
            font-size: 115px;
            font-weight: 800;
            line-height: 0.92;
            letter-spacing: -5px;
            color: #fff;
            margin-bottom: 30px;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            font-size: 34px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.4;
            max-width: 800px;
            font-weight: 500;
            margin-bottom: 60px;
        }

        /* VISUAL: Total Wealth Portfolio - NO CRYPTO, ONLY TL VALUES */
        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .assets-pie {
            width: 500px;
            height: 500px;
            position: relative;
            transform: rotateX(15deg) rotateZ(15deg);
        }

        .main-pie {
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background: conic-gradient(#4ee2c0 0% 40%, #52a5ff 40% 70%, #ffd700 70% 100%);
            box-shadow: 0 0 100px rgba(82, 165, 255, 0.3);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
        }

        .pie-hole {
            width: 250px;
            height: 250px;
            background: #081116;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .center-label {
            color: #888;
            font-size: 16px;
            letter-spacing: 1px;
        }

        .center-val {
            color: #fff;
            font-size: 36px;
            font-weight: 900;
        }

        .asset-card {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px 25px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            animation: float-card 4s infinite ease-in-out;
            min-width: 180px;
        }

        .ac-1 {
            top: -20px;
            left: -50px;
            border-left: 5px solid #4ee2c0;
            animation-delay: 0s;
        }

        .ac-2 {
            bottom: 50px;
            right: -80px;
            border-left: 5px solid #ffd700;
            animation-delay: 1s;
        }

        .ac-3 {
            top: 50px;
            right: -60px;
            border-left: 5px solid #52a5ff;
            animation-delay: 2s;
        }

        .ac-icon {
            font-size: 24px;
        }

        .ac-name {
            color: #fff;
            font-weight: 700;
            font-size: 18px;
        }

        .ac-val {
            color: rgba(255, 255, 255, 0.7);
            font-size: 18px;
            font-weight: 600;
            margin-top: 2px;
        }

        @keyframes float-card {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-15px);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>

            <div class="eyebrow-container">
                <div class="eyebrow-line"></div>
                <div class="eyebrow-text">TOPLAM VARLIK</div>
            </div>

            <div class="headline">Bütünsel<br><span class="gradient-word">Bakış.</span></div>
            <div class="description">Nakit, döviz veya altın. Vynto ile tüm birikimlerini tek ekranda topla, toplam
                servetini TL karşılığıyla gör.</div>

            <div class="visual-container">
                <div class="assets-pie">
                    <div class="main-pie"></div>
                    <div class="pie-hole">
                        <div class="center-label">NET VARLIK</div>
                        <div class="center-val">₺345.500</div>
                    </div>

                    <div class="asset-card ac-1">
                        <div class="ac-icon">💸</div>
                        <div>
                            <div class="ac-name">Nakit</div>
                            <div class="ac-val">₺140.000</div>
                        </div>
                    </div>
                    <div class="asset-card ac-2">
                        <div class="ac-icon">🥇</div>
                        <div>
                            <div class="ac-name">Altın</div>
                            <div class="ac-val">₺115.500</div>
                        </div>
                    </div>
                    <div class="asset-card ac-3">
                        <div class="ac-icon">💶</div>
                        <div>
                            <div class="ac-name">Döviz</div>
                            <div class="ac-val">₺90.000</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
