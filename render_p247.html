<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 85% 15%, #0d323f 0%, #081116 65%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 900px;
            z-index: 10;
            padding-top: 120px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 80px;
        }

        .app-icon {
            width: 95px;
            height: 95px;
            border-radius: 24px;
        }

        .brand-name {
            font-size: 58px;
            font-weight: 800;
            color: #3da9eb;
            letter-spacing: -2px;
        }

        .eyebrow {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 3px;
            color: #3da9eb;
            text-transform: uppercase;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .eyebrow::before {
            content: '';
            width: 60px;
            height: 3px;
            background: #3da9eb;
        }

        .headline {
            font-size: 115px;
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -5px;
            color: #fff;
            margin-bottom: 35px;
        }

        .blue-text {
            color: #3da9eb;
        }

        .description {
            font-size: 36px;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.45;
            max-width: 820px;
            font-weight: 500;
        }

        /* Visual: Radar Chart / Scanner */
        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .radar-box {
            width: 500px;
            height: 500px;
            border: 2px solid rgba(61, 169, 235, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .radar-grid {
            position: absolute;
            width: 80%;
            height: 80%;
            border: 1px solid rgba(61, 169, 235, 0.1);
            border-radius: 50%;
        }

        .radar-grid:nth-child(2) {
            width: 60%;
            height: 60%;
        }

        .radar-grid:nth-child(3) {
            width: 40%;
            height: 40%;
        }

        .radar-beam {
            position: absolute;
            width: 50%;
            height: 4px;
            background: linear-gradient(to right, transparent, #3da9eb);
            transform-origin: left center;
            left: 50%;
            animation: spin-radar 4s infinite linear;
            box-shadow: 0 0 20px #3da9eb;
        }

        .data-point {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 15px #fff;
            animation: blink 2s infinite;
        }

        @keyframes spin-radar {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 0.2;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.3);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header"><img src="images/AppIcon.png" class="app-icon"><span class="brand-name">VYNTO</span>
            </div>
            <div class="eyebrow">VERİMLİLİK RADARI</div>
            <div class="headline">Harcamalarını<br><span class="blue-text">Radar Altına Al.</span></div>
            <div class="description">Vynto AI, gereksiz giderleri saptar ve verimlilik endeksinizi yükseltmeniz için
                sizi uyarır. Gözden kaçan hiçbir şey kalmaz.</div>
            <div class="visual-container">
                <div class="radar-box">
                    <div class="radar-grid"></div>
                    <div class="radar-grid"></div>
                    <div class="radar-grid"></div>
                    <div class="radar-beam"></div>
                    <div class="data-point" style="top:30%; left:65%;"></div>
                    <div class="data-point" style="bottom:25%; left:20%; animation-delay: 1s;"></div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
