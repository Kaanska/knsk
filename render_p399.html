<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: radial-gradient(ellipse at center, #0d1b2a 0%, #000 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .radar-ring {
            position: absolute;
            border: 2px solid rgba(94, 231, 223, 0.2);
            border-radius: 50%;
            animation: radarPulse 4s ease-out infinite;
        }

        .ring-1 {
            width: 400px;
            height: 400px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .ring-2 {
            width: 600px;
            height: 600px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 1s;
        }

        .ring-3 {
            width: 800px;
            height: 800px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 2s;
        }

        @keyframes radarPulse {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .content-container {
            width: 900px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            height: 100%;
            padding-top: 100px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 80px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #0a2540, #1a3a52);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 40px rgba(94, 231, 223, 0.3);
        }

        .check-mark {
            font-size: 48px;
            background: linear-gradient(135deg, #5EE7DF, #06b6d4);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .brand-text {
            font-size: 64px;
            font-weight: 800;
            letter-spacing: 2px;
            color: #5EE7DF;
            text-shadow: 0 0 30px rgba(94, 231, 223, 0.5);
        }

        .text-section {
            margin-bottom: 60px;
        }

        .eyebrow {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #5EE7DF;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .eyebrow::before {
            content: '';
            width: 40px;
            height: 3px;
            background: linear-gradient(90deg, #5EE7DF, #06b6d4);
            display: block;
        }

        .main-headline {
            font-size: 100px;
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -3px;
            color: white;
        }

        .gradient-word {
            background: linear-gradient(135deg, #5EE7DF, #06b6d4);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-text {
            margin-top: 30px;
            font-size: 32px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.4;
        }

        .radar-center {
            margin-top: auto;
            margin-bottom: 100px;
            width: 450px;
            height: 450px;
            align-self: center;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(94, 231, 223, 0.2), transparent 70%);
            border: 3px solid #5EE7DF;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 80px rgba(94, 231, 223, 0.6);
        }

        .radar-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .radar-title {
            font-size: 32px;
            color: white;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .radar-subtitle {
            font-size: 20px;
            color: rgba(255, 255, 255, 0.6);
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="radar-ring ring-1"></div>
        <div class="radar-ring ring-2"></div>
        <div class="radar-ring ring-3"></div>
        <div class="content-container">
            <div class="header">
                <div class="logo-icon">
                    <div class="check-mark">✓</div>
                </div>
                <div class="brand-text">VYNTO</div>
            </div>
            <div class="text-section">
                <div class="eyebrow">AKILLI UYARILAR</div>
                <div class="main-headline">Harcama<br><span class="gradient-word">Radarında.</span></div>
                <p class="sub-text">Bütçe limitine yaklaşınca seni uyarıyoruz. Kontrolü kaybetme.</p>
            </div>
            <div class="radar-center">
                <div class="radar-icon">🎯</div>
                <div class="radar-title">Bütçe Takibi</div>
                <div class="radar-subtitle">Anlık bildirimler</div>
            </div>
        </div>
    </div>
</body>

</html>
