<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .phone-pair {
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: center;
        }

        .p-device {
            width: 280px;
            height: 550px;
            background: #000;
            border: 3px solid #333;
            border-radius: 40px;
            position: relative;
            background: linear-gradient(135deg, #111, #222);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .pd-1 {
            transform: rotate(-10deg) translateX(30px);
            z-index: 2;
        }

        .pd-2 {
            transform: rotate(10deg) translateX(-30px);
            z-index: 1;
            opacity: 0.9;
        }

        .nfc-wave {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            border: 2px solid rgba(78, 226, 192, 0.5);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: ripple 2s infinite ease-out;
            opacity: 0;
            z-index: 10;
        }

        .success-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(78, 226, 192, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid #4ee2c0;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 40px rgba(78, 226, 192, 0.4);
            z-index: 20;
            width: 200px;
        }

        .sm-icon {
            font-size: 40px;
            margin-bottom: 5px;
        }

        .sm-txt {
            color: #fff;
            font-weight: 700;
            font-size: 16px;
        }

        @keyframes ripple {
            0% {
                width: 0;
                height: 0;
                opacity: 1;
            }

            100% {
                width: 400px;
                height: 400px;
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>

            <div class="headline">Birlikte<br><span class="gradient-word">Daha Güçlü.</span></div>

            <div class="visual-container">
                <div class="phone-pair">
                    <div class="nfc-wave"></div>
                    <div class="nfc-wave" style="animation-delay: 0.5s;"></div>

                    <div class="p-device pd-1">
                        <div class="success-msg">
                            <div class="sm-icon">🔗</div>
                            <div class="sm-txt">Eşleşme Başarılı!</div>
                        </div>
                    </div>
                    <div class="p-device pd-2"></div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
