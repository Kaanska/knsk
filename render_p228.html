<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 90% 10%, #0d323f 0%, #081116 60%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 900px;
            z-index: 10;
            padding-top: 120px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 80px;
        }

        .app-icon {
            width: 90px;
            height: 90px;
            border-radius: 22px;
        }

        .brand-name {
            font-size: 56px;
            font-weight: 800;
            color: #3da9eb;
            letter-spacing: -1.5px;
        }

        .eyebrow {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #3da9eb;
            text-transform: uppercase;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .eyebrow::before {
            content: '';
            width: 50px;
            height: 3px;
            background: #3da9eb;
        }

        .headline {
            font-size: 115px;
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -4.5px;
            color: #fff;
            margin-bottom: 30px;
        }

        .blue-text {
            color: #3da9eb;
        }

        .description {
            font-size: 34px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.4;
            max-width: 820px;
            font-weight: 500;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 100px;
        }

        .tree-base {
            width: 60px;
            height: 300px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            position: relative;
        }

        .branch {
            position: absolute;
            background: #3da9eb;
            height: 4px;
            border-radius: 2px;
            transform-origin: left center;
        }

        .leaf {
            position: absolute;
            width: 80px;
            height: 80px;
            background: rgba(61, 169, 235, 0.2);
            border: 2px solid #3da9eb;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 0 30px rgba(61, 169, 235, 0.3);
            animation: leaf-float 3s infinite ease-in-out;
        }

        @keyframes leaf-float {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }

            50% {
                transform: translateY(-20px) rotate(5deg);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header"><img src="images/AppIcon.png" class="app-icon"><span class="brand-name">VYNTO</span>
            </div>
            <div class="eyebrow">BIRIKIM MIMARISI</div>
            <div class="headline">Tasarrufun<br><span class="blue-text">Dijital Meyvesi.</span></div>
            <div class="description">Bugün ektiğiniz her kuruş, yarın dev bir ormana dönüşebilir. Vynto AI ile
                tasarruflarınızın büyümesini gerçek zamanlı izleyin.</div>
            <div class="visual-container">
                <div class="tree-base">
                    <div class="leaf" style="bottom: 80%; right: -120px; animation-delay: 0s;">🪙</div>
                    <div class="leaf" style="bottom: 60%; left: -140px; animation-delay: 0.5s;">💎</div>
                    <div class="leaf" style="bottom: 40%; right: -100px; animation-delay: 1s;">🏡</div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
