<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #050505;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
            font-family: 'Times New Roman', serif;
            font-style: italic;
        }

        .sub-head {
            color: #888;
            font-size: 24px;
            text-align: center;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 50px;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .marble-floor {
            position: absolute;
            width: 1500px;
            height: 1500px;
            background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/1/17/Black_Marble_Texture.jpg/1024px-Black_Marble_Texture.jpg');
            background-size: cover;
            transform: rotateX(60deg) translateY(200px);
            opacity: 0.5;
            filter: brightness(0.5);
        }

        .black-card {
            width: 500px;
            height: 300px;
            background: linear-gradient(135deg, #111, #000);
            border-radius: 20px;
            position: relative;
            transform: rotateY(-20deg) rotateX(10deg);
            box-shadow: -20px 20px 50px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            border: 1px solid #333;
            overflow: hidden;
        }

        .gold-border {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 2px solid transparent;
            background: linear-gradient(45deg, #ffd700, #b8860b) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.5;
        }

        .shimmer {
            position: absolute;
            top: -100%;
            left: -100%;
            width: 300%;
            height: 300%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: rotate(45deg);
            animation: gloss 4s infinite ease-in-out;
        }

        .card-logo {
            font-size: 40px;
            font-weight: 800;
            color: #fff;
            letter-spacing: 2px;
            z-index: 2;
        }

        .chip-sim {
            width: 60px;
            height: 45px;
            background: linear-gradient(135deg, #d4af37, #f3e5ab, #d4af37);
            border-radius: 5px;
            margin-top: 20px;
            z-index: 2;
        }

        .card-holder {
            font-family: monospace;
            color: #aaa;
            font-size: 20px;
            letter-spacing: 2px;
            z-index: 2;
        }

        @keyframes gloss {
            0% {
                transform: translate(-50%, -50%) rotate(45deg);
            }

            100% {
                transform: translate(50%, 50%) rotate(45deg);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Seçkinlik.</div>
            <div class="sub-head">Premium Üyelik</div>
            <div class="visual-container">
                <div class="marble-floor"></div>
                <div class="black-card">
                    <div class="gold-border"></div>
                    <div class="shimmer"></div>
                    <div>
                        <div class="card-logo">VYNTO</div>
                        <div class="chip-sim"></div>
                    </div>
                    <div class="card-holder">KAAN SAKA</div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
