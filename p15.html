<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 540px;
            height: 675px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #0a0a0a;
            position: relative;
            overflow: hidden;
            transform: scale(0.5);
            transform-origin: top left;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Abstract Background blobs - Gold/Orange & Deep Blue */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            z-index: 0;
        }

        .blob-1 {
            width: 800px;
            height: 800px;
            top: -200px;
            left: -200px;
            background: linear-gradient(135deg, #FF512F, #DD2476);
        }

        .blob-2 {
            width: 700px;
            height: 700px;
            bottom: -100px;
            right: -100px;
            background: linear-gradient(135deg, #1A2980, #26D0CE);
        }

        .analysis-card {
            width: 800px;
            height: 500px;
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 50px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-title {
            color: #ccc;
            font-size: 28px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .period-selector {
            display: flex;
            gap: 10px;
        }

        .period {
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 18px;
            color: #666;
            font-weight: 600;
        }

        .period.active {
            background: #333;
            color: white;
        }

        .main-stat {
            font-size: 80px;
            font-weight: 800;
            color: white;
            line-height: 1;
        }

        .sub-stat {
            font-size: 24px;
            color: #4cd964;
            font-weight: 600;
            margin-left: 20px;
        }

        /* Simplified Graph Representation */
        .graph-line {
            width: 100%;
            height: 150px;
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-top: 40px;
        }

        .point {
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            position: relative;
            z-index: 2;
        }

        .line-segment {
            position: absolute;
            height: 4px;
            background: linear-gradient(90deg, #FF512F, #DD2476);
            transform-origin: left center;
            z-index: 1;
            opacity: 0.8;
            border-radius: 4px;
        }

        .headline {
            position: absolute;
            bottom: 150px;
            text-align: center;
            font-size: 64px;
            font-weight: 800;
            color: white;
            z-index: 10;
            line-height: 1.2;
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .logo-mark {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 10;
        }

        .logo-mark img {
            width: 60px;
            border-radius: 12px;
        }

        .logo-mark span {
            font-size: 32px;
            font-weight: 800;
            color: white;
            letter-spacing: 2px;
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>

        <div class="logo-mark">
            <img src="images/AppIcon.png">
            <span>VYNTO</span>
        </div>

        <div class="analysis-card">
            <div class="card-header">
                <div class="card-title">Net Varlık</div>
                <div class="period-selector">
                    <div class="period">Gün</div>
                    <div class="period">Hafta</div>
                    <div class="period active">Ay</div>
                </div>
            </div>

            <div>
                <span class="main-stat">₺284.000</span>
                <span class="sub-stat">+14.2%</span>
            </div>

            <div class="graph-line">
                <!-- Simple mocked CSS graph points (illustrative) -->
                <!-- Just creating a visual flow -->
                <svg width="700" height="150" viewBox="0 0 700 150" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M0 140 C100 140 100 100 200 80 C300 60 400 120 500 40 C600 -10 700 20 700 20"
                        stroke="url(#paint0_linear)" stroke-width="6" stroke-linecap="round" />
                    <defs>
                        <linearGradient id="paint0_linear" x1="0" y1="0" x2="700" y2="0" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#FF512F" />
                            <stop offset="1" stop-color="#DD2476" />
                        </linearGradient>
                    </defs>
                </svg>
            </div>
        </div>

        <h1 class="headline">Detaylı Analiz<br>Doğru Kararlar.</h1>
    </div>
</body>

</html>
