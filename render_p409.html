<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: linear-gradient(135deg, #000428 0%, #004e92 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .spotlight {
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(94, 231, 223, 0.4) 0%, transparent 70%);
            filter: blur(100px);
            animation: spotlightMove 10s ease-in-out infinite;
        }

        .spot-1 {
            top: -200px;
            left: -200px;
        }

        .spot-2 {
            bottom: -200px;
            right: -200px;
            animation-delay: 5s;
        }

        @keyframes spotlightMove {

            0%,
            100% {
                transform: translate(0, 0);
            }

            50% {
                transform: translate(100px, 100px);
            }
        }

        .content-container {
            width: 900px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            height: 100%;
            padding-top: 100px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 80px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #0a2540, #1a3a52);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 40px rgba(94, 231, 223, 0.3);
        }

        .check-mark {
            font-size: 48px;
            background: linear-gradient(135deg, #5EE7DF, #06b6d4);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .brand-text {
            font-size: 64px;
            font-weight: 800;
            letter-spacing: 2px;
            color: #5EE7DF;
            text-shadow: 0 0 30px rgba(94, 231, 223, 0.5);
        }

        .text-section {
            margin-bottom: 60px;
        }

        .eyebrow {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #5EE7DF;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .eyebrow::before {
            content: '';
            width: 40px;
            height: 3px;
            background: linear-gradient(90deg, #5EE7DF, #06b6d4);
            display: block;
        }

        .main-headline {
            font-size: 100px;
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -3px;
            color: white;
        }

        .gradient-word {
            background: linear-gradient(135deg, #5EE7DF, #06b6d4);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-text {
            margin-top: 30px;
            font-size: 32px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.4;
        }

        .cta-container {
            margin-top: auto;
            margin-bottom: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        .cta-button {
            padding: 35px 80px;
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #5EE7DF, #06b6d4);
            color: #000;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            box-shadow: 0 20px 60px rgba(94, 231, 223, 0.6);
            position: relative;
            overflow: hidden;
        }

        .cta-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: buttonShine 3s linear infinite;
        }

        @keyframes buttonShine {
            0% {
                left: -100%;
            }

            100% {
                left: 100%;
            }
        }

        .cta-subtitle {
            font-size: 24px;
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
            max-width: 600px;
        }

        .app-badge {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 20px 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            backdrop-filter: blur(20px);
        }

        .badge-icon {
            font-size: 40px;
        }

        .badge-text {
            display: flex;
            flex-direction: column;
        }

        .badge-small {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
        }

        .badge-large {
            font-size: 22px;
            color: white;
            font-weight: 700;
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="spotlight spot-1"></div>
        <div class="spotlight spot-2"></div>
        <div class="content-container">
            <div class="header">
                <div class="logo-icon">
                    <div class="check-mark">✓</div>
                </div>
                <div class="brand-text">VYNTO</div>
            </div>
            <div class="text-section">
                <div class="eyebrow">ŞİMDİ İNDİR</div>
                <div class="main-headline">Finansal<br><span class="gradient-word">Özgürlük.</span></div>
                <p class="sub-text">Hayallerindeki finansal özgürlüğe bir adım daha yaklaş. Ücretsiz başla.</p>
            </div>
            <div class="cta-container">
                <div class="cta-button">Hemen İndir</div>
                <div class="cta-subtitle">
                    Ücretsiz indir, premium özelliklerle finansını kontrol altına al.
                </div>
                <div class="app-badge">
                    <div class="badge-icon">🍎</div>
                    <div class="badge-text">
                        <div class="badge-small">Sadece</div>
                        <div class="badge-large">iOS İçin</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
