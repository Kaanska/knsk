<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .invoice-card {
            width: 350px;
            height: 500px;
            background: #fff;
            transform: rotateY(-15deg);
            padding: 30px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 15px;
            font-family: 'Courier New', monospace;
        }

        .line {
            height: 10px;
            background: #ddd;
            width: 100%;
            border-radius: 2px;
        }

        .paid-stamp {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-30deg);
            border: 5px solid #4ee2c0;
            padding: 10px 30px;
            font-size: 40px;
            font-weight: 900;
            color: #4ee2c0;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(78, 226, 192, 0.4);
            animation: stamp-in 0.5s ease-in;
        }

        @keyframes stamp-in {
            0% {
                transform: translate(-50%, -50%) scale(2);
                opacity: 0;
            }

            100% {
                transform: translate(-50%, -50%) rotate(-30deg) scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Unutma<br><span class="gradient-word">Derdine Son.</span></div>
            <div class="visual-container">
                <div class="invoice-card">
                    <div class="line" style="width: 50%;"></div>
                    <div class="line"></div>
                    <div class="line" style="width: 80%;"></div>
                    <div class="line"></div>
                    <div class="line"></div>
                    <div class="line" style="width: 40%; margin-top:50px;"></div>
                    <div class="paid-stamp">ÖDENDİ</div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
