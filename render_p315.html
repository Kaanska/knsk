<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .coffee-scene {
            position: relative;
            width: 400px;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .cup {
            width: 200px;
            height: 150px;
            background: #6F4E37;
            border-radius: 0 0 100px 100px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .handle {
            width: 60px;
            height: 100px;
            border: 15px solid #6F4E37;
            border-radius: 0 20px 20px 0;
            position: absolute;
            right: -50px;
            top: 20px;
            z-index: -1;
        }

        .steam {
            position: absolute;
            width: 20px;
            height: 60px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            bottom: 160px;
            animation: rise 2s infinite ease-out;
            filter: blur(5px);
        }

        .s1 {
            left: 80px;
            animation-delay: 0s;
        }

        .s2 {
            left: 100px;
            animation-delay: 0.5s;
            height: 80px;
        }

        .s3 {
            left: 120px;
            animation-delay: 1s;
        }

        .notif-bubble {
            position: absolute;
            top: -50px;
            right: -50px;
            background: #fff;
            color: #000;
            padding: 15px 30px;
            border-radius: 20px;
            font-weight: 700;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            animation: bounce 3s infinite;
        }

        @keyframes rise {
            0% {
                transform: translateY(0) scale(1);
                opacity: 0.5;
            }

            100% {
                transform: translateY(-50px) scale(1.5);
                opacity: 0;
            }
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Keyfini Çıkar,<br><span class="gradient-word">Bütçen Güvende.</span></div>
            <div class="visual-container">
                <div class="coffee-scene">
                    <div class="cup">
                        <div class="handle"></div>
                    </div>
                    <div class="steam s1"></div>
                    <div class="steam s2"></div>
                    <div class="steam s3"></div>
                    <div class="notif-bubble">☕ Keyif: -45₺</div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
