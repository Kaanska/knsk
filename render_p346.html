<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #1a1a1a;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .sub-head {
            color: #888;
            font-size: 24px;
            text-align: center;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 50px;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .compass-body {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #222, #000);
            border-radius: 50%;
            border: 10px solid #444;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
        }

        .tick-marks {
            position: absolute;
            width: 90%;
            height: 90%;
            border-radius: 50%;
            border: 2px dashed #666;
        }

        .needle {
            width: 10px;
            height: 350px;
            background: linear-gradient(to top, #ff0000 50%, #fff 50%);
            position: absolute;
            border-radius: 50% 50% 5px 5px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            transform: rotate(45deg);
            animation: point-north 4s infinite cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        .direction-label {
            position: absolute;
            top: 100px;
            font-size: 30px;
            font-weight: 900;
            color: #4ee2c0;
            letter-spacing: 5px;
            text-shadow: 0 0 20px rgba(78, 226, 192, 0.5);
        }

        @keyframes point-north {
            0% {
                transform: rotate(45deg);
            }

            50% {
                transform: rotate(40deg);
            }

            100% {
                transform: rotate(45deg);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Yönünü Bul.</div>
            <div class="sub-head">Finansal Pusula</div>
            <div class="visual-container">
                <div class="compass-body">
                    <div class="tick-marks"></div>
                    <div class="needle"></div>
                    <div class="direction-label">PROFIT</div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
