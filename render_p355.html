<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .tetris-grid {
            width: 400px;
            height: 600px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.3);
            position: relative;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(6, 1fr);
            padding: 5px;
            gap: 5px;
        }

        .block {
            border-radius: 5px;
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.2);
        }

        .b-set {
            background: #333;
        }

        .b-active {
            position: absolute;
            top: 0;
            left: 100px;
            width: 200px;
            height: 100px;
            display: flex;
            gap: 5px;
            animation: drop-block 4s infinite linear;
        }

        .b-part {
            width: 95px;
            height: 95px;
            background: #4ee2c0;
            border-radius: 5px;
            box-shadow: 0 0 20px rgba(78, 226, 192, 0.4);
        }

        .score-box {
            position: absolute;
            top: -80px;
            right: 0;
            font-family: monospace;
            color: #4ee2c0;
            font-size: 30px;
            font-weight: 800;
        }

        @keyframes drop-block {
            0% {
                top: -100px;
            }

            80% {
                top: 400px;
            }

            100% {
                top: 400px;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Parçalar<br><span class="gradient-word">Yerine Otursun.</span></div>
            <div class="visual-container">
                <div class="tetris-grid">
                    <div class="score-box">SCORE: 9850</div>
                    <!-- Static Blocks at bottom -->
                    <div class="block" style="grid-column: 1; grid-row: 6; background: #52a5ff;"></div>
                    <div class="block" style="grid-column: 2; grid-row: 6; background: #52a5ff;"></div>
                    <div class="block" style="grid-column: 3; grid-row: 6; background: #ff6b6b;"></div>
                    <div class="block" style="grid-column: 4; grid-row: 6; background: #ff6b6b;"></div>

                    <div class="block" style="grid-column: 1; grid-row: 5; background: #52a5ff;"></div>
                    <div class="block" style="grid-column: 4; grid-row: 5; background: #ff6b6b;"></div>

                    <!-- Active Falling Block -->
                    <div class="b-active">
                        <div class="b-part"></div>
                        <div class="b-part"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
