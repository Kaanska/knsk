<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 60px;
        }

        .app-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 54px;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .eyebrow-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .eyebrow-line {
            width: 50px;
            height: 4px;
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            border-radius: 2px;
        }

        .eyebrow-text {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 4px;
            color: #4ee2c0;
            text-transform: uppercase;
        }

        .headline {
            font-size: 115px;
            font-weight: 800;
            line-height: 0.92;
            letter-spacing: -5px;
            color: #fff;
            margin-bottom: 30px;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            font-size: 34px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.4;
            max-width: 800px;
            font-weight: 500;
            margin-bottom: 60px;
        }

        /* VISUAL: Budget Rings */
        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .ring-group {
            width: 500px;
            height: 500px;
            position: relative;
            transform: rotateX(10deg);
        }

        .ring {
            position: absolute;
            top: 50%;
            left: 50%;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.02);
            border: 2px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .r1 {
            width: 450px;
            height: 450px;
        }

        .r2 {
            width: 350px;
            height: 350px;
        }

        .r3 {
            width: 250px;
            height: 250px;
        }

        .progress-circle {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 20px solid transparent;
            transform: rotate(-90deg);
        }

        .pc1 {
            border-top-color: #4ee2c0;
            border-right-color: #4ee2c0;
            border-bottom-color: #4ee2c0;
            box-shadow: 0 0 40px rgba(78, 226, 192, 0.4);
        }

        .pc2 {
            border-top-color: #52a5ff;
            border-right-color: #52a5ff;
            opacity: 0.8;
        }

        .pc3 {
            border-top-color: #ffd700;
            opacity: 0.8;
        }

        .center-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .c-label {
            font-size: 18px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .c-val {
            font-size: 60px;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>

            <div class="eyebrow-container">
                <div class="eyebrow-line"></div>
                <div class="eyebrow-text">BÜTÇE LİMİTLERİ</div>
            </div>

            <div class="headline">Hedefini<br><span class="gradient-word">Tuttur.</span></div>
            <div class="description">Aylık harcama limitini belirle, ne kadar kaldığını tek bakışta gör. Tasarruf
                hedeflerine ulaşmak artık oyun oynamak kadar kolay.</div>

            <div class="visual-container">
                <div class="ring-group">
                    <div class="ring r1">
                        <div class="progress-circle pc1"></div>
                    </div>
                    <div class="ring r2">
                        <div class="progress-circle pc2"></div>
                    </div>
                    <div class="ring r3">
                        <div class="progress-circle pc3"></div>
                    </div>

                    <div class="center-text">
                        <div class="c-label">KALAN</div>
                        <div class="c-val">%15</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
