<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 85% 15%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 60px;
        }

        .app-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 54px;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .eyebrow-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .eyebrow-line {
            width: 50px;
            height: 4px;
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            border-radius: 2px;
        }

        .eyebrow-text {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 4px;
            color: #4ee2c0;
            text-transform: uppercase;
        }

        .headline {
            font-size: 115px;
            font-weight: 800;
            line-height: 0.92;
            letter-spacing: -5px;
            color: #fff;
            margin-bottom: 30px;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            font-size: 34px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.4;
            max-width: 800px;
            font-weight: 500;
            margin-bottom: 60px;
        }

        /* VISUAL: Shared Budget Sync */
        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .sync-rings {
            width: 600px;
            height: 400px;
            position: relative;
            transform-style: preserve-3d;
        }

        .ring {
            width: 300px;
            height: 300px;
            border: 4px solid;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            transform: translateY(-50%) translateZ(40px);
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
        }

        .r-left {
            left: 50px;
            border-color: #4ee2c0;
            animation: hover-left 4s infinite ease-in-out;
        }

        .r-right {
            right: 50px;
            border-color: #52a5ff;
            animation: hover-right 4s infinite ease-in-out;
        }

        .u-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #444;
            overflow: hidden;
            position: relative;
        }

        .connector {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 150px;
            height: 4px;
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            transform: translate(-50%, -50%) translateZ(20px);
            box-shadow: 0 0 30px #fff;
            z-index: 10;
        }

        .sync-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 60px;
            height: 60px;
            background: #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%) translateZ(60px);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-size: 30px;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.5);
            animation: spin 3s infinite linear;
        }

        @keyframes hover-left {

            0%,
            100% {
                transform: translateY(-50%) translateX(0);
            }

            50% {
                transform: translateY(-50%) translateX(10px);
            }
        }

        @keyframes hover-right {

            0%,
            100% {
                transform: translateY(-50%) translateX(0);
            }

            50% {
                transform: translateY(-50%) translateX(-10px);
            }
        }

        @keyframes spin {
            0% {
                transform: translate(-50%, -50%) translateZ(60px) rotate(0deg);
            }

            100% {
                transform: translate(-50%, -50%) translateZ(60px) rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>

            <div class="eyebrow-container">
                <div class="eyebrow-line"></div>
                <div class="eyebrow-text">ORTAK BÜTÇE</div>
            </div>

            <div class="headline">Birlikte<br><span class="gradient-word">Kazanın.</span></div>
            <div class="description">Eşinle, ev arkadaşınla veya ortağınla bütçeni birleştir. Harcamaları şeffaf bir
                şekilde takip et, hedeflere beraber ulaş.</div>

            <div class="visual-container">
                <div class="sync-rings">
                    <div class="ring r-left">
                        <div class="u-img"></div>
                    </div>
                    <div class="ring r-right">
                        <div class="u-img" style="background:#555;"></div>
                    </div>
                    <div class="connector"></div>
                    <div class="sync-icon">⚡</div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
