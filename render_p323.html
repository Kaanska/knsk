<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .ai-brain {
            width: 500px;
            height: 500px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .node {
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            box-shadow: 0 0 10px #fff;
            animation: glow 2s infinite alternate;
        }

        .edge {
            position: absolute;
            height: 2px;
            background: rgba(82, 165, 255, 0.5);
            transform-origin: left;
        }

        .n1 {
            top: 30%;
            left: 40%;
        }

        .n2 {
            top: 60%;
            left: 20%;
            animation-delay: 0.5s;
        }

        .n3 {
            top: 50%;
            right: 20%;
            animation-delay: 1s;
        }

        .n4 {
            top: 20%;
            right: 40%;
            animation-delay: 1.5s;
        }

        .n5 {
            bottom: 20%;
            left: 50%;
            animation-delay: 2s;
        }

        .center-chip {
            width: 150px;
            height: 150px;
            background: #222;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #52a5ff;
            box-shadow: 0 0 40px rgba(82, 165, 255, 0.4);
            font-size: 50px;
            color: #52a5ff;
            font-weight: 800;
        }

        @keyframes glow {
            0% {
                box-shadow: 0 0 5px #fff;
                opacity: 0.5;
            }

            100% {
                box-shadow: 0 0 20px #fff;
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Senden Daha<br><span class="gradient-word">İyi Hatırlar.</span></div>
            <div class="visual-container">
                <div class="ai-brain">
                    <div class="node n1"></div>
                    <div class="node n2"></div>
                    <div class="node n3"></div>
                    <div class="node n4"></div>
                    <div class="node n5"></div>
                    <div class="edge" style="width: 200px; top:32%; left:42%; transform: rotate(115deg);"></div>
                    <div class="edge" style="width: 150px; top:62%; left:22%; transform: rotate(-25deg);"></div>

                    <div class="center-chip">AI</div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
