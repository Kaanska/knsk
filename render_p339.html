<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .vault-door {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #555, #222);
            border-radius: 50%;
            border: 20px solid #777;
            position: relative;
            box-shadow: 0 0 100px rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .rivets {
            position: absolute;
            width: 90%;
            height: 90%;
            border: 2px dashed #444;
            border-radius: 50%;
        }

        .handle-wheel {
            width: 200px;
            height: 200px;
            border: 20px solid #aaa;
            border-radius: 50%;
            position: relative;
            animation: spin-unlock 3s infinite ease-in-out;
        }

        .spoke {
            width: 20px;
            height: 100%;
            background: #aaa;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .spoke-h {
            width: 100%;
            height: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: #aaa;
            position: absolute;
        }

        .crack-light {
            position: absolute;
            width: 10px;
            height: 100%;
            background: #fff;
            box-shadow: 0 0 50px #fff;
            transform: rotate(15deg);
            opacity: 0;
            animation: shine-crack 3s infinite 2s;
        }

        @keyframes spin-unlock {
            0% {
                transform: rotate(0deg);
            }

            50% {
                transform: rotate(180deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes shine-crack {
            0% {
                opacity: 0;
                width: 0;
            }

            50% {
                opacity: 1;
                width: 20px;
            }

            100% {
                opacity: 0;
                width: 0;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">En Güvenli<br><span class="gradient-word">Yer.</span></div>
            <div class="visual-container">
                <div class="vault-door">
                    <div class="rivets"></div>
                    <div class="handle-wheel">
                        <div class="spoke"></div>
                        <div class="spoke-h"></div>
                    </div>
                </div>
                <div class="crack-light" style="left: 60%;"></div>
            </div>
        </div>
    </div>
</body>

</html>
