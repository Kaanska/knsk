<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 60px;
        }

        .app-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 54px;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .eyebrow-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .eyebrow-line {
            width: 50px;
            height: 4px;
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            border-radius: 2px;
        }

        .eyebrow-text {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 4px;
            color: #4ee2c0;
            text-transform: uppercase;
        }

        .headline {
            font-size: 115px;
            font-weight: 800;
            line-height: 0.92;
            letter-spacing: -5px;
            color: #fff;
            margin-bottom: 30px;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            font-size: 34px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.4;
            max-width: 800px;
            font-weight: 500;
            margin-bottom: 60px;
        }

        /* VISUAL: Multi-Currency Wallets */
        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .card-fan {
            width: 450px;
            height: 600px;
            position: relative;
            transform: rotateY(-10deg) rotateZ(5deg);
        }

        .m-card {
            width: 450px;
            height: 260px;
            border-radius: 30px;
            position: absolute;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px;
            transition: all 0.5s;
        }

        .mc1 {
            top: 0;
            background: linear-gradient(135deg, rgba(82, 165, 255, 0.2), rgba(0, 0, 0, 0.8));
            transform: scale(0.9) translateY(-120px) translateZ(-40px);
            z-index: 1;
        }

        .mc2 {
            top: 50px;
            background: linear-gradient(135deg, rgba(78, 226, 192, 0.2), rgba(0, 0, 0, 0.8));
            transform: scale(0.95) translateY(-60px) translateZ(-20px);
            z-index: 2;
        }

        .mc3 {
            top: 100px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(0, 0, 0, 0.8));
            z-index: 3;
        }

        .mc-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .mc-flag {
            font-size: 40px;
        }

        .mc-curr {
            font-size: 24px;
            font-weight: 800;
            color: #fff;
            text-transform: uppercase;
        }

        .mc-bal {
            font-size: 48px;
            font-weight: 800;
            color: #fff;
            letter-spacing: -1px;
        }

        .mc1:hover {
            transform: scale(1) translateY(-140px) translateZ(0);
            z-index: 10;
        }

        .mc2:hover {
            transform: scale(1) translateY(-80px) translateZ(0);
            z-index: 10;
        }

        .mc3:hover {
            transform: scale(1.05) translateY(0);
            z-index: 10;
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>

            <div class="eyebrow-container">
                <div class="eyebrow-line"></div>
                <div class="eyebrow-text">ÇOKLU PARA BİRİMİ</div>
            </div>

            <div class="headline">Dünya<br><span class="gradient-word">Vatandaşı.</span></div>
            <div class="description">TL, Dolar, Euro... Farklı para birimlerindeki harcamalarını ve birikimlerini ayrı
                ayrı cüzdanlarda yönet.</div>

            <div class="visual-container">
                <div class="card-fan">
                    <div class="m-card mc1">
                        <div class="mc-header"><span class="mc-flag">🇺🇸</span><span class="mc-curr">USD</span></div>
                        <div class="mc-bal">$2,450.00</div>
                    </div>
                    <div class="m-card mc2">
                        <div class="mc-header"><span class="mc-flag">🇪🇺</span><span class="mc-curr">EUR</span></div>
                        <div class="mc-bal">€1,850.50</div>
                    </div>
                    <div class="m-card mc3">
                        <div class="mc-header"><span class="mc-flag">🇹🇷</span><span class="mc-curr">TRY</span></div>
                        <div class="mc-bal">₺42,500.00</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
