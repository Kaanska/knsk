<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 85% 15%, #0d323f 0%, #081116 65%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 900px;
            z-index: 10;
            padding-top: 120px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 80px;
        }

        .app-icon {
            width: 95px;
            height: 95px;
            border-radius: 24px;
        }

        .brand-name {
            font-size: 58px;
            font-weight: 800;
            color: #3da9eb;
            letter-spacing: -2px;
        }

        .eyebrow {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 3px;
            color: #3da9eb;
            text-transform: uppercase;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .eyebrow::before {
            content: '';
            width: 60px;
            height: 3px;
            background: #3da9eb;
        }

        .headline {
            font-size: 110px;
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -5px;
            color: #fff;
            margin-bottom: 35px;
        }

        .blue-text {
            color: #3da9eb;
        }

        .description {
            font-size: 36px;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.45;
            max-width: 820px;
            font-weight: 500;
        }

        /* Visual: Balanced Scales / Balance */
        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .balance-box {
            width: 600px;
            height: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
        }

        .balance-beam {
            width: 100%;
            height: 10px;
            background: #3da9eb;
            border-radius: 5px;
            box-shadow: 0 0 30px #3da9eb;
            transform: rotate(0deg);
            animation: sway-balance 6s infinite ease-in-out;
        }

        .weight {
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: absolute;
            top: -160px;
        }

        .weight-left {
            left: 0;
        }

        .weight-right {
            right: 0;
        }

        .label-sm {
            font-size: 20px;
            font-weight: 700;
            color: #3da9eb;
        }

        .val-lg {
            font-size: 44px;
            font-weight: 900;
            color: #fff;
        }

        .pivot {
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-bottom: 40px solid #3da9eb;
            margin-top: 10px;
        }

        @keyframes sway-balance {

            0%,
            100% {
                transform: rotate(0deg);
            }

            25% {
                transform: rotate(-3deg);
            }

            75% {
                transform: rotate(3deg);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header"><img src="images/AppIcon.png" class="app-icon"><span class="brand-name">VYNTO</span>
            </div>
            <div class="eyebrow">DİSİPLİN ENDEKSİ</div>
            <div class="headline">Gelir ve Giderde<br><span class="blue-text">Kusursuz Denge.</span></div>
            <div class="description">Bütçe disiplini, gelir ve giderin uyumudur. Vynto AI'nın akıllı dengeleyicisi ile
                finansal teraziniz her zaman dengede kalsın.</div>
            <div class="visual-container">
                <div class="balance-box">
                    <div class="balance-beam">
                        <div class="weight weight-left">
                            <div class="label-sm">GELİR</div>
                            <div class="val-lg">₺65K</div>
                        </div>
                        <div class="weight weight-right">
                            <div class="label-sm">GİDER</div>
                            <div class="val-lg">₺32K</div>
                        </div>
                    </div>
                    <div class="pivot"></div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
