<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #000;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #ffd700, #ffa500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .eclipse-scene {
            position: relative;
            width: 500px;
            height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sun-corona {
            position: absolute;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 100px #ffd700, 0 0 200px #ff9900;
            animation: pulse-sun 4s infinite alternate;
        }

        .moon-blocker {
            position: absolute;
            width: 340px;
            height: 340px;
            border-radius: 50%;
            background: #000;
            z-index: 10;
            box-shadow: inset 0 0 50px #222;
        }

        .light-leak {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, transparent 60%, rgba(255, 215, 0, 0.5) 70%, transparent 80%);
            animation: rotate-leak 10s infinite linear;
        }

        .savings-glow {
            font-size: 60px;
            font-weight: 900;
            color: #ffd700;
            z-index: 11;
            text-shadow: 0 0 20px #000;
            opacity: 0;
            animation: reveal-text 4s infinite ease-in-out;
        }

        @keyframes pulse-sun {
            0% {
                transform: scale(1);
                opacity: 0.8;
            }

            100% {
                transform: scale(1.05);
                opacity: 1;
            }
        }

        @keyframes rotate-leak {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes reveal-text {

            0%,
            100% {
                opacity: 0;
            }

            50% {
                opacity: 1;
                text-shadow: 0 0 40px #ffd700;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Karanlığı<br><span class="gradient-word">Aydınlat.</span></div>
            <div class="visual-container">
                <div class="eclipse-scene">
                    <div class="sun-corona"></div>
                    <div class="moon-blocker"></div>
                    <div class="light-leak"></div>
                    <div class="savings-glow">SAVINGS</div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
