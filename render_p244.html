<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 85% 15%, #0d323f 0%, #081116 65%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 900px;
            z-index: 10;
            padding-top: 120px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 80px;
        }

        .app-icon {
            width: 95px;
            height: 95px;
            border-radius: 24px;
        }

        .brand-name {
            font-size: 58px;
            font-weight: 800;
            color: #3da9eb;
            letter-spacing: -2px;
        }

        .eyebrow {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 3px;
            color: #3da9eb;
            text-transform: uppercase;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .eyebrow::before {
            content: '';
            width: 60px;
            height: 3px;
            background: #3da9eb;
        }

        .headline {
            font-size: 110px;
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -5px;
            color: #fff;
            margin-bottom: 35px;
        }

        .blue-text {
            color: #3da9eb;
        }

        .description {
            font-size: 36px;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.45;
            max-width: 820px;
            font-weight: 500;
        }

        /* High-End Visual: Financial Aurora */
        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .aurora-visual {
            width: 800px;
            height: 400px;
            position: relative;
            filter: blur(40px);
            opacity: 0.6;
            animation: aurora-drift 10s infinite alternate ease-in-out;
        }

        .aurora-wave {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 40%;
            background: linear-gradient(90deg, #4ee2c0, #3da9eb, #8b5cf6, #4ee2c0);
            background-size: 400% 400%;
            animation: aurora-flow 5s infinite linear;
        }

        .aurora-wave:nth-child(2) {
            opacity: 0.5;
            transform: scale(1.1) rotate(10deg);
            animation-delay: -2s;
        }

        .aurora-wave:nth-child(3) {
            opacity: 0.3;
            transform: scale(0.9) rotate(-10deg);
            animation-delay: -4s;
        }

        @keyframes aurora-flow {
            0% {
                background-position: 0% 50%;
            }

            100% {
                background-position: 100% 50%;
            }
        }

        @keyframes aurora-drift {
            from {
                transform: scale(1) rotate(0deg);
            }

            to {
                transform: scale(1.2) rotate(5deg);
            }
        }

        .ui-card-floating {
            position: absolute;
            width: 600px;
            height: 350px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            padding: 50px;
            animation: float-card 4s infinite ease-in-out;
        }

        .ui-card-floating .label {
            font-size: 20px;
            font-weight: 700;
            color: #3da9eb;
            margin-bottom: 10px;
        }

        .ui-card-floating .amount {
            font-size: 80px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 20px;
        }

        .ui-card-floating .chart-line {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            position: relative;
        }

        .ui-card-floating .chart-fill {
            position: absolute;
            height: 100%;
            width: 75%;
            background: #3da9eb;
            border-radius: 3px;
            box-shadow: 0 0 20px #3da9eb;
        }

        @keyframes float-card {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="eyebrow">GELECEK VİZYONU</div>
            <div class="headline">Finansal Akışı<br><span class="blue-text">Yeniden Tanımla.</span></div>
            <div class="description">Verileriniz sadece rakam değildir, onlar sizin geleceğinizdir. Vynto AI ile
                finansal akışınızı bir sanat eseri gibi yönetin.</div>
            <div class="visual-container">
                <div class="aurora-visual">
                    <div class="aurora-wave"></div>
                    <div class="aurora-wave"></div>
                    <div class="aurora-wave"></div>
                </div>
                <div class="ui-card-floating">
                    <div class="label">BÜTÇE OPTİMİZASYONU</div>
                    <div class="amount">₺42.850,00</div>
                    <div class="chart-line">
                        <div class="chart-fill"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
