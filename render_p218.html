<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #000;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .grid-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            perspective: 1000px;
            transform: rotateX(60deg) translateY(-200px);
            opacity: 0.5;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 70px;
        }

        .app-icon {
            width: 90px;
            height: 90px;
            border-radius: 22px;
        }

        .brand-name {
            font-size: 50px;
            font-weight: 900;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .eyebrow {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 6px;
            color: #4ee2c0;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .headline {
            font-size: 110px;
            font-weight: 800;
            line-height: 0.92;
            letter-spacing: -4px;
            color: #fff;
            margin-bottom: 30px;
        }

        .grad-text {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            font-size: 34px;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.4;
            max-width: 800px;
            font-weight: 500;
        }

        /* Central Piece: Future Window */
        .window-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-top: 50px;
        }

        .future-window {
            width: 500px;
            height: 350px;
            background: linear-gradient(135deg, rgba(78, 226, 192, 0.2), rgba(82, 165, 255, 0.2));
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transform: perspective(1000px) rotateY(-10deg);
        }

        .window-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #fff 0%, transparent 80%);
            opacity: 0.1;
            animation: window-pulse 3s infinite ease-in-out;
        }

        @keyframes window-pulse {

            0%,
            100% {
                opacity: 0.1;
            }

            50% {
                opacity: 0.3;
            }
        }

        .future-icon {
            font-size: 150px;
            filter: drop-shadow(0 0 50px rgba(78, 226, 192, 0.4));
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="grid-bg"></div>
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="eyebrow">GELECEK TASARIMI</div>
            <div class="headline">Bir Adım<br><span class="grad-text">Her Zaman Önde.</span></div>
            <div class="description">Vynto AI sadece bugünü değil, yarını da analiz eder. Harcama trendlerinize göre
                gelecekteki bakiyenizi bugünden söyler.</div>
            <div class="window-container">
                <div class="future-window">
                    <div class="window-glow"></div>
                    <div class="future-icon">👁️</div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
