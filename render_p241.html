<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 85% 15%, #0d323f 0%, #081116 65%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 900px;
            z-index: 10;
            padding-top: 120px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 80px;
        }

        .app-icon {
            width: 95px;
            height: 95px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .brand-name {
            font-size: 58px;
            font-weight: 800;
            color: #3da9eb;
            letter-spacing: -2px;
        }

        .eyebrow {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 3px;
            color: #3da9eb;
            text-transform: uppercase;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .eyebrow::before {
            content: '';
            width: 60px;
            height: 3px;
            background: #3da9eb;
        }

        .headline {
            font-size: 110px;
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -5px;
            color: #fff;
            margin-bottom: 35px;
        }

        .blue-text {
            color: #3da9eb;
        }

        .description {
            font-size: 36px;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.45;
            max-width: 820px;
            font-weight: 500;
        }

        /* High-End Visual: Neural Nexus */
        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .nexus-core {
            width: 450px;
            height: 450px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nexus-sphere {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 1px solid rgba(61, 169, 235, 0.3);
            border-radius: 50%;
            animation: rotate-nexus 20s infinite linear;
        }

        .nexus-sphere:nth-child(2) {
            transform: rotateX(70deg);
        }

        .nexus-sphere:nth-child(3) {
            transform: rotateY(70deg);
        }

        .core-glow {
            width: 150px;
            height: 150px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 60px #3da9eb, 0 0 120px rgba(61, 169, 235, 0.6), 0 0 200px rgba(61, 169, 235, 0.3);
            animation: pulse-core 3s infinite ease-in-out;
        }

        .data-particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #3da9eb;
            border-radius: 50%;
            filter: blur(1px);
            animation: orbit-particle 4s infinite linear;
        }

        @keyframes rotate-nexus {
            0% {
                transform: rotateZ(0deg);
            }

            100% {
                transform: rotateZ(360deg);
            }
        }

        @keyframes pulse-core {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.8;
            }

            50% {
                transform: scale(1.1);
                opacity: 1;
            }
        }

        @keyframes orbit-particle {
            0% {
                transform: rotate(0deg) translateX(225px) rotate(0deg);
                opacity: 0;
            }

            50% {
                opacity: 1;
            }

            100% {
                transform: rotate(360deg) translateX(225px) rotate(-360deg);
                opacity: 0;
            }
        }

        .ui-label {
            position: absolute;
            bottom: -60px;
            font-size: 20px;
            font-weight: 700;
            color: #3da9eb;
            background: rgba(13, 50, 63, 0.4);
            padding: 10px 30px;
            border-radius: 100px;
            border: 1px solid rgba(61, 169, 235, 0.3);
            backdrop-filter: blur(10px);
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="eyebrow">YAPAY ZEKA MERKEZİ</div>
            <div class="headline">Finansal Zekanın<br><span class="blue-text">Yeni Odak Noktası.</span></div>
            <div class="description">Vynto AI, tüm harcamalarınızı birer veri noktası olarak işler ve size en karlı yolu
                saniyeler içinde gösterir. Kontrol artık tamamen sizde.</div>
            <div class="visual-container">
                <div class="nexus-core">
                    <div class="nexus-sphere"></div>
                    <div class="nexus-sphere"></div>
                    <div class="nexus-sphere"></div>
                    <div class="core-glow"></div>
                    <div class="data-particle" style="animation-delay: 0s;"></div>
                    <div class="data-particle" style="animation-delay: 1s;"></div>
                    <div class="data-particle" style="animation-delay: 2s;"></div>
                    <div class="data-particle" style="animation-delay: 3s;"></div>
                    <div class="ui-label">AI PROCESSING UNIT ACTIVE</div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
