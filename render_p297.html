<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .phone-mockup {
            width: 450px;
            height: 850px;
            background: #000;
            border-radius: 55px;
            border: 6px solid #222;
            box-shadow: 0 50px 120px rgba(0, 0, 0, 0.8);
            position: relative;
            overflow: hidden;
            margin: 0 auto;
            transform: rotate(-5deg);
        }

        /* Camera UI Interface */
        .camera-view {
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1554224155-8d04cb21cd6c?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80') center/cover;
            position: relative;
        }

        .overlay-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
        }

        /* Detection Boxes */
        .detect-box {
            position: absolute;
            border: 2px solid #4ee2c0;
            background: rgba(78, 226, 192, 0.1);
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(78, 226, 192, 0.4);
            animation: pulse-border 2s infinite;
        }

        .box-total {
            top: 60%;
            left: 55%;
            width: 120px;
            height: 50px;
        }

        .box-date {
            top: 35%;
            right: 20%;
            width: 100px;
            height: 30px;
            border-color: #52a5ff;
        }

        .box-merchant {
            top: 25%;
            left: 25%;
            width: 180px;
            height: 40px;
            border-color: #52a5ff;
        }

        .tag-label {
            position: absolute;
            top: -25px;
            left: 0;
            background: #4ee2c0;
            color: #000;
            font-size: 12px;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .tag-blue {
            background: #52a5ff;
            color: #fff;
        }

        /* Scanning Line */
        .scan-line {
            position: absolute;
            width: 100%;
            height: 4px;
            background: #4ee2c0;
            top: 20%;
            box-shadow: 0 0 30px #4ee2c0;
            animation: scan-down 3s infinite ease-in-out;
        }

        /* Bottom Sheet Result */
        .result-sheet {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 280px;
            background: #111;
            border-radius: 40px 40px 0 0;
            padding: 30px;
            transform: translateY(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sheet-handle {
            width: 50px;
            height: 5px;
            background: #333;
            border-radius: 5px;
            margin: 0 auto 20px auto;
        }

        .r-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #222;
            padding-bottom: 15px;
        }

        .r-label {
            color: #888;
            font-size: 14px;
        }

        .r-val {
            color: #fff;
            font-size: 20px;
            font-weight: 600;
        }

        .confirm-btn {
            width: 100%;
            height: 60px;
            background: #4ee2c0;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 800;
            color: #000;
            margin-top: 10px;
        }

        @keyframes pulse-border {

            0%,
            100% {
                border-color: #4ee2c0;
            }

            50% {
                border-color: #fff;
            }
        }

        @keyframes scan-down {
            0% {
                top: 10%;
            }

            100% {
                top: 60%;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>

            <div class="headline">Yapay Zeka<br><span class="gradient-word">Gözüyle Gör.</span></div>

            <div class="visual-container">
                <div class="phone-mockup">
                    <div class="camera-view">
                        <div class="overlay-ui"></div>
                        <div class="detect-box box-merchant">
                            <div class="tag-label tag-blue">İŞ YERİ</div>
                        </div>
                        <div class="detect-box box-date">
                            <div class="tag-label tag-blue">TARİH</div>
                        </div>
                        <div class="detect-box box-total">
                            <div class="tag-label">TUTAR</div>
                        </div>
                        <div class="scan-line"></div>

                        <div class="result-sheet">
                            <div class="sheet-handle"></div>
                            <div class="r-row">
                                <div>
                                    <div class="r-label">İş Yeri</div>
                                    <div class="r-val">Starbucks Coffee</div>
                                </div>
                                <div style="font-size:24px;">☕</div>
                            </div>
                            <div class="r-row">
                                <div>
                                    <div class="r-label">Toplam Tutar</div>
                                    <div class="r-val" style="font-size:28px; color:#4ee2c0;">₺145.00</div>
                                </div>
                            </div>
                            <div class="confirm-btn">KAYDET ✓</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
