<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #020202;
            background: radial-gradient(circle at 50% 30%, #202020 0%, #000 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .portal-ring {
            width: 500px;
            height: 500px;
            border-radius: 50%;
            border: 20px solid #222;
            position: relative;
            box-shadow: 0 0 100px rgba(82, 165, 255, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .event-horizon {
            width: 440px;
            height: 440px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, #4ee2c0, #52a5ff, #8a2be2, #4ee2c0);
            animation: rotate-portal 2s infinite linear;
            filter: blur(20px);
            opacity: 0.8;
        }

        .inner-void {
            position: absolute;
            width: 350px;
            height: 350px;
            background: #000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .future-vision {
            font-size: 40px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 20px #fff;
            animation: zoom-text 3s infinite ease-in;
        }

        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(white 1px, transparent 1px);
            background-size: 20px 20px;
            opacity: 0.5;
            animation: star-warp 2s infinite linear;
        }

        @keyframes rotate-portal {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes zoom-text {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            50% {
                opacity: 1;
            }

            100% {
                transform: scale(3);
                opacity: 0;
            }
        }

        @keyframes star-warp {
            0% {
                background-position: 0 0;
            }

            100% {
                background-position: 0 200px;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Geleceğe<br><span class="gradient-word">Adım At.</span></div>
            <div class="visual-container">
                <div class="portal-ring">
                    <div class="event-horizon"></div>
                    <div class="inner-void">
                        <div class="stars"></div>
                        <div class="future-vision">2026</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
