<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #0a0a0a;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        .atomic-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #0d1b2a 0%, #000000 100%);
            z-index: 0;
        }

        .energy-pulse {
            position: absolute;
            width: 800px;
            height: 800px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(6, 182, 212, 0.2) 0%, transparent 70%);
            filter: blur(80px);
            animation: energyPulse 4s ease-in-out infinite;
            z-index: 1;
        }

        @keyframes energyPulse {

            0%,
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.3;
            }

            50% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 0.6;
            }
        }

        .content-container {
            width: 900px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            height: 100%;
            padding-top: 100px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 80px;
        }

        .app-icon {
            width: 90px;
            height: 90px;
            border-radius: 22px;
            box-shadow: 0 20px 60px rgba(6, 182, 212, 0.6);
        }

        .brand-name {
            font-size: 56px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(90deg, #5EE7DF 0%, #06b6d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .text-section {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin-bottom: 60px;
        }

        .eyebrow {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #06b6d4;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .eyebrow::before {
            content: '';
            width: 40px;
            height: 3px;
            background: linear-gradient(90deg, #06b6d4, #14b8a6);
            display: block;
        }

        .main-headline {
            font-size: 100px;
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -3px;
            color: white;
        }

        .gradient-word {
            background: linear-gradient(135deg, #06b6d4, #5EE7DF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-text {
            margin-top: 30px;
            font-size: 32px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.4;
            max-width: 800px;
        }

        .atomic-structure {
            width: 100%;
            height: 500px;
            margin-top: auto;
            margin-bottom: 100px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nucleus {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.4), rgba(20, 184, 166, 0.4));
            backdrop-filter: blur(20px);
            border: 3px solid #5EE7DF;
            box-shadow:
                0 0 60px rgba(94, 231, 223, 0.8),
                inset 0 0 40px rgba(94, 231, 223, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
            animation: nucleusPulse 3s ease-in-out infinite;
        }

        @keyframes nucleusPulse {

            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 0 60px rgba(94, 231, 223, 0.8), inset 0 0 40px rgba(94, 231, 223, 0.3);
            }

            50% {
                transform: scale(1.1);
                box-shadow: 0 0 100px rgba(94, 231, 223, 1), inset 0 0 60px rgba(94, 231, 223, 0.5);
            }
        }

        .nucleus-label {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 600;
            margin-bottom: 8px;
        }

        .nucleus-value {
            font-size: 42px;
            font-weight: 800;
            background: linear-gradient(135deg, #5EE7DF, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .orbit-path {
            position: absolute;
            border: 2px dashed rgba(6, 182, 212, 0.3);
            border-radius: 50%;
        }

        .orbit-1 {
            width: 350px;
            height: 350px;
            animation: orbitRotate1 8s linear infinite;
        }

        .orbit-2 {
            width: 500px;
            height: 500px;
            animation: orbitRotate2 12s linear infinite reverse;
        }

        .orbit-3 {
            width: 650px;
            height: 650px;
            animation: orbitRotate3 16s linear infinite;
        }

        @keyframes orbitRotate1 {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @keyframes orbitRotate2 {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @keyframes orbitRotate3 {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .electron {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.6), rgba(20, 184, 166, 0.6));
            border: 2px solid #06b6d4;
            box-shadow: 0 0 30px rgba(6, 182, 212, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: white;
            font-weight: 700;
        }

        .electron-value {
            font-size: 18px;
            font-weight: 800;
            color: #5EE7DF;
        }

        /* Position electrons on orbits */
        .orbit-1 .electron {
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
        }

        .orbit-2 .electron {
            top: 50%;
            right: -40px;
            transform: translateY(-50%);
        }

        .orbit-3 .electron {
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
        }

        .connection-beam {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, rgba(6, 182, 212, 0.6), transparent);
            transform-origin: center;
            animation: beamPulse 2s ease-in-out infinite;
        }

        @keyframes beamPulse {

            0%,
            100% {
                opacity: 0.3;
            }

            50% {
                opacity: 0.8;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="atomic-bg"></div>
        <div class="energy-pulse"></div>
        <div class="content-container">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="text-section">
                <div class="eyebrow">İŞLEM AĞI</div>
                <div class="main-headline">Her İşlem<br><span class="gradient-word">Bağlantıda.</span></div>
                <p class="sub-text">Tüm finansal işlemlerini atom yapısı gibi birbirine bağlı gör.</p>
            </div>
            <div class="atomic-structure">
                <div class="orbit-path orbit-1">
                    <div class="electron">
                        <div>Gelir</div>
                        <div class="electron-value">₺42K</div>
                    </div>
                </div>
                <div class="orbit-path orbit-2">
                    <div class="electron">
                        <div>Gider</div>
                        <div class="electron-value">₺28K</div>
                    </div>
                </div>
                <div class="orbit-path orbit-3">
                    <div class="electron">
                        <div>Yatırım</div>
                        <div class="electron-value">₺15K</div>
                    </div>
                </div>
                <div class="nucleus">
                    <div class="nucleus-label">Toplam İşlem</div>
                    <div class="nucleus-value">247</div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
