<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 85% 15%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* PREMIUM COLORFUL LOGO */
        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 60px;
        }

        .app-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 54px;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* EYEBROW STYLING */
        .eyebrow-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .eyebrow-line {
            width: 50px;
            height: 4px;
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            border-radius: 2px;
        }

        .eyebrow-text {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 4px;
            color: #4ee2c0;
            text-transform: uppercase;
        }

        /* HEADLINE STYLING */
        .headline {
            font-size: 115px;
            font-weight: 800;
            line-height: 0.92;
            letter-spacing: -5px;
            color: #fff;
            margin-bottom: 30px;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            font-size: 34px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.4;
            max-width: 800px;
            font-weight: 500;
            margin-bottom: 60px;
        }

        /* THE "MASTERPIECE" VISUAL: GLASS INTERFACE */
        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
        }

        .glass-stage {
            width: 100%;
            height: 600px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-card {
            width: 700px;
            height: 400px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(50px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 60px;
            padding: 60px;
            position: relative;
            z-index: 5;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.6), inset 0 0 40px rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .wallet-label {
            font-size: 24px;
            font-weight: 700;
            color: #4ee2c0;
            opacity: 0.8;
        }

        .wallet-amount {
            font-size: 90px;
            font-weight: 800;
            color: #fff;
            letter-spacing: -2px;
        }

        .card-bottom {
            display: flex;
            gap: 30px;
        }

        .stat-badge {
            background: rgba(78, 226, 192, 0.1);
            border: 1px solid rgba(78, 226, 192, 0.2);
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 20px;
            font-weight: 700;
            color: #4ee2c0;
        }

        /* BACKGROUND ELEMENTS */
        .glow-sphere {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(78, 226, 192, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 1;
        }

        .floating-element {
            position: absolute;
            width: 140px;
            height: 140px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            z-index: 10;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            animation: floating 4s infinite ease-in-out;
        }

        @keyframes floating {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }

            50% {
                transform: translateY(-30px) rotate(5deg);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>

            <div class="eyebrow-container">
                <div class="eyebrow-line"></div>
                <div class="eyebrow-text">ULTRA KONTROL</div>
            </div>

            <div class="headline">Finansal Akışta<br><span class="gradient-word">Kusursuz Hakimiyet.</span></div>
            <div class="description">Hesaplarınızı yönetmek artık bir görev değil, bir keyif. Vynto'nun ultra akıcı
                arayüzü ile paranın her hareketini anlık olarak takip edin.</div>

            <div class="visual-container">
                <div class="glow-sphere"></div>
                <div class="floating-element" style="top: 0; right: 80px; animation-delay: 0s;">🏦</div>
                <div class="floating-element" style="bottom: 50px; left: 80px; animation-delay: 2s;">💳</div>
                <div class="main-card">
                    <div class="card-top">
                        <div class="wallet-label">TOPLAM VARLIK</div>
                        <div class="stat-badge">GÜVENLİ</div>
                    </div>
                    <div class="wallet-amount">₺142.850</div>
                    <div class="card-bottom">
                        <div class="stat-badge">7 BAĞLI HESAP</div>
                        <div class="stat-badge"
                            style="background:rgba(82, 165, 255, 0.1); border-color: rgba(82, 165, 255, 0.2); color:#52a5ff;">
                            %100 VERİMLİ</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
