<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 60px;
        }

        .app-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 54px;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .eyebrow-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .eyebrow-line {
            width: 50px;
            height: 4px;
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            border-radius: 2px;
        }

        .eyebrow-text {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 4px;
            color: #4ee2c0;
            text-transform: uppercase;
        }

        .headline {
            font-size: 115px;
            font-weight: 800;
            line-height: 0.92;
            letter-spacing: -5px;
            color: #fff;
            margin-bottom: 30px;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            font-size: 34px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.4;
            max-width: 800px;
            font-weight: 500;
            margin-bottom: 60px;
        }

        /* VISUAL: Cloud Sync */
        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .sync-stage {
            width: 500px;
            height: 600px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        .device {
            width: 250px;
            height: 150px;
            background: #222;
            border-radius: 20px;
            border: 2px solid #444;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            font-size: 40px;
            color: #fff;
            position: relative;
            z-index: 10;
        }

        .d-phone {
            transform: rotateY(-15deg);
        }

        .d-cloud {
            width: 300px;
            height: 180px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 60px rgba(82, 165, 255, 0.4);
            font-size: 80px;
            animation: cloud-pulse 3s infinite ease-in-out;
        }

        .data-stream {
            position: absolute;
            top: 150px;
            left: 50%;
            width: 4px;
            height: 300px;
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(-50%);
        }

        .packet {
            position: absolute;
            width: 40px;
            height: 40px;
            background: #4ee2c0;
            border-radius: 50%;
            box-shadow: 0 0 20px #4ee2c0;
            left: 50%;
            transform: translateX(-50%);
            top: 400px;
            animation: stream-up 2s infinite linear;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: 800;
        }

        .p1 {
            animation-delay: 0s;
        }

        .p2 {
            animation-delay: 0.6s;
            background: #52a5ff;
            box-shadow: 0 0 20px #52a5ff;
        }

        .p3 {
            animation-delay: 1.2s;
            background: #ffd700;
            box-shadow: 0 0 20px #ffd700;
        }

        @keyframes cloud-pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        @keyframes stream-up {
            0% {
                top: 400px;
                opacity: 1;
                transform: translateX(-50%) scale(0.5);
            }

            100% {
                top: 100px;
                opacity: 0;
                transform: translateX(-50%) scale(1.2);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>

            <div class="eyebrow-container">
                <div class="eyebrow-line"></div>
                <div class="eyebrow-text">BULUT YEDEKELEME</div>
            </div>

            <div class="headline">Verilerin<br><span class="gradient-word">Her Yerde.</span></div>
            <div class="description">Telefonun bozulsa bile verilerin kaybolmaz. Vynto hesabınla giriş yap, kaldığın
                yerden devam et.</div>

            <div class="visual-container">
                <div class="sync-stage">
                    <div class="device d-cloud">☁️</div>
                    <div class="data-stream"></div>
                    <div class="packet p1">₺</div>
                    <div class="packet p2">€</div>
                    <div class="packet p3">$</div>
                    <div class="device d-phone">📱</div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
