<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .magnet-scene {
            position: relative;
            width: 600px;
            height: 400px;
        }

        .magnet {
            width: 300px;
            height: 300px;
            border: 40px solid #ff6b6b;
            border-bottom: none;
            border-radius: 150px 150px 0 0;
            position: absolute;
            left: 0;
            top: 50px;
            transform: rotate(-45deg);
        }

        .magnet-tips {
            position: absolute;
            width: 300px;
            height: 40px;
            bottom: 0;
        }

        .tip {
            width: 40px;
            height: 40px;
            background: #ddd;
            position: absolute;
            bottom: -40px;
        }

        .t-l {
            left: -40px;
        }

        .t-r {
            right: -40px;
        }

        .force-field {
            position: absolute;
            width: 300px;
            height: 300px;
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            top: 50px;
            left: 50px;
            animation: pulse-field 2s infinite;
        }

        .coin-m {
            width: 50px;
            height: 50px;
            background: #ffd700;
            border-radius: 50%;
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            animation: attract 3s infinite ease-in;
        }

        .c1 {
            right: 50px;
            top: 50px;
            animation-delay: 0s;
        }

        .c2 {
            right: 100px;
            top: 150px;
            animation-delay: 0.5s;
        }

        .c3 {
            right: 20px;
            top: 250px;
            animation-delay: 1s;
        }

        @keyframes pulse-field {
            0% {
                opacity: 0;
                transform: scale(0.8);
            }

            100% {
                opacity: 0.5;
                transform: scale(1.2);
            }
        }

        @keyframes attract {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            100% {
                transform: translate(-200px, 100px) scale(0.5);
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Parayı<br><span class="gradient-word">Çek.</span></div>
            <div class="visual-container">
                <div class="magnet-scene">
                    <div class="magnet">
                        <div class="tip t-l"></div>
                        <div class="tip t-r"></div>
                    </div>
                    <div class="force-field"></div>
                    <div class="coin-m c1">₺</div>
                    <div class="coin-m c2">$</div>
                    <div class="coin-m c3">€</div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
