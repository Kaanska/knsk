<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 85% 15%, #0d323f 0%, #081116 65%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 900px;
            z-index: 10;
            padding-top: 120px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 80px;
        }

        .app-icon {
            width: 95px;
            height: 95px;
            border-radius: 24px;
        }

        .brand-name {
            font-size: 58px;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .eyebrow {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 3px;
            color: #4ee2c0;
            text-transform: uppercase;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .eyebrow::before {
            content: '';
            width: 60px;
            height: 3px;
            background: #4ee2c0;
        }

        .headline {
            font-size: 110px;
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -5px;
            color: #fff;
            margin-bottom: 35px;
        }

        .gradient-text {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            font-size: 36px;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.45;
            max-width: 820px;
            font-weight: 500;
        }

        /* Feature Visual: Shared Budgets */
        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .group-circle {
            width: 500px;
            height: 500px;
            border: 2px dashed rgba(78, 226, 192, 0.3);
            border-radius: 50%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .user-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 3px solid #4ee2c0;
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            box-shadow: 0 0 40px rgba(78, 226, 192, 0.2);
        }

        .main-avatar {
            width: 160px;
            height: 160px;
            background: rgba(78, 226, 192, 0.2);
            border-color: #52a5ff;
            font-size: 70px;
        }

        .avatar-1 {
            top: -60px;
            left: 50%;
            transform: translateX(-50%);
        }

        .avatar-2 {
            bottom: 20%;
            left: -60px;
        }

        .avatar-3 {
            bottom: 20%;
            right: -60px;
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="eyebrow">ORTAK BÜTÇE</div>
            <div class="headline">Birlikte Kazan,<br><span class="gradient-text">Birlikte Yönet.</span></div>
            <div class="description">Harideler, ev arkadaşları veya aile üyeleri... Vynto ile ortak harcamaları takip
                etmek ve paylaşmak hiç bu kadar kolay olmamıştı.</div>
            <div class="visual-container">
                <div class="group-circle">
                    <div class="user-avatar avatar-1">👤</div>
                    <div class="user-avatar avatar-2">👤</div>
                    <div class="user-avatar avatar-3">👤</div>
                    <div class="user-avatar main-avatar">👫</div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
