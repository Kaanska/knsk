<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 60px;
        }

        .app-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 54px;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .eyebrow-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .eyebrow-line {
            width: 50px;
            height: 4px;
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            border-radius: 2px;
        }

        .eyebrow-text {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 4px;
            color: #4ee2c0;
            text-transform: uppercase;
        }

        .headline {
            font-size: 115px;
            font-weight: 800;
            line-height: 0.92;
            letter-spacing: -5px;
            color: #fff;
            margin-bottom: 30px;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            font-size: 34px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.4;
            max-width: 800px;
            font-weight: 500;
            margin-bottom: 60px;
        }

        /* VISUAL: 3D Category Sorting */
        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 1500px;
        }

        .category-hub {
            width: 600px;
            height: 600px;
            position: relative;
            transform-style: preserve-3d;
            animation: float-hub 6s infinite ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .center-magnet {
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(78, 226, 192, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 60px rgba(78, 226, 192, 0.2);
            z-index: 10;
        }

        .magnet-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 1px dashed rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: spin-magnet 20s infinite linear;
        }

        .cat-item {
            position: absolute;
            width: 100px;
            height: 100px;
            background: rgba(30, 40, 50, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            transition: all 0.3s;
        }

        .cat-1 {
            top: 50px;
            left: 100px;
            transform: translateZ(50px) rotate(-10deg);
            border-color: #ff6b6b;
        }

        .cat-2 {
            top: 50px;
            right: 100px;
            transform: translateZ(-50px) rotate(10deg);
            border-color: #4ee2c0;
        }

        .cat-3 {
            bottom: 50px;
            left: 150px;
            transform: translateZ(100px) rotate(-5deg);
            border-color: #52a5ff;
        }

        .cat-4 {
            bottom: 80px;
            right: 120px;
            transform: translateZ(20px) rotate(15deg);
            border-color: #fca5a5;
        }

        .cat-icon {
            font-size: 30px;
        }

        .cat-name {
            font-size: 14px;
            color: #fff;
            font-weight: 700;
            opacity: 0.8;
        }

        .flow-line {
            position: absolute;
            width: 150px;
            height: 2px;
            background: linear-gradient(to right, transparent, #4ee2c0, transparent);
            top: 50%;
            left: 50%;
            transform-origin: 0 0;
            opacity: 0.5;
        }

        @keyframes float-hub {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        @keyframes spin-magnet {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>

            <div class="eyebrow-container">
                <div class="eyebrow-line"></div>
                <div class="eyebrow-text">AKILLI KATEGORİ</div>
            </div>

            <div class="headline">Düzenin<br><span class="gradient-word">Yeni Formu.</span></div>
            <div class="description">Market, fatura, eğlence... Vynto yapay zekası, harcamalarınızı saniyeler içinde
                anlar ve doğru kutuya yerleştirir.</div>

            <div class="visual-container">
                <div class="category-hub">
                    <div class="center-magnet">
                        <div class="magnet-ring"></div>
                        <div style="font-size: 50px;">🧠</div>
                    </div>

                    <div class="cat-item cat-1">
                        <div class="cat-icon">🍔</div>
                        <div class="cat-name">GIDA</div>
                    </div>
                    <div class="cat-item cat-2">
                        <div class="cat-icon">🚌</div>
                        <div class="cat-name">ULAŞIM</div>
                    </div>
                    <div class="cat-item cat-3">
                        <div class="cat-icon">🎬</div>
                        <div class="cat-name">EĞLENCE</div>
                    </div>
                    <div class="cat-item cat-4">
                        <div class="cat-icon">🏠</div>
                        <div class="cat-name">EV</div>
                    </div>

                    <div class="flow-line" style="transform: rotate(225deg) translateY(-80px);"></div>
                    <div class="flow-line" style="transform: rotate(315deg) translateY(-80px);"></div>
                    <div class="flow-line" style="transform: rotate(45deg) translateY(-80px);"></div>
                    <div class="flow-line" style="transform: rotate(135deg) translateY(-80px);"></div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
