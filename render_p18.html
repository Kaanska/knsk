<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #050505;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.45;
            z-index: 0;
        }

        .blob-1 {
            width: 900px;
            height: 900px;
            top: -200px;
            right: -200px;
            background: linear-gradient(135deg, #43e97b, #38f9d7);
        }

        .blob-2 {
            width: 800px;
            height: 800px;
            bottom: -200px;
            left: -200px;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
        }

        .content-container {
            width: 900px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            height: 100%;
            padding-top: 100px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 80px;
        }

        .app-icon {
            width: 90px;
            height: 90px;
            border-radius: 22px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .brand-name {
            font-size: 56px;
            font-weight: 800;
            letter-spacing: -1px;
            color: white;
            background: linear-gradient(90deg, #5EE7DF 0%, #4facfe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .text-section {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin-bottom: 80px;
        }

        .eyebrow {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #FF9966;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .eyebrow::before {
            content: '';
            width: 40px;
            height: 3px;
            background: #FF9966;
            display: block;
        }

        .main-headline {
            font-size: 96px;
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -3px;
            color: white;
        }

        .gradient-word {
            background: linear-gradient(to right, #FF9966, #FF5E62);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-text {
            margin-top: 30px;
            font-size: 32px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.4;
            max-width: 800px;
        }

        .card {
            width: 100%;
            padding: 60px;
            background: rgba(25, 25, 25, 0.6);
            backdrop-filter: blur(60px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 60px;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            max-height: 480px;
            margin-top: auto;
            margin-bottom: 100px;
        }

        .card-left {
            display: flex;
            flex-direction: column;
            gap: 30px;
            width: 50%;
        }

        .total-wrapper {
            display: flex;
            flex-direction: column;
        }

        .total-amount {
            font-size: 64px;
            font-weight: 800;
            color: white;
            line-height: 1;
            letter-spacing: -2px;
        }

        .total-label {
            font-size: 24px;
            color: #aaa;
            font-weight: 600;
        }

        .bar-chart {
            width: 40%;
            height: 180px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 15px;
        }

        .bar-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            height: 100%;
            justify-content: flex-end;
        }

        .bar-val {
            color: white;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .bar {
            width: 40px;
            background: linear-gradient(to top, #FF9966, #FF5E62);
            border-radius: 10px 10px 4px 4px;
        }

        .bar-label {
            color: #888;
            font-size: 16px;
            font-weight: 600;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="content-container">
            <div class="header"><img src="images/AppIcon.png" class="app-icon"><span class="brand-name">VYNTO</span>
            </div>
            <div class="text-section">
                <div class="eyebrow">HARCAMA TAKİBİ</div>
                <div class="main-headline">Harcamaların<br><span class="gradient-word">Gözünden Kaçmasın.</span></div>
                <p class="sub-text">Nereye ne kadar harcadığını bilmek seni güçlendirir. Kontrolü eline al.</p>
            </div>
            <div class="card">
                <div class="card-left">
                    <div class="total-wrapper">
                        <div class="total-label">Bu Ay Toplam</div>
                        <div class="total-amount">₺12.450</div>
                    </div>
                </div>
                <div class="bar-chart">
                    <div class="bar-col">
                        <div class="bar-val">5.2k</div>
                        <div class="bar" style="height: 80%;"></div>
                        <div class="bar-label">Market</div>
                    </div>
                    <div class="bar-col">
                        <div class="bar-val">3.1k</div>
                        <div class="bar" style="height: 50%;"></div>
                        <div class="bar-label">Fatura</div>
                    </div>
                    <div class="bar-col">
                        <div class="bar-val">4.1k</div>
                        <div class="bar" style="height: 65%;"></div>
                        <div class="bar-label">Eğlence</div>
                    </div>
                    <div class="bar-col">
                        <div class="bar-val">...</div>
                        <div class="bar" style="height: 20%; background: #333"></div>
                        <div class="bar-label">Diğer</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
