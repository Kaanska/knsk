<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .balance-neon {
            width: 500px;
            height: 300px;
            position: relative;
            display: flex;
            justify-content: center;
        }

        .bar-neon {
            width: 400px;
            height: 5px;
            background: #fff;
            position: absolute;
            top: 50px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            animation: seesaw 4s infinite ease-in-out;
        }

        .pan-neon {
            width: 100px;
            height: 50px;
            border-bottom: 4px solid;
            border-left: 4px solid;
            border-right: 4px solid;
            border-radius: 0 0 50px 50px;
            position: absolute;
            top: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        .p-l {
            left: 0;
            border-color: #4ee2c0;
            box-shadow: 0 10px 20px rgba(78, 226, 192, 0.2);
        }

        .p-r {
            right: 0;
            border-color: #ff6b6b;
            box-shadow: 0 10px 20px rgba(255, 107, 107, 0.2);
        }

        .fulcrum {
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-bottom: 40px solid #52a5ff;
            position: absolute;
            bottom: 0;
            filter: drop-shadow(0 0 10px #52a5ff);
        }

        @keyframes seesaw {
            0% {
                transform: rotate(-5deg);
            }

            50% {
                transform: rotate(5deg);
            }

            100% {
                transform: rotate(-5deg);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Hassas<br><span class="gradient-word">Denge.</span></div>
            <div class="visual-container">
                <div class="balance-neon">
                    <div class="bar-neon">
                        <div class="pan-neon p-l">💰</div>
                        <div class="pan-neon p-r">🧾</div>
                    </div>
                    <div class="fulcrum"></div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
