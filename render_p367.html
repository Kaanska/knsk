<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .lens-ring {
            width: 500px;
            height: 500px;
            border-radius: 50%;
            border: 5px solid rgba(255, 255, 255, 0.1);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .focus-layer {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            border: 4px solid #4ee2c0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(0px);
            /* Clear center */
            z-index: 10;
            animation: zoom-lens 3s infinite alternate;
        }

        .bg-text {
            position: absolute;
            font-size: 30px;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.2);
            font-family: monospace;
            transform: rotate(-10deg);
            filter: blur(5px);
        }

        .clean-logo {
            width: 150px;
            height: 150px;
            opacity: 1;
            filter: drop-shadow(0 0 20px #4ee2c0);
        }

        @keyframes zoom-lens {
            0% {
                transform: scale(1);
                border-color: #4ee2c0;
            }

            100% {
                transform: scale(1.1);
                border-color: #52a5ff;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Sadece<br><span class="gradient-word">Odaklan.</span></div>
            <div class="visual-container">
                <div class="bg-text" style="top: 10%; left: 10%">DISTRACTION</div>
                <div class="bg-text" style="bottom: 15%; right: 10%">NOISE</div>
                <div class="bg-text" style="top: 30%; right: 5%">CHAOS</div>

                <div class="lens-ring">
                    <div class="focus-layer">
                        <svg class="clean-logo" viewBox="0 0 100 100" fill="#4ee2c0">
                            <circle cx="50" cy="50" r="40" />
                        </svg>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
