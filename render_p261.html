<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 15% 15%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 60px;
        }

        .app-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
        }

        .brand-name {
            font-size: 54px;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .eyebrow-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .eyebrow-line {
            width: 50px;
            height: 4px;
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            border-radius: 2px;
        }

        .eyebrow-text {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 4px;
            color: #4ee2c0;
            text-transform: uppercase;
        }

        .headline {
            font-size: 115px;
            font-weight: 800;
            line-height: 0.92;
            letter-spacing: -5px;
            color: #fff;
            margin-bottom: 30px;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            font-size: 34px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.4;
            max-width: 800px;
            font-weight: 500;
            margin-bottom: 60px;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
        }

        /* GOAL MOUNTAIN VISUAL */
        .mountain-container {
            width: 700px;
            height: 500px;
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .mountain-svg {
            width: 100%;
            height: 100%;
            fill: none;
            stroke: rgba(255, 255, 255, 0.1);
            stroke-width: 2;
        }

        .goal-flag {
            position: absolute;
            top: 50px;
            font-size: 60px;
            filter: drop-shadow(0 0 20px #FFD700);
            animation: wave-flag 2s infinite ease-in-out;
        }

        .climber-path {
            position: absolute;
            width: 400px;
            height: 350px;
            border-right: 4px dashed #4ee2c0;
            border-top: 4px dashed #4ee2c0;
            top: 150px;
            left: 150px;
            transform: skew(-20deg);
            opacity: 0.5;
        }

        .climb-dot {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 20px #fff;
            bottom: 250px;
            left: 450px;
            animation: pulse-dot 2s infinite;
        }

        .goal-card {
            position: absolute;
            bottom: 50px;
            right: 50px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            padding: 20px 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            font-weight: 700;
            animation: bounce-card 3s infinite ease-in-out;
        }

        @keyframes wave-flag {

            0%,
            100% {
                transform: rotate(0deg);
            }

            50% {
                transform: rotate(10deg);
            }
        }

        @keyframes pulse-dot {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.5);
                opacity: 0.5;
            }
        }

        @keyframes bounce-card {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>

            <div class="eyebrow-container">
                <div class="eyebrow-line"></div>
                <div class="eyebrow-text">HEDEF TAKİBİ</div>
            </div>

            <div class="headline">Hayallerine<br><span class="gradient-word">Adım Adım.</span></div>
            <div class="description">Ev, araba veya tatil... Hedefin ne olursa olsun, Vynto sana en kısa yolu çizer ve
                motivasyonunu zirvede tutar.</div>

            <div class="visual-container">
                <div class="mountain-container">
                    <svg class="mountain-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
                        <path d="M0,100 L50,10 L100,100" />
                    </svg>
                    <div class="goal-flag">🚩</div>
                    <div class="climb-dot"></div>
                    <div class="goal-card">
                        <div>TATİL FONU</div>
                        <div style="font-size: 24px; color: #4ee2c0;">₺24.500 / ₺30.000</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
