<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #111;
            background: radial-gradient(circle at 50% 10%, #1a1a1a 0%, #000 80%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .sound-sphere {
            width: 400px;
            height: 400px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .bar {
            position: absolute;
            width: 4px;
            height: 40px;
            background: #52a5ff;
            transform-origin: center 200px;
            border-radius: 2px;
            box-shadow: 0 0 10px #52a5ff;
            animation: eq-music 1s infinite ease-in-out alternate;
        }

        .inner-glow {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, #52a5ff, transparent);
            opacity: 0.5;
            animation: pulse-beat 2s infinite;
        }

        @keyframes eq-music {
            0% {
                height: 20px;
                opacity: 0.5;
            }

            100% {
                height: 80px;
                opacity: 1;
            }
        }

        @keyframes pulse-beat {
            0% {
                transform: scale(1);
                opacity: 0.5;
            }

            100% {
                transform: scale(1.2);
                opacity: 0.8;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Piyasayı<br><span class="gradient-word">Dinle.</span></div>
            <div class="visual-container">
                <div class="sound-sphere">
                    <div class="inner-glow"></div>
                </div>
            </div>
            <script>
                // Generate bars dynamically for visual effect
                const container = document.querySelector('.sound-sphere');
                for (let i = 0; i < 360; i += 10) {
                    const bar = document.createElement('div');
                    bar.className = 'bar';
                    bar.style.transform = `rotate(${i}deg)`;
                    bar.style.animationDelay = `${Math.random()}s`;
                    container.appendChild(bar);
                }
            </script>
        </div>
    </div>
</body>

</html>
