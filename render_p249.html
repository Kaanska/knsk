<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 85% 15%, #0d323f 0%, #081116 65%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 900px;
            z-index: 10;
            padding-top: 120px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 80px;
        }

        .app-icon {
            width: 95px;
            height: 95px;
            border-radius: 24px;
        }

        .brand-name {
            font-size: 58px;
            font-weight: 800;
            color: #3da9eb;
            letter-spacing: -2px;
        }

        .eyebrow {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 3px;
            color: #3da9eb;
            text-transform: uppercase;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .eyebrow::before {
            content: '';
            width: 60px;
            height: 3px;
            background: #3da9eb;
        }

        .headline {
            font-size: 110px;
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -5px;
            color: #fff;
            margin-bottom: 35px;
        }

        .blue-text {
            color: #3da9eb;
        }

        .description {
            font-size: 36px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.45;
            max-width: 820px;
            font-weight: 500;
        }

        /* Visual: Goal Progression / Steps */
        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .step-container {
            width: 100%;
            height: 400px;
            display: flex;
            align-items: flex-end;
            gap: 40px;
            padding: 0 50px;
        }

        .step {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px 20px 0 0;
            position: relative;
            transition: all 0.5s;
            animation: step-up 1.5s ease-out forwards;
        }

        .step-1 {
            height: 20%;
            animation-delay: 0.1s;
        }

        .step-2 {
            height: 45%;
            animation-delay: 0.3s;
        }

        .step-3 {
            height: 70%;
            animation-delay: 0.5s;
        }

        .step-4 {
            height: 95%;
            background: #3da9eb;
            box-shadow: 0 0 40px rgba(61, 169, 235, 0.6);
            animation-delay: 0.7s;
        }

        .step-label {
            position: absolute;
            top: -50px;
            width: 100%;
            text-align: center;
            color: #3da9eb;
            font-weight: 800;
            font-size: 24px;
        }

        @keyframes step-up {
            from {
                height: 0;
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header"><img src="images/AppIcon.png" class="app-icon"><span class="brand-name">VYNTO</span>
            </div>
            <div class="eyebrow">TASARRUF POTANSİYELİ</div>
            <div class="headline">Birikimlerini<br><span class="blue-text">Zirveye Taşı.</span></div>
            <div class="description">Gizli tasarruf fırsatlarını keşfedin. Vynto AI ile bütçe verimliliğinizi adım adım
                artırarak finansal zirveye tırmanın.</div>
            <div class="visual-container">
                <div class="step-container">
                    <div class="step step-1"></div>
                    <div class="step step-2"></div>
                    <div class="step step-3"></div>
                    <div class="step step-4">
                        <div class="step-label">%100</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
