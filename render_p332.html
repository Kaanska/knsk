<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .phone-tree {
            position: relative;
            width: 300px;
            height: 600px;
            background: #000;
            border: 5px solid #333;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.8);
            transform: translateY(50px);
        }

        .screen-tree {
            width: 100%;
            height: 95%;
            background: linear-gradient(to bottom, #111, #081116);
            border-radius: 25px;
            position: relative;
            overflow: hidden;
        }

        .tree-trunk {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 300px;
            background: #8B4513;
            border-radius: 5px 5px 0 0;
            z-index: 1;
        }

        .tree-crown {
            position: absolute;
            width: 250px;
            height: 250px;
            background: #228B22;
            border-radius: 50%;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0.8;
            filter: blur(2px);
            z-index: 2;
        }

        .fruit-coin {
            width: 30px;
            height: 30px;
            background: #ffd700;
            border-radius: 50%;
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #000;
            font-weight: 800;
            animation: grow-fruit 2s infinite ease-in-out;
            z-index: 3;
        }

        .f1 {
            top: 100px;
            left: 80px;
        }

        .f2 {
            top: 150px;
            left: 180px;
            animation-delay: 0.5s;
        }

        .f3 {
            top: 70px;
            left: 130px;
            animation-delay: 1s;
        }

        @keyframes grow-fruit {
            0% {
                transform: scale(0);
            }

            100% {
                transform: scale(1.2);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Büyüyen<br><span class="gradient-word">Yatırımlar.</span></div>
            <div class="visual-container">
                <div class="phone-tree">
                    <div class="screen-tree">
                        <div class="tree-trunk"></div>
                        <div class="tree-crown"></div>
                        <div class="fruit-coin f1">₺</div>
                        <div class="fruit-coin f2">$</div>
                        <div class="fruit-coin f3">€</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
