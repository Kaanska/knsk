<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 60px;
        }

        .app-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 54px;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .eyebrow-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .eyebrow-line {
            width: 50px;
            height: 4px;
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            border-radius: 2px;
        }

        .eyebrow-text {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 4px;
            color: #4ee2c0;
            text-transform: uppercase;
        }

        .headline {
            font-size: 115px;
            font-weight: 800;
            line-height: 0.92;
            letter-spacing: -5px;
            color: #fff;
            margin-bottom: 30px;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            font-size: 34px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.4;
            max-width: 800px;
            font-weight: 500;
            margin-bottom: 60px;
        }

        /* VISUAL: Widget Gallery */
        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .phone-home {
            width: 380px;
            height: 700px;
            background: #000;
            border: 4px solid #333;
            border-radius: 50px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            position: relative;
            transform: rotateY(15deg) rotateX(5deg);
            overflow: hidden;
            background-image: linear-gradient(135deg, #0d323f, #081116);
        }

        .w-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 80px 20px 20px 20px;
        }

        .w-item {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            aspect-ratio: 1;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            animation: widget-pulse 4s infinite ease-in-out;
        }

        .w-wide {
            grid-column: span 2;
            aspect-ratio: 2/1;
        }

        .w-title {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            font-weight: 700;
        }

        .w-val {
            font-size: 24px;
            color: #fff;
            font-weight: 800;
        }

        .w-chart {
            height: 40px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            margin-top: auto;
        }

        .w2 {
            animation-delay: 1s;
            border-color: #4ee2c0;
            background: rgba(78, 226, 192, 0.1);
        }

        .w3 {
            animation-delay: 2s;
            border-color: #52a5ff;
            background: rgba(82, 165, 255, 0.1);
        }

        @keyframes widget-pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.02);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>

            <div class="eyebrow-container">
                <div class="eyebrow-line"></div>
                <div class="eyebrow-text">ANA EKRAN WIDGETLARI</div>
            </div>

            <div class="headline">Kontrol<br><span class="gradient-word">Parmak Ucunda.</span></div>
            <div class="description">Uygulamaya girmeden bütçeni gör. Kişiselleştirilebilir widget'lar ile finansal
                durumun her an gözünün önünde.</div>

            <div class="visual-container">
                <div class="phone-home">
                    <!-- Notch -->
                    <div
                        style="position: absolute; top:0; left:50%; transform:translateX(-50%); width:120px; height:30px; background:#000; border-radius:0 0 20px 20px;">
                    </div>

                    <div class="w-grid">
                        <div class="w-item w-wide w3">
                            <div class="w-title">GÜNLÜK HARCAMA</div>
                            <div class="w-val">₺450 / ₺600</div>
                            <div class="w-chart" style="width: 75%; background: #52a5ff;"></div>
                        </div>
                        <div class="w-item w2">
                            <div class="w-title">ALTIN</div>
                            <div class="w-val">2.450₺</div>
                            <div style="font-size:30px;">🥇</div>
                        </div>
                        <div class="w-item">
                            <div class="w-title">DOLAR</div>
                            <div class="w-val">35.42₺</div>
                            <div style="font-size:30px;">💵</div>
                        </div>
                        <div class="w-item w-wide">
                            <div class="w-title">SON İŞLEMLER</div>
                            <div style="font-size:14px; color:#ddd; margin-top:5px;">Starbucks - 145₺</div>
                            <div style="font-size:14px; color:#ddd;">Netflix - 230₺</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
