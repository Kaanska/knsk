<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #111;
            background: radial-gradient(circle at 50% 10%, #1a1a1a 0%, #000 80%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .brain-web {
            width: 400px;
            height: 400px;
            position: relative;
            background: radial-gradient(circle, rgba(78, 226, 192, 0.1), transparent 70%);
            border-radius: 50%;
        }

        .node {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #4ee2c0;
            border-radius: 50%;
            box-shadow: 0 0 15px #4ee2c0;
            animation: pulse-node 2s infinite alternate;
        }

        .synapse {
            position: absolute;
            background: rgba(82, 165, 255, 0.5);
            height: 1px;
            transform-origin: left center;
        }

        .signal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: #fff;
            border-radius: 2px;
            box-shadow: 0 0 10px #fff;
            animation: transmit 1s infinite linear;
        }

        /* Sample connections */
        .n1 {
            top: 100px;
            left: 150px;
        }

        .n2 {
            top: 150px;
            left: 250px;
        }

        .n3 {
            top: 250px;
            left: 100px;
        }

        .n4 {
            top: 300px;
            left: 300px;
        }

        .n5 {
            top: 200px;
            left: 200px;
        }

        .s1-2 {
            top: 105px;
            left: 155px;
            width: 100px;
            transform: rotate(25deg);
        }

        .s2-5 {
            top: 155px;
            left: 255px;
            width: 70px;
            transform: rotate(135deg);
        }

        .s5-3 {
            top: 205px;
            left: 205px;
            width: 110px;
            transform: rotate(150deg);
        }

        .s5-4 {
            top: 205px;
            left: 205px;
            width: 140px;
            transform: rotate(45deg);
        }

        @keyframes pulse-node {
            0% {
                transform: scale(1);
                opacity: 0.8;
            }

            100% {
                transform: scale(1.5);
                opacity: 1;
            }
        }

        @keyframes transmit {
            0% {
                left: 0;
                width: 0;
                opacity: 1;
            }

            100% {
                left: 100%;
                width: 0px;
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Akıllı<br><span class="gradient-word">Kararlar.</span></div>
            <div class="visual-container">
                <div class="brain-web">
                    <div class="synapse s1-2">
                        <div class="signal"></div>
                    </div>
                    <div class="synapse s2-5">
                        <div class="signal"></div>
                    </div>
                    <div class="synapse s5-3">
                        <div class="signal"></div>
                    </div>
                    <div class="synapse s5-4">
                        <div class="signal"></div>
                    </div>

                    <div class="node n1"></div>
                    <div class="node n2"></div>
                    <div class="node n3"></div>
                    <div class="node n4"></div>
                    <div class="node n5"></div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
