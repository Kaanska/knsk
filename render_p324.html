<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .infinity-loop {
            width: 500px;
            height: 250px;
            position: relative;
        }

        .loop-path {
            width: 100%;
            height: 100%;
            border: 20px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            position: absolute;
            transform: rotateX(60deg);
        }

        .flow-dot {
            width: 30px;
            height: 30px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px #fff;
            animation: move-inf 4s infinite linear;
            offset-path: path("M250 50 A 200 100 0 1 1 250 200 A 200 100 0 1 1 250 50");
        }

        .icon-income {
            position: absolute;
            left: 50px;
            top: 50%;
            font-size: 60px;
            filter: drop-shadow(0 0 20px rgba(78, 226, 192, 0.5));
        }

        .icon-expense {
            position: absolute;
            right: 50px;
            top: 50%;
            font-size: 60px;
            filter: drop-shadow(0 0 20px rgba(255, 107, 107, 0.5));
        }

        @keyframes move-inf {
            0% {
                offset-distance: 0%;
                transform: scale(0.5);
            }

            50% {
                transform: scale(1.5);
            }

            100% {
                offset-distance: 100%;
                transform: scale(0.5);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Döngüyü<br><span class="gradient-word">Yönet.</span></div>
            <div class="visual-container">
                <div class="infinity-loop">
                    <div class="loop-path"></div>
                    <div class="icon-income">💰</div>
                    <div class="icon-expense">💸</div>
                    <div class="flow-dot"></div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
