<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .chaos-order {
            width: 600px;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .mess {
            width: 250px;
            height: 250px;
            position: relative;
        }

        .squiggle {
            position: absolute;
            border: 4px solid #fff;
            border-radius: 50%;
            opacity: 0.6;
            animation: spin-mess 10s infinite linear;
        }

        .s1 {
            width: 100px;
            height: 100px;
            top: 50px;
            left: 50px;
            border-color: #ff6b6b;
            transform: rotate(45deg);
        }

        .s2 {
            width: 150px;
            height: 80px;
            top: 100px;
            left: 20px;
            border-color: #ffd700;
            transform: rotate(-30deg);
        }

        .s3 {
            width: 80px;
            height: 120px;
            top: 20px;
            left: 100px;
            border-color: #52a5ff;
            transform: rotate(90deg);
        }

        .filter-v {
            width: 80px;
            height: 200px;
            background: rgba(78, 226, 192, 0.2);
            border: 2px solid #4ee2c0;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: 800;
            color: #4ee2c0;
            box-shadow: 0 0 30px rgba(78, 226, 192, 0.4);
        }

        .straight-line {
            width: 200px;
            height: 8px;
            background: linear-gradient(90deg, #4ee2c0, #52a5ff);
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(78, 226, 192, 0.5);
            animation: grow-line 2s infinite ease-out;
        }

        @keyframes spin-mess {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes grow-line {
            0% {
                width: 0;
                opacity: 0;
            }

            100% {
                width: 200px;
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Karmaşayı<br><span class="gradient-word">Çöz.</span></div>
            <div class="visual-container">
                <div class="chaos-order">
                    <div class="mess">
                        <div class="squiggle s1"></div>
                        <div class="squiggle s2"></div>
                        <div class="squiggle s3"></div>
                    </div>
                    <div class="filter-v">V</div>
                    <div class="straight-line"></div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
