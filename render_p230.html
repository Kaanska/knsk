<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 90% 10%, #0d323f 0%, #081116 60%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 900px;
            z-index: 10;
            padding-top: 120px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 80px;
        }

        .app-icon {
            width: 90px;
            height: 90px;
            border-radius: 22px;
        }

        .brand-name {
            font-size: 56px;
            font-weight: 800;
            color: #3da9eb;
            letter-spacing: -1.5px;
        }

        .eyebrow {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #3da9eb;
            text-transform: uppercase;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .eyebrow::before {
            content: '';
            width: 50px;
            height: 3px;
            background: #3da9eb;
        }

        .headline {
            font-size: 115px;
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -4.5px;
            color: #fff;
            margin-bottom: 30px;
        }

        .blue-text {
            color: #3da9eb;
        }

        .description {
            font-size: 34px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.4;
            max-width: 820px;
            font-weight: 500;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .blueprint {
            width: 700px;
            height: 450px;
            border: 2px dashed rgba(61, 169, 235, 0.4);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dream-object {
            font-size: 200px;
            opacity: 0.2;
            filter: blur(5px);
        }

        .filling-data {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60%;
            background: linear-gradient(to top, rgba(61, 169, 235, 0.3), transparent);
            animation: fill-up 5s infinite ease-in-out;
        }

        .percentage {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 60px;
            font-weight: 900;
            color: #3da9eb;
        }

        @keyframes fill-up {
            0% {
                height: 20%;
            }

            50% {
                height: 80%;
            }

            100% {
                height: 20%;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header"><img src="images/AppIcon.png" class="app-icon"><span class="brand-name">VYNTO</span>
            </div>
            <div class="eyebrow">HEDEF PLANLAMA</div>
            <div class="headline">Hayallerini<br><span class="blue-text">İnşa Et.</span></div>
            <div class="description">İstediğiniz o ev, araba ya da tatil... Vynto AI size sadece rakamları değil,
                hayallerinize ne kadar yakın olduğunuzu söyler.</div>
            <div class="visual-container">
                <div class="blueprint">
                    <div class="percentage">%76</div>
                    <div class="dream-object">🏠</div>
                    <div class="filling-data"></div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
