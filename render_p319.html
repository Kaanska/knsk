<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: linear-gradient(135deg, #0d1216 0%, #000 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .night-city {
            width: 500px;
            height: 400px;
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .building {
            width: 50px;
            background: #222;
            margin: 0 5px;
            position: relative;
        }

        .window {
            width: 100%;
            height: 10px;
            background: #555;
            margin: 5px 0;
        }

        .moon {
            width: 150px;
            height: 150px;
            background: #ffd700;
            border-radius: 50%;
            position: absolute;
            top: -50px;
            right: 50px;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.5);
            animation: float-moon 10s infinite alternate;
        }

        .zzz {
            position: absolute;
            font-size: 40px;
            color: #fff;
            font-weight: 800;
            top: 50px;
            left: 100px;
            animation: sleep 2s infinite;
        }

        @keyframes float-moon {
            0% {
                transform: translateY(0);
            }

            100% {
                transform: translateY(-20px);
            }
        }

        @keyframes sleep {
            0% {
                opacity: 0;
                transform: translateY(0) scale(0.5);
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0;
                transform: translateY(-40px) scale(1.5);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Gecen<br><span class="gradient-word">Rahat Olsun.</span></div>
            <div class="visual-container">
                <div class="night-city">
                    <div class="moon"></div>
                    <div class="zzz">Zzz...</div>
                    <div class="building" style="height: 200px;">
                        <div class="window"></div>
                        <div class="window"></div>
                    </div>
                    <div class="building" style="height: 300px;">
                        <div class="window"></div>
                        <div class="window"></div>
                        <div class="window"></div>
                    </div>
                    <div class="building" style="height: 150px;">
                        <div class="window"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
