<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .coin-pot {
            width: 200px;
            height: 150px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px 10px 40px 40px;
            position: relative;
            bottom: -100px;
            display: flex;
            justify-content: center;
        }

        .plant-stem {
            width: 10px;
            height: 0;
            background: #4ee2c0;
            position: absolute;
            bottom: 100px;
            border-radius: 5px;
            box-shadow: 0 0 20px #4ee2c0;
            animation: grow-plant 4s infinite ease-out;
        }

        .leaf {
            width: 0;
            height: 0;
            background: #52a5ff;
            border-radius: 0 40px 0 40px;
            position: absolute;
            opacity: 0;
            box-shadow: 0 0 15px #52a5ff;
        }

        .l1 {
            top: 50px;
            left: -30px;
            transform: rotate(-45deg);
            animation: bloom 4s infinite 1s;
        }

        .l2 {
            top: 80px;
            right: -30px;
            transform: rotate(45deg);
            animation: bloom 4s infinite 1.5s;
        }

        .l3 {
            top: 120px;
            left: -30px;
            transform: rotate(-30deg);
            animation: bloom 4s infinite 2s;
        }

        .flower-bud {
            width: 0;
            height: 0;
            background: #ffd700;
            border-radius: 50%;
            position: absolute;
            top: -20px;
            box-shadow: 0 0 40px #ffd700;
            animation: flower-pop 4s infinite 3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: #000;
        }

        @keyframes grow-plant {
            0% {
                height: 0;
            }

            100% {
                height: 300px;
            }
        }

        @keyframes bloom {
            0% {
                width: 0;
                height: 0;
                opacity: 0;
            }

            50% {
                width: 40px;
                height: 40px;
                opacity: 1;
            }

            100% {
                width: 40px;
                height: 40px;
                opacity: 1;
            }
        }

        @keyframes flower-pop {
            0% {
                width: 0;
                height: 0;
                opacity: 0;
            }

            100% {
                width: 80px;
                height: 80px;
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Yatırımlarını<br><span class="gradient-word">Büyüt.</span></div>
            <div class="visual-container">
                <div class="coin-pot">
                    <div class="plant-stem">
                        <div class="flower-bud">$</div>
                        <div class="leaf l1"></div>
                        <div class="leaf l2"></div>
                        <div class="leaf l3"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
