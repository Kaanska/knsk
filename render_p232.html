<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 90% 10%, #0d323f 0%, #081116 60%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 900px;
            z-index: 10;
            padding-top: 120px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 80px;
        }

        .app-icon {
            width: 90px;
            height: 90px;
            border-radius: 22px;
        }

        .brand-name {
            font-size: 56px;
            font-weight: 800;
            color: #3da9eb;
            letter-spacing: -1.5px;
        }

        .eyebrow {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #3da9eb;
            text-transform: uppercase;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .eyebrow::before {
            content: '';
            width: 50px;
            height: 3px;
            background: #3da9eb;
        }

        .headline {
            font-size: 115px;
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -4.5px;
            color: #fff;
            margin-bottom: 30px;
        }

        .blue-text {
            color: #3da9eb;
        }

        .description {
            font-size: 34px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.4;
            max-width: 820px;
            font-weight: 500;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .sonar {
            width: 500px;
            height: 500px;
            border: 2px solid rgba(61, 169, 235, 0.3);
            border-radius: 50%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sonar-line {
            position: absolute;
            width: 50%;
            height: 2px;
            background: linear-gradient(to right, transparent, #3da9eb);
            transform-origin: left center;
            left: 50%;
            animation: scan-sonar 4s infinite linear;
        }

        .sonar-dot {
            position: absolute;
            width: 15px;
            height: 15px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 20px #fff;
            opacity: 0;
            animation: ping 4s infinite;
        }

        @keyframes scan-sonar {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @keyframes ping {

            0%,
            20% {
                opacity: 0;
                transform: scale(1);
            }

            25% {
                opacity: 1;
                transform: scale(1.5);
            }

            40% {
                opacity: 0;
                transform: scale(1);
            }

            100% {
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header"><img src="images/AppIcon.png" class="app-icon"><span class="brand-name">VYNTO</span>
            </div>
            <div class="eyebrow">DERİN ANALİZ</div>
            <div class="headline">Karanlıkta Kalanı<br><span class="blue-text">Keşfet.</span></div>
            <div class="description">Gözden kaçan abonelikler, sinsi masraflar... Vynto AI sonarı ile finansal
                denizinizdeki her detayı su yüzüne çıkarın.</div>
            <div class="visual-container">
                <div class="sonar">
                    <div class="sonar-line"></div>
                    <div class="sonar-dot" style="top:20%; left:60%; animation-delay:1s;"></div>
                    <div class="sonar-dot" style="top:70%; left:30%; animation-delay:2.5s;"></div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
