<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 60px;
        }

        .app-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 54px;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .eyebrow-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .eyebrow-line {
            width: 50px;
            height: 4px;
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            border-radius: 2px;
        }

        .eyebrow-text {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 4px;
            color: #4ee2c0;
            text-transform: uppercase;
        }

        .headline {
            font-size: 115px;
            font-weight: 800;
            line-height: 0.92;
            letter-spacing: -5px;
            color: #fff;
            margin-bottom: 30px;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            font-size: 34px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.4;
            max-width: 800px;
            font-weight: 500;
            margin-bottom: 60px;
        }

        /* VISUAL: Energy Beam Transfer */
        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .transfer-stage {
            width: 700px;
            height: 400px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 50px;
        }

        .user-orb {
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
        }

        .u-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #333;
            overflow: hidden;
            object-fit: cover;
        }

        .beam-tube {
            position: absolute;
            top: 50%;
            left: 110px;
            right: 110px;
            height: 10px;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.05);
            border-radius: 5px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(82, 165, 255, 0.2);
        }

        .energy-pulse {
            position: absolute;
            top: 0;
            left: 0;
            width: 100px;
            height: 100%;
            background: linear-gradient(90deg, transparent, #4ee2c0, #fff, #4ee2c0, transparent);
            box-shadow: 0 0 40px #4ee2c0;
            animation: shoot-energy 2s infinite ease-in-out;
        }

        .amount-bubble {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -150%);
            background: rgba(82, 165, 255, 0.2);
            padding: 15px 30px;
            border-radius: 20px;
            color: #fff;
            font-weight: 800;
            border: 1px solid rgba(82, 165, 255, 0.5);
            animation: bobble 2s infinite ease-in-out;
            backdrop-filter: blur(10px);
        }

        @keyframes shoot-energy {
            0% {
                left: -20%;
                opacity: 0;
            }

            50% {
                opacity: 1;
            }

            100% {
                left: 120%;
                opacity: 0;
            }
        }

        @keyframes bobble {

            0%,
            100% {
                transform: translate(-50%, -150%);
            }

            50% {
                transform: translate(-50%, -160%);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>

            <div class="eyebrow-container">
                <div class="eyebrow-line"></div>
                <div class="eyebrow-text">HIZLI TRANSFER</div>
            </div>

            <div class="headline">Işık Hızında<br><span class="gradient-word">Gönder.</span></div>
            <div class="description">Beklemek yok, IBAN derdi yok. Rehberindeki arkadaşına saniyeler içinde para gönder,
                anında hesabına geçsin.</div>

            <div class="visual-container">
                <div class="transfer-stage">
                    <div class="user-orb">
                        <div class="u-img" style="background:#555;"></div> <!-- Placeholder -->
                    </div>

                    <div class="beam-tube">
                        <div class="energy-pulse"></div>
                    </div>

                    <div class="amount-bubble">₺450</div>

                    <div class="user-orb">
                        <div class="u-img" style="background:#777;"></div> <!-- Placeholder -->
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
