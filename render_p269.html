<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 85% 15%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 60px;
        }

        .app-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 54px;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .eyebrow-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .eyebrow-line {
            width: 50px;
            height: 4px;
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            border-radius: 2px;
        }

        .eyebrow-text {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 4px;
            color: #4ee2c0;
            text-transform: uppercase;
        }

        .headline {
            font-size: 115px;
            font-weight: 800;
            line-height: 0.92;
            letter-spacing: -5px;
            color: #fff;
            margin-bottom: 30px;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            font-size: 34px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.4;
            max-width: 800px;
            font-weight: 500;
            margin-bottom: 60px;
        }

        /* VISUAL: Floating Glass Widgets */
        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .widget-cloud {
            width: 700px;
            height: 500px;
            position: relative;
            transform-style: preserve-3d;
            animation: cloud-sway 10s infinite ease-in-out;
        }

        .widget {
            position: absolute;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px;
            transition: all 0.5s;
        }

        .w-small {
            width: 220px;
            height: 220px;
        }

        .w-large {
            width: 460px;
            height: 220px;
        }

        .w-1 {
            top: 0;
            left: 0;
            transform: translateZ(50px) rotate(-5deg);
            border-color: #4ee2c0;
            background: rgba(78, 226, 192, 0.1);
        }

        .w-2 {
            top: 30px;
            right: 0;
            transform: translateZ(0px) rotate(5deg);
        }

        .w-3 {
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateZ(80px) rotate(0deg);
            width: 400px;
        }

        .w-title {
            font-size: 16px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .w-val {
            font-size: 40px;
            font-weight: 800;
            color: #fff;
        }

        .w-graph {
            width: 100%;
            height: 50px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin-top: 10px;
            position: relative;
            overflow: hidden;
        }

        .w-fill {
            height: 100%;
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            border-radius: 10px;
            opacity: 0.8;
        }

        @keyframes cloud-sway {

            0%,
            100% {
                transform: rotateY(0deg);
            }

            50% {
                transform: rotateY(5deg);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>

            <div class="eyebrow-container">
                <div class="eyebrow-line"></div>
                <div class="eyebrow-text">ÖZEL WIDGETLAR</div>
            </div>

            <div class="headline">Ana Ekranın,<br><span class="gradient-word">Finansın.</span></div>
            <div class="description">Uygulamaya girmene bile gerek yok. Vynto'nun şık widgetlarıyla bütçeni doğrudan ana
                ekranından takip et.</div>

            <div class="visual-container">
                <div class="widget-cloud">
                    <div class="widget w-small w-1">
                        <div class="w-title">GÜNLÜK HEDEF</div>
                        <div class="w-val">₺480</div>
                        <div style="font-size: 50px;">🎯</div>
                    </div>
                    <div class="widget w-small w-2">
                        <div class="w-title">TOPLAM VARLIK</div>
                        <div class="w-val">₺142K</div>
                        <div class="w-graph">
                            <div class="w-fill" style="width: 70%;"></div>
                        </div>
                    </div>
                    <div class="widget w-large w-3">
                        <div class="w-title">SON İŞLEMLER</div>
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
                            <div style="display:flex; gap:10px; align-items:center;">
                                <div
                                    style="width:40px; height:40px; background:#fff; border-radius:10px; display:flex; align-items:center; justify-content:center;">
                                    ☕</div>
                                <span style="color:#fff; font-weight:600; font-size:20px;">Starbucks</span>
                            </div>
                            <span style="color:#fff; font-weight:700; font-size:24px;">-₺124</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
