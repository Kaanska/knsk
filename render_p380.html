<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #111;
            background: linear-gradient(135deg, #111 0%, #000 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .city-base {
            width: 500px;
            height: 500px;
            transform: rotateX(60deg) rotateZ(-30deg);
            position: relative;
            transform-style: preserve-3d;
        }

        .phone-plate {
            width: 300px;
            height: 600px;
            background: #000;
            border: 4px solid #333;
            border-radius: 20px;
            position: absolute;
            top: 0;
            left: 100px;
            box-shadow: 0 0 50px rgba(82, 165, 255, 0.2);
        }

        .building {
            position: absolute;
            bottom: 0;
            background: rgba(82, 165, 255, 0.1);
            border: 1px solid #52a5ff;
            transform-origin: bottom;
            animation: grow-city 3s infinite alternate ease-in-out;
            box-shadow: 0 0 20px rgba(82, 165, 255, 0.3);
        }

        .b1 {
            width: 30px;
            height: 100px;
            left: 50px;
            animation-delay: 0s;
            transform: translateZ(50px) rotateX(-90deg);
        }

        .b2 {
            width: 40px;
            height: 150px;
            left: 100px;
            animation-delay: 0.5s;
            transform: translateZ(20px) rotateX(-90deg);
        }

        .b3 {
            width: 50px;
            height: 200px;
            left: 150px;
            animation-delay: 1s;
            transform: translateZ(80px) rotateX(-90deg);
        }

        .b4 {
            width: 30px;
            height: 80px;
            left: 220px;
            animation-delay: 0.2s;
            transform: translateZ(40px) rotateX(-90deg);
        }

        .data-stream {
            position: absolute;
            width: 2px;
            height: 200px;
            background: #4ee2c0;
            bottom: 0;
            left: 180px;
            transform: translateZ(100px) rotateX(-90deg);
            box-shadow: 0 0 10px #4ee2c0;
            animation: data-fly 2s infinite linear;
        }

        @keyframes grow-city {
            0% {
                transform: translateZ(var(--z)) rotateX(-90deg) scaleY(0.5);
            }

            100% {
                transform: translateZ(var(--z)) rotateX(-90deg) scaleY(1);
            }
        }

        /* Conceptual 3D transform */
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="headline">Kendi<br><span class="gradient-word">İmparatorluğun.</span></div>
            <div class="visual-container">
                <div class="city-base">
                    <div class="phone-plate">
                        <div class="building b1" style="--z: 50px"></div>
                        <div class="building b2" style="--z: 20px"></div>
                        <div class="building b3" style="--z: 80px"></div>
                        <div class="building b4" style="--z: 40px"></div>
                        <div class="data-stream"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
