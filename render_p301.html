<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: #081116;
            background: radial-gradient(circle at 10% 20%, #0d323f 10%, #081116 70%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content {
            width: 920px;
            z-index: 10;
            padding-top: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .app-icon {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #4ee2c0 0%, #52a5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .headline {
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }

        .gradient-word {
            background: linear-gradient(to right, #4ee2c0, #52a5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .visual-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            perspective: 2000px;
        }

        .map-bg {
            width: 500px;
            height: 650px;
            background: #111;
            background-image: url('https://images.unsplash.com/photo-1596707328604-fa263923d37c?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80');
            /* Abstract Dark Map */
            background-size: cover;
            border-radius: 40px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            position: relative;
            transform: rotateY(10deg);
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.8);
            overflow: hidden;
        }

        .map-overlay {
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            -webkit-mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
        }

        .pin {
            position: absolute;
            background: #fff;
            padding: 10px 15px;
            border-radius: 20px 20px 20px 0;
            display: flex;
            gap: 10px;
            align-items: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            animation: pin-float 3s infinite ease-in-out;
            cursor: pointer;
        }

        .p-icon {
            font-size: 20px;
        }

        .p-val {
            font-weight: 800;
            color: #000;
            font-size: 16px;
        }

        .p-sub {
            font-size: 12px;
            color: #666;
            font-weight: 600;
        }

        .pin-1 {
            top: 30%;
            left: 20%;
            transform: rotate(-5deg);
            animation-delay: 0s;
        }

        .pin-2 {
            top: 50%;
            right: 15%;
            transform: rotate(5deg);
            animation-delay: 1.5s;
        }

        .pin-3 {
            bottom: 20%;
            left: 40%;
            transform: rotate(0deg);
            animation-delay: 0.5s;
        }

        .curr-bubble {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            font-weight: 700;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        @keyframes pin-float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="content">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>

            <div class="headline">Dünya<br><span class="gradient-word">Küçüldü.</span></div>

            <div class="visual-container">
                <div class="map-bg">
                    <div class="map-overlay"></div>

                    <div class="curr-bubble">🇺🇸 1 USD = 35.42 ₺</div>

                    <div class="pin pin-1">
                        <div class="p-icon">🍕</div>
                        <div>
                            <div class="p-val">$24.50</div>
                            <div class="p-sub">Little Italy</div>
                        </div>
                    </div>

                    <div class="pin pin-2">
                        <div class="p-icon">🚕</div>
                        <div>
                            <div class="p-val">$18.00</div>
                            <div class="p-sub">Uber Trip</div>
                        </div>
                    </div>

                    <div class="pin pin-3">
                        <div class="p-icon">☕</div>
                        <div>
                            <div class="p-val">$5.45</div>
                            <div class="p-sub">Starbucks</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
