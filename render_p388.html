<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #000;
            width: 1080px;
            height: 1350px;
            overflow: hidden;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            background: radial-gradient(ellipse at center, #0a0e27 0%, #000000 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite;
        }

        @keyframes twinkle {

            0%,
            100% {
                opacity: 0.3;
            }

            50% {
                opacity: 1;
            }
        }

        .galaxy-glow {
            position: absolute;
            width: 1000px;
            height: 1000px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle,
                    rgba(94, 231, 223, 0.2) 0%,
                    rgba(6, 182, 212, 0.1) 30%,
                    transparent 70%);
            filter: blur(100px);
            animation: galaxyRotate 30s linear infinite;
            z-index: 1;
        }

        @keyframes galaxyRotate {
            from {
                transform: translate(-50%, -50%) rotate(0deg);
            }

            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        .content-container {
            width: 900px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            height: 100%;
            padding-top: 100px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 80px;
        }

        .app-icon {
            width: 90px;
            height: 90px;
            border-radius: 22px;
            box-shadow: 0 20px 60px rgba(94, 231, 223, 0.6);
        }

        .brand-name {
            font-size: 56px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(90deg, #5EE7DF 0%, #06b6d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .text-section {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin-bottom: 60px;
        }

        .eyebrow {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #5EE7DF;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .eyebrow::before {
            content: '';
            width: 40px;
            height: 3px;
            background: linear-gradient(90deg, #5EE7DF, #06b6d4);
            display: block;
        }

        .main-headline {
            font-size: 100px;
            font-weight: 800;
            line-height: 0.95;
            letter-spacing: -3px;
            color: white;
        }

        .gradient-word {
            background: linear-gradient(135deg, #5EE7DF, #06b6d4, #14b8a6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 40px rgba(94, 231, 223, 0.6));
        }

        .sub-text {
            margin-top: 30px;
            font-size: 32px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.4;
            max-width: 800px;
        }

        .galaxy-portfolio {
            width: 100%;
            height: 450px;
            margin-top: auto;
            margin-bottom: 100px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .orbit {
            position: absolute;
            border: 2px solid rgba(94, 231, 223, 0.2);
            border-radius: 50%;
            animation: orbitRotate 20s linear infinite;
        }

        .orbit-1 {
            width: 300px;
            height: 300px;
        }

        .orbit-2 {
            width: 400px;
            height: 400px;
            animation-duration: 25s;
            animation-direction: reverse;
        }

        .orbit-3 {
            width: 500px;
            height: 500px;
            animation-duration: 30s;
        }

        @keyframes orbitRotate {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .planet {
            position: absolute;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.3), rgba(20, 184, 166, 0.3));
            backdrop-filter: blur(20px);
            border: 2px solid #06b6d4;
            box-shadow:
                0 0 40px rgba(6, 182, 212, 0.6),
                inset 0 0 30px rgba(94, 231, 223, 0.2);
            animation: planetFloat 4s ease-in-out infinite;
        }

        @keyframes planetFloat {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-15px);
            }
        }

        .planet-1 {
            width: 140px;
            height: 140px;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            animation-delay: 0s;
        }

        .planet-2 {
            width: 120px;
            height: 120px;
            bottom: 0;
            left: 20%;
            animation-delay: 1s;
        }

        .planet-3 {
            width: 120px;
            height: 120px;
            bottom: 0;
            right: 20%;
            animation-delay: 2s;
        }

        .planet-label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 600;
            margin-bottom: 4px;
        }

        .planet-value {
            font-size: 24px;
            font-weight: 800;
            color: #5EE7DF;
        }

        .center-total {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.4), rgba(20, 184, 166, 0.4));
            backdrop-filter: blur(30px);
            border: 3px solid #5EE7DF;
            box-shadow:
                0 0 60px rgba(94, 231, 223, 0.8),
                inset 0 0 40px rgba(94, 231, 223, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 5;
        }

        .center-label {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 600;
            margin-bottom: 8px;
        }

        .center-value {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #5EE7DF, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div class="stars">
            <div class="star" style="top: 10%; left: 20%;"></div>
            <div class="star" style="top: 20%; left: 80%; animation-delay: 1s;"></div>
            <div class="star" style="top: 30%; left: 15%; animation-delay: 2s;"></div>
            <div class="star" style="top: 40%; left: 70%; animation-delay: 0.5s;"></div>
            <div class="star" style="top: 50%; left: 40%; animation-delay: 1.5s;"></div>
            <div class="star" style="top: 60%; left: 85%; animation-delay: 2.5s;"></div>
            <div class="star" style="top: 70%; left: 25%; animation-delay: 0.8s;"></div>
            <div class="star" style="top: 80%; left: 60%; animation-delay: 1.8s;"></div>
        </div>
        <div class="galaxy-glow"></div>
        <div class="content-container">
            <div class="header">
                <img src="images/AppIcon.png" class="app-icon">
                <span class="brand-name">VYNTO</span>
            </div>
            <div class="text-section">
                <div class="eyebrow">PORTFÖY YÖNETİMİ</div>
                <div class="main-headline">Portföyün<br><span class="gradient-word">Evreninde.</span></div>
                <p class="sub-text">Tüm varlıklarını tek bir galakside topla. Her şeyi bir arada gör.</p>
            </div>
            <div class="galaxy-portfolio">
                <div class="orbit orbit-1"></div>
                <div class="orbit orbit-2"></div>
                <div class="orbit orbit-3"></div>

                <div class="planet planet-1">
                    <div class="planet-label">Nakit</div>
                    <div class="planet-value">₺125K</div>
                </div>
                <div class="planet planet-2">
                    <div class="planet-label">Yatırım</div>
                    <div class="planet-value">₺340K</div>
                </div>
                <div class="planet planet-3">
                    <div class="planet-label">Kripto</div>
                    <div class="planet-value">₺85K</div>
                </div>

                <div class="center-total">
                    <div class="center-label">Toplam</div>
                    <div class="center-value">₺550K</div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
